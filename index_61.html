<style>
/* ===================================================================
   ▼▼▼ THE ONLY TWO LINES YOU EDIT ARE A FEW LINES BELOW, IN THE
       SECTION MARKED "YOUR SETTINGS". Everything else: leave as-is.
   =================================================================== */
:root{
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --bg:#0a0e16;--bg2:#0e131d;--panel:#121a27;--panel2:#172234;--line:#1f2b3d;--line2:#2a3a52;
  --text:#eaf1fb;--muted:#8497b0;--faint:#5b6c85;--green:#22c55e;--cyan:#38bdf8;--amber:#f59e0b;
  --red:#ef4444;--violet:#a78bfa;--green-soft:rgba(34,197,94,.14);--cyan-soft:rgba(56,189,248,.14);
  --amber-soft:rgba(245,158,11,.16);--red-soft:rgba(239,68,68,.16);--radius:16px;--sidebar:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:radial-gradient(900px 500px at 12% -8%,rgba(56,189,248,.10),transparent 60%),radial-gradient(900px 500px at 100% 0%,rgba(34,197,94,.08),transparent 55%),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.45;transition:background .4s}
body.client,body.theme-light{--bg:#f4f7fb;--bg2:#fff;--panel:#fff;--panel2:#f7fafd;--line:#e6edf5;--line2:#d6e1ee;--text:#0f2033;--muted:#5a6b80;--faint:#8a9bb0;background:radial-gradient(900px 480px at 10% -10%,rgba(56,189,248,.10),transparent 60%),radial-gradient(800px 460px at 100% -5%,rgba(34,197,94,.08),transparent 55%),var(--bg)}
.theme-toggle{border:1px solid var(--line2);background:var(--panel);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:15px;font-family:inherit;flex:none}
.card{transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
/* login / setup */
.center{min-height:100vh;display:grid;place-items:center;padding:24px}
.authcard{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:34px;box-shadow:0 30px 70px rgba(0,0,0,.5)}
.authlogo{width:52px;height:52px;border-radius:14px;background:conic-gradient(from 220deg,var(--cyan),var(--green));display:grid;place-items:center;font-weight:800;color:#04121f;font-size:24px;margin:0 auto 18px}
.authcard h1{font-size:21px;text-align:center;margin-bottom:4px}
.authcard p.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.field input{width:100%;padding:12px 13px;border-radius:11px;border:1px solid var(--line2);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit}
.field input:focus{outline:none;border-color:var(--cyan)}
.btn{width:100%;padding:12px;border:0;border-radius:11px;background:linear-gradient(135deg,var(--cyan),var(--green));color:#04121f;font-weight:800;font-size:14.5px;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.6;cursor:wait}
.authmsg{font-size:13px;margin-top:14px;text-align:center;min-height:18px}
.authmsg.err{color:var(--red)}.authmsg.ok{color:var(--green)}
.setupbox{font-size:13px;color:var(--muted);line-height:1.6}
.setupbox code{background:#04121f;color:#7fd9ff;padding:2px 6px;border-radius:5px;font-size:12px}
/* shell */
.shell{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--line);padding:20px 16px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 6px 18px;border-bottom:1px solid var(--line);margin-bottom:16px}
.logo{width:40px;height:40px;border-radius:11px;flex:none;background:conic-gradient(from 220deg,var(--cyan),var(--green));display:grid;place-items:center;font-weight:800;color:#04121f;font-size:18px}
.brand h1{font-size:15px;font-weight:800}.brand p{font-size:11px;color:var(--muted)}
.navlabel{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:18px 8px 8px;font-weight:700}
.nav-btn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:var(--muted);font-family:inherit;font-size:13.5px;font-weight:600;padding:10px 12px;border-radius:11px;cursor:pointer;transition:.15s;margin-bottom:2px}
.nav-btn:hover{background:var(--panel);color:var(--text)}
.nav-btn.active{background:var(--panel2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line2)}
.nav-btn .ic{width:20px;text-align:center;font-size:15px}.nav-btn.active .ic{color:var(--cyan)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px}
.side-foot{margin-top:18px;padding:12px;border-radius:12px;background:var(--panel);border:1px solid var(--line);font-size:11.5px;color:var(--muted)}
.logout{margin-top:10px;width:100%;background:transparent;border:1px solid var(--line2);color:var(--muted);padding:9px;border-radius:10px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:16px;padding:16px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(12px)}
.topbar .crumb{font-size:12.5px;color:var(--muted)}.topbar h2{font-size:19px;font-weight:800}
.spacer{flex:1}
.cli-select{padding:8px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--line2);color:var(--text);font-family:inherit;font-size:13px;font-weight:600}
.toggle{display:flex;background:var(--panel);border:1px solid var(--line2);border-radius:999px;padding:3px;gap:2px}
.toggle button{border:0;background:transparent;color:var(--muted);font-family:inherit;font-weight:700;font-size:12.5px;padding:7px 15px;border-radius:999px;cursor:pointer}
.toggle button.on{background:linear-gradient(135deg,var(--cyan),var(--green));color:#04121f}
.live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600}
.live .beat{width:9px;height:9px;border-radius:50%;background:var(--green);animation:beat 1.8s infinite}
@keyframes beat{0%,100%{box-shadow:0 0 0 0 var(--green-soft)}50%{box-shadow:0 0 0 6px transparent}}
.content{padding:24px 28px 60px;max-width:1480px;width:100%}
.section-h{display:flex;align-items:center;gap:10px;margin:30px 2px 14px}.section-h:first-child{margin-top:6px}
.section-h h3{font-size:15px;font-weight:800}.section-h .sub{font-size:12px;color:var(--muted)}.section-h .line{flex:1;height:1px;background:var(--line)}
.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.kpi{position:relative;overflow:hidden}.kpi .lbl{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.kpi-link{cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s}.kpi-link:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(2,12,27,.16);border-color:var(--cyan)}.kpi-link:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.kpi .kpi-go{position:absolute;right:14px;bottom:12px;font-size:15px;color:var(--muted);opacity:0;transform:translateX(-4px);transition:.14s}.kpi-link:hover .kpi-go{opacity:1;transform:translateX(0)}
.kpi .val{font-size:30px;font-weight:800;margin-top:8px;letter-spacing:-.5px;display:flex;align-items:baseline;gap:6px}.kpi .val small{font-size:14px;font-weight:600;color:var(--muted)}
.kpi .spark{position:absolute;right:14px;top:16px;width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:18px}
.kpi.g .spark{background:var(--green-soft);color:var(--green)}.kpi.c .spark{background:var(--cyan-soft);color:var(--cyan)}
.kpi.a .spark{background:var(--amber-soft);color:var(--amber)}.kpi.r .spark{background:var(--red-soft);color:var(--red)}.kpi.v .spark{background:rgba(167,139,250,.16);color:var(--violet)}
.row2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px}.row2b{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:1080px){.row2,.row2b{grid-template-columns:1fr}}
/* ---- responsive: slide-in drawer on narrow screens & phones ---- */
.hamburger{display:none;border:1px solid var(--line2);background:var(--panel);color:var(--text);width:40px;height:40px;border-radius:10px;font-size:19px;cursor:pointer;font-family:inherit;flex:none}
.navscrim{display:none}
@media(max-width:980px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;height:100vh;width:272px;z-index:60;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 60px rgba(0,0,0,.6)}
  body.nav-open .sidebar{transform:none}
  .navscrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55}
  body.nav-open .navscrim{display:block}
  .hamburger{display:inline-flex;align-items:center;justify-content:center}
  .content{padding:18px 15px 70px}
  .topbar{padding:13px 15px;gap:11px}
  .topbar h2{font-size:17px}
  .cli-select{max-width:150px}
}
/* ---- phones: rework the topbar & tables without touching desktop ---- */
@media(max-width:600px){
  .topbar{flex-wrap:wrap;row-gap:9px;column-gap:9px;padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));align-items:center}
  .topbar .hamburger{order:1}
  .topbar .tbtitle{order:2;flex:1 1 auto;min-width:0}
  .topbar .tbtitle h2{font-size:15px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .crumb{font-size:12.5px;font-weight:800;color:var(--cyan);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .notifwrap{order:3}
  .topbar .spacer{display:none}
  .cli-select{order:10;flex:1 1 100%;max-width:none;width:100%;font-size:15px;font-weight:800;padding:12px 12px;border-color:var(--cyan)}
  .toggle{order:11}.theme-toggle{order:12}
  .live{display:none}
  /* tables scroll sideways inside their card instead of squashing */
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .card table{min-width:560px}
  .sechead{flex-wrap:wrap;row-gap:8px}
  .modal{width:96vw;max-width:96vw}
}
.clientpick select{border:2px solid var(--amber);font-weight:700}
.card h4{font-size:14px;font-weight:800;margin-bottom:3px;display:flex;align-items:center;gap:8px}.card .csub{font-size:12px;color:var(--muted);margin-bottom:14px}
.chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
.chip.green{background:var(--green-soft);color:var(--green)}.chip.cyan{background:var(--cyan-soft);color:var(--cyan)}.chip.amber{background:var(--amber-soft);color:var(--amber)}.chip.red{background:var(--red-soft);color:var(--red)}.chip.grey{background:var(--panel2);color:var(--muted)}
.chip.violet{background:rgba(167,139,250,.16);color:var(--violet)}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.flagdot{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:middle;margin-right:3px;box-shadow:0 0 0 2px rgba(255,255,255,.06)}
.lite{background:transparent;border:1px solid var(--line2);border-radius:6px;padding:2px 4px;font-size:12px;cursor:pointer;line-height:1}
.lite:hover{border-color:var(--cyan)}
.hr-sec{border:1px solid var(--line2);border-radius:10px;padding:10px 12px;margin:12px 0;background:var(--panel2)}
.hr-sec h4{margin:0 0 8px;font-size:13px;color:var(--cyan)}
.edit-btn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(56,189,248,.1)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700;padding:0 10px 10px;border-bottom:1px solid var(--line)}
td{padding:11px 10px;border-bottom:1px solid var(--line)}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--panel2)}
.site-code{font-weight:800;font-size:12.5px}.muted{color:var(--muted)}
.pbar{height:7px;border-radius:6px;background:var(--line2);overflow:hidden;min-width:90px}
.pbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--green))}
.pbar.amber i{background:linear-gradient(90deg,var(--amber),#fbbf24)}.pbar.red i{background:linear-gradient(90deg,var(--red),#fb7185)}
.pcell{display:flex;align-items:center;gap:9px}.pcell b{font-size:12px;width:34px;text-align:right}
.gantt{font-size:12px}.gantt .grow{display:grid;grid-template-columns:148px 1fr;align-items:center;gap:10px;padding:5px 0}
.gantt .gname{display:flex;align-items:center;gap:8px;font-weight:600}
.gantt .gtrack{position:relative;height:22px;background:var(--panel2);border-radius:7px;overflow:visible}
.gantt .gbar{position:absolute;top:3px;height:16px;border-radius:5px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:700;color:#04121f;white-space:nowrap;overflow:hidden}
.gantt .gtoday{position:absolute;top:-4px;bottom:-4px;width:2px;background:rgba(56,189,248,.95);z-index:3;pointer-events:none}
.gantt .gmile{position:absolute;top:-3px;width:10px;height:10px;border-radius:50%;background:var(--panel);border:2px solid #6366f1;transform:translateX(-50%);z-index:4;cursor:default}
.gantt .gmile.done{background:#22c55e;border-color:#16a34a}
.gantt .gscale{display:grid;grid-template-columns:148px 1fr;gap:10px;margin-bottom:10px;color:var(--faint);font-size:10.5px;font-weight:700}
.gantt .gscale-track{position:relative;height:20px}
.gantt .gtk{position:absolute;top:0;white-space:nowrap;color:var(--muted);font-size:10.5px;font-weight:700}
.gantt .gtk:before{content:'';position:absolute;left:0;top:15px;width:1px;height:7px;background:var(--line2)}
.gantt .gscale-today{position:absolute;top:0;color:var(--cyan);font-weight:800;font-size:10px;transform:translateX(-50%)}
.gantt .gscale-today:before{content:'';position:absolute;left:50%;top:15px;width:2px;height:7px;background:var(--cyan)}
.gantt .gline{position:absolute;top:0;bottom:0;width:1px;background:rgba(148,163,184,.16);z-index:0}
.gantt .gmonths{display:flex;justify-content:space-between}
.gantt .today{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--cyan);z-index:3}
.rota-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.rota-nav{display:flex;gap:6px}.rota-range{font-weight:700;color:var(--text)}.rota-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.rota-card{padding:14px}
.rota-scroll{overflow-x:auto}
table.rota{border-collapse:separate;border-spacing:0;width:100%;min-width:760px}
table.rota th{background:var(--panel2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:8px 6px;text-align:center;border-bottom:1px solid var(--line2);font-weight:700}
table.rota th.rota-eng{text-align:left;padding-left:12px;position:sticky;left:0;z-index:2;background:var(--panel2)}
table.rota th.rota-today{color:var(--cyan)}
.rota-dnum{font-size:10px;color:var(--faint);font-weight:600;margin-top:2px}
table.rota td.rota-eng{font-weight:700;font-size:13px;color:var(--text);padding:8px 12px;white-space:nowrap;position:sticky;left:0;background:var(--panel);z-index:1;border-right:1px solid var(--line2)}
table.rota td.rota-eng{display:flex;align-items:center;gap:6px;justify-content:space-between;min-height:40px}
.reng-del{border:1px solid var(--line2);background:var(--panel2);color:var(--red);border-radius:6px;width:22px;height:22px;font-size:11px;cursor:pointer;line-height:1;flex:none;opacity:.55}
.reng-del:hover{opacity:1}
.rota-cell{vertical-align:top;min-width:96px;padding:5px;border-bottom:1px solid var(--line2);border-left:1px solid var(--line);position:relative}
.rota-cell.rota-today{background:var(--cyan-soft)}
.rshift{border:1px solid;border-radius:8px;padding:5px 7px;margin-bottom:5px;font-size:11.5px;line-height:1.25;cursor:pointer}
.rshift b{display:block;font-size:12px}.rshift .rs-time{color:var(--muted);font-weight:600;font-size:10.5px}.rshift .rs-where{color:var(--muted);font-size:10px}
.radd{width:100%;border:1px dashed var(--line2);background:transparent;color:var(--faint);border-radius:7px;font-size:14px;cursor:pointer;padding:2px 0;opacity:.5}
.rota-cell:hover .radd{opacity:1}
.rota-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:12px;color:var(--muted)}.rota-legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:middle}
.rota-dows{display:flex;flex-wrap:wrap;gap:10px}.rota-dows .dow{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text)}
.list{display:flex;flex-direction:column;gap:10px}
.litem{display:flex;gap:12px;padding:12px;border-radius:12px;background:var(--panel2);border:1px solid var(--line)}
.litem .av{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:800;font-size:12px;background:var(--cyan-soft);color:var(--cyan)}
.litem .bd{flex:1;min-width:0}.litem .bd .t{font-size:13px;font-weight:700}.litem .bd .m{font-size:11.5px;color:var(--muted);margin-top:2px}
.litem .when{font-size:11px;color:var(--faint);white-space:nowrap}
.teamgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.teamcard{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:15px}
.teamcard .th{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.teamcard .nm{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px}.teamcard .tdot{width:10px;height:10px;border-radius:50%}
.teamcard .meta{font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--line)}.teamcard .meta:last-child{border-bottom:0}.teamcard .meta b{color:var(--text);font-weight:700}
.ringwrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.ring{position:relative;width:150px;height:150px;flex:none}.ring svg{transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:grid;place-items:center;text-align:center}.ring .mid b{font-size:34px;font-weight:800}.ring .mid span{font-size:11px;color:var(--muted);font-weight:600}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:13px;text-align:center}
.metrics div{background:var(--panel2);border-radius:9px;padding:9px 4px}.metrics b{display:block;font-size:16px;font-weight:800}.metrics span{font-size:9.5px;color:var(--muted);text-transform:uppercase}

/* Pipp-specific install-report confirmations (LOTO/permit + RME hand-back) */
function isPipp(c){ c=c||CLIENT; if(!c) return false; return String(c.slug||'').toLowerCase()==='pipp' || /\bpipp\b/i.test(String(c.name||'')); }

let sb=null, SESSION=null, PROFILE=null, CLIENTS=[], CLIENT=null;
/* Suppliers module state: SUPPLIERS = all (admin), SUPPLIER = the logged-in supplier, SDATA = its data */
let SUPPLIERS=[], SUPPLIER=null, SDATA=emptySup();
let SUPPREVIEW=null, ALLSUP=null;   // admin "preview as supplier": id being previewed + stashed full data
function emptySup(){ return {engineers:[],assignments:[],timesheets:[],ratings:[],documents:[]}; }
function filterSup(all, sid){ all=all||emptySup(); return { engineers:(all.engineers||[]).filter(x=>x.supplier_id===sid), assignments:(all.assignments||[]).filter(x=>x.supplier_id===sid), timesheets:(all.timesheets||[]).filter(x=>x.supplier_id===sid), ratings:(all.ratings||[]).filter(x=>x.supplier_id===sid), documents:(all.documents||[]).filter(x=>x.supplier_id===sid) }; }
/* Admin previews a supplier's own portal (read-only feel). Picks the first
   supplier if none specified; switch with the dropdown in the top bar. */
async function enterSupplierPreview(sid){
  if(PROFILE.role!=='admin') return;
  const sup = sid ? (SUPPLIERS.find(s=>s.id===sid)) : (SUPPREVIEW?SUPPLIERS.find(s=>s.id===SUPPREVIEW):SUPPLIERS[0]);
  if(!sup){ alert('No suppliers to preview yet — add one first.'); return; }
  if(!ALLSUP) ALLSUP=SDATA;          // stash the full admin data once
  SUPPREVIEW=sup.id; SUPPLIER=sup; VIEW='internal';
  SDATA=filterSup(ALLSUP, sup.id);
  document.body.classList.remove('client');
  await loadSupNotifs(sup.id);        // show that supplier's real notifications
  renderShell(); go('sup_home');
}
function exitSupplierPreview(){ SUPPREVIEW=null; SUPPLIER=null; if(ALLSUP){ SDATA=ALLSUP; ALLSUP=null; } }
/* traffic-light for a supplier engineer: manual override wins, else auto from recent ratings */
function engFlag(eng, ratings){
  if(eng && eng.flag_override) return eng.flag_override;           // green / amber / red
  const rs=(ratings||[]).filter(r=>r.engineer_id===(eng&&eng.id)).slice().sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||''))).slice(0,5);
  if(!rs.length) return 'grey';                                     // no data yet
  if(rs.some(r=>r.no_show || r.incident)) return 'red';
  const scores=[]; rs.forEach(r=>{ ['quality','safety','timekeeping','attitude'].forEach(k=>{ if(r[k]!=null) scores.push(Number(r[k])); }); });
  if(!scores.length) return 'grey';
  const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
  return avg>=4 ? 'green' : (avg>=2.75 ? 'amber' : 'red');
}
function flagDot(f){ const map={green:'#22c55e',amber:'#f59e0b',red:'#ef4444',grey:'#64748b'}; const lbl={green:'Performing well',amber:'Watch',red:'At risk',grey:'No ratings yet'}; return `<span class="flagdot" title="${lbl[f]||''}" style="background:${map[f]||'#64748b'}"></span>`; }
/* cost of a timesheet row = normal hrs*rate + ot hrs*(ot rate or rate*1.5) + travel */
function tsCost(t){ const rate=Number(t.charge_rate||0); const ot=Number(t.ot_rate|| (rate?rate*1.5:0)); const hn=Number(t.hours_normal||0), ho=Number(t.hours_ot||0), mi=Number(t.travel_miles||0); return hn*rate + ho*ot + mi*0.45; }
function tsHours(t){ return Number(t.hours_normal||0)+Number(t.hours_ot||0); }
/* Admin-only rate card + project finance (sell/margin never leaves admin) */
let RATECARD=[], PROJFIN=[], PLACEMENTS=[], ALLTEAMS=[];
function placementFor(name, clientId){ const k=String(name||'').trim().toLowerCase(); return (PLACEMENTS||[]).find(p=>String(p.engineer_name||'').trim().toLowerCase()===k && (!clientId || p.client_id===clientId))||null; }
function teamName(id){ const t=(ALLTEAMS||[]).find(x=>x.id===id); return t?t.name:''; }
function engPlacementDesc(engId){ const ps=(PLACEMENTS||[]).filter(p=>p.engineer_id===engId); if(!ps.length) return ''; return ps.map(p=>{ const cn=((CLIENTS||[]).find(c=>c.id===p.client_id)||{}).name||'client'; return p.team_id?(teamName(p.team_id)+' · '+cn):('to place · '+cn); }).join(', '); }
// resolve cost & sell rates for an engineer: engineer override → trade card
function resolveRates(eng){
  if(!eng) return {cost:null,sell:null};
  const ov=RATECARD.find(r=>r.scope==='engineer' && r.engineer_id===eng.id);
  const tr=RATECARD.find(r=>r.scope==='trade' && r.trade && eng.trade && String(r.trade).toLowerCase()===String(eng.trade).toLowerCase());
  const pick=(k)=> (ov&&ov[k]!=null?Number(ov[k]):(tr&&tr[k]!=null?Number(tr[k]):null));
  return {cost:pick('cost_rate'), sell:pick('sell_rate')};
}
function engById(id){ return (SDATA.engineers||[]).find(e=>e.id===id)||null; }
// revenue for a timesheet from hourly charge-out (admin view only)
function tsRevenue(t){ const e=engById(t.engineer_id); const s=resolveRates(e).sell; if(s==null) return null; return tsHours(t)*Number(s); }
function emptyData(){ return {sites:[],teams:[],risks:[],daily:[],callouts:[],qa:[],progress:[],shifts:[],gps:[],media:[],documents:[],requests:[],engineers:[],rota:[],shiftTypes:[],crmContacts:[],crmLog:[],crmOpps:[],crmStatus:null,notifications:[],drafts:[]}; }

function followState(d){ if(!d) return {c:'grey',label:''}; const days=Math.ceil((new Date(d)-Date.now())/86400000); if(isNaN(days)) return {c:'grey',label:''}; if(days<0) return {c:'red',label:'overdue '+(-days)+'d'}; if(days===0) return {c:'amber',label:'today'}; if(days<=7) return {c:'amber',label:'in '+days+'d'}; return {c:'green',label:String(d).slice(0,10)}; }

/* ============ LOAD PROFILE + CLIENTS, THEN RENDER SHELL ============ */
async function startApp(){
  el('root').innerHTML=`<div class="center"><div class="muted">Loading your dashboard…</div></div>`;
  // profile
  const {data:prof} = await sb.from('profiles').select('*').eq('id',SESSION.user.id).maybeSingle();
  PROFILE = prof || {role:'client', full_name:SESSION.user.email, email:SESSION.user.email};
  // clients (RLS lets everyone read the list; we restrict non-admins to their own)
  let {data:clients} = await sb.from('clients').select('*').order('name');
  clients = clients || [];
  if(PROFILE.role!=='admin' && PROFILE.client_id) clients = clients.filter(c=>c.id===PROFILE.client_id);
  CLIENTS = clients;
  CLIENT = CLIENTS[0] || null;
  // clients see the portal view; admins/engineers default to internal
  VIEW = (PROFILE.role==='client') ? 'client' : 'internal';
  document.body.classList.toggle('client', VIEW==='client');
  // Admins land on the business-wide HQ overview; clients/engineers go into their dashboard.
  if(PROFILE.role==='admin'){
    await loadHQ();
    await loadLogins();
    await loadSuppliers();
    await loadEngHr();
    await loadEngReg();
    renderShell();
    go('hq');
  } else if(PROFILE.role==='supplier'){
    // Labour supplier: self-service portal, only their own data
    await loadSupplierData();
    renderShell();
    go('sup_home');
  } else if(CLIENT){
    renderShell();
    await loadClientData(); go('overview');
  } else {
    renderShell();
    go('overview'); // graceful: shows a "no client" message instead of a blank screen
  }
}

/* ============ DERIVED VALUES ============ */
function rollups(){
  const sites=(DATA.sites||[]).filter(s=>String(s.status||'')!=='Pending');
  const active=sites.filter(s=>!['Pending','Not Started'].includes(s.status));
  const complete=sites.filter(s=>s.status==='Complete');
  const live=sites.filter(s=>['Live','At Risk','Delayed','Mobilising'].includes(s.status));
  const avg=active.length?Math.round(active.reduce((a,s)=>a+Number(s.progress_pct||0),0)/active.length):0;
  const onSched=active.filter(s=>!['Delayed','At Risk'].includes(s.status)).length;
  const onSchedPct=active.length?Math.round(onSched/active.length*100):0;
  const openRisks=(DATA.risks||[]).filter(r=>!['Closed','Complete'].includes(String(r.status||'')));
  const crit=openRisks.filter(r=>String(r.risk_level||'')==='Critical');
  return {sites,active,complete,live,avg,onSchedPct,openRisks,crit,total:(DATA.sites||[]).length};
}

/* gantt across the client's date range */
function gantt(){
  const dated=(DATA.sites||[]).filter(s=>s.planned_start&&s.planned_end);
  if(!dated.length) return emptyState('📅','No dates scheduled yet','Add planned start/end dates to your sites and the timeline appears here.');
  const ds=dated.map(s=>+new Date(s.planned_start)), de=dated.map(s=>+new Date(s.planned_end));
  const min=Math.min(...ds), max=Math.max(...de), span=Math.max(1,max-min);
  const pct=d=>((+new Date(d)-min)/span)*100;
  const now=Date.now();
  const todayPct=(now>=min&&now<=max)?((now-min)/span)*100:null;
  const clamp=v=>Math.max(0,Math.min(100,v));
  // ---- calendar / month axis ----
  const months=[];
  const d0=new Date(min);
  months.push({pct:0, label:d0.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}), edge:'start'});
  let yy=d0.getFullYear(), mm=d0.getMonth()+1; if(mm>11){mm=0;yy++;}
  let t=new Date(yy,mm,1).getTime();
  while(t<=max){
    const p=((t-min)/span)*100; const dt=new Date(t);
    if(p>2&&p<98) months.push({pct:p, label:dt.toLocaleDateString('en-GB',{month:'short'})+(dt.getMonth()===0?(" '"+String(dt.getFullYear()).slice(2)):''), edge:''});
    mm++; if(mm>11){mm=0;yy++;} t=new Date(yy,mm,1).getTime();
  }
  const tkStyle=p=>p<4?'left:0':p>96?'right:0':('left:'+p+'%');
  const scale=`<div class="gscale"><div></div><div class="gscale-track">`+
    months.map(m=>`<span class="gtk" style="${tkStyle(m.pct)}">${esc(m.label)}</span>`).join('')+
    (todayPct!=null?`<span class="gscale-today" style="left:${clamp(todayPct)}%">Today</span>`:'')+
    `</div></div>`;
  const gridHtml=months.map(m=>`<div class="gline" style="left:${clamp(m.pct)}%"></div>`).join('');
  const rows=dated.sort((a,b)=>new Date(a.planned_start)-new Date(b.planned_start)).map(s=>{
    const l=pct(s.planned_start), r=pct(s.planned_end), w=Math.max(2.5,r-l);
    const col=s.status==='Complete'?'linear-gradient(90deg,#22c55e,#4ade80)':s.status==='Delayed'?'linear-gradient(90deg,#ef4444,#fb7185)':s.status==='At Risk'?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#38bdf8,#22c55e)';
    const today=todayPct!=null?`<div class="gtoday" style="left:${clamp(todayPct)}%"></div>`:'';
    const miles=(Array.isArray(s.milestones)?s.milestones:[]).filter(m=>m.date).map(m=>{const mp=clamp(pct(m.date));return `<div class="gmile ${m.done?'done':''}" style="left:${mp}%" title="${esc(m.title||'')}${m.date?(' · '+String(m.date).slice(0,10)):''}${m.done?' ✓':''}"></div>`;}).join('');
    return `<div class="grow"><div class="gname"><span class="chip ${flagOf(s.status)}" style="padding:2px 7px">${esc(s._team)}</span> ${flagEmoji[s.country]||''} ${esc(s.code||s.city)}</div>
      <div class="gtrack">${gridHtml}<div class="gbar" style="left:${l}%;width:${w}%;background:${col}">${Number(s.progress_pct)>0?Math.round(s.progress_pct)+'%':''}</div>${miles}${today}</div></div>`;
  }).join('');
  return `<div class="gantt">${scale}${rows}<div class="legend"><span><i style="background:#38bdf8"></i> In progress</span><span><i style="background:#22c55e"></i> Complete</span><span><i style="background:#f59e0b"></i> At risk</span><span><i style="background:#ef4444"></i> Delayed</span><span><i style="background:#6366f1;border-radius:50%"></i> Milestone</span><span><i style="background:rgba(56,189,248,.95);width:2px;border-radius:0"></i> Today</span></div></div>`;
}
function ring(p,label){const r=58,c=2*Math.PI*r,o=c-(p/100)*c;return `<div class="ring"><svg width="150" height="150" viewBox="0 0 150 150"><circle cx="75" cy="75" r="${r}" fill="none" stroke="var(--line2)" stroke-width="12"/><circle cx="75" cy="75" r="${r}" fill="none" stroke="url(#g)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${o}"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#22c55e"/></linearGradient></defs></svg><div class="mid"><div><b>${p}%</b><span>${label}</span></div></div></div>`;}

/* milestones: a delivery "story" from sites, QA sign-offs and reports */
function milestones(){
  const ev=[];
  (DATA.sites||[]).filter(s=>s.status==='Complete').forEach(s=>ev.push({date:s.planned_end||s.created_at,t:`${esc(s.code||s.city||'Site')} completed`,m:`${esc(s.city||'')} ${esc(s.country||'')}`.trim()}));
  (DATA.qa||[]).forEach(q=>{const s=(DATA.sites||[]).find(x=>x.id===q.site_id)||{};ev.push({date:q.signoff_date||q.submitted_at,t:`Handover signed — ${esc(s.code||s.city||'site')}`,m:'QA sign-off complete'});});
  (DATA.daily||[]).slice(0,6).forEach(d=>{const s=(DATA.sites||[]).find(x=>x.id===d.site_id)||{};ev.push({date:d.report_date||d.submitted_at,t:`Progress update — ${esc(s.code||s.city||'')}`,m:esc(String(d.work_completed||'').slice(0,70))});});
  return ev.filter(e=>e.date).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,8);
}
function timelineHtml(){

}
function isVideoMedia(m){ return (m&&m.media_type==='video') || /\.(mp4|mov|m4v|webm|avi|3gp)(\?|$)/i.test((m&&m.file_url)||''); }
function mediaTile(m){

function pageGallery(){
  const ph=(DATA.media||[]).filter(m=>m.file_url);

  const smap=mediaSiteMap();

}

/* ===================================================================
   SHIFT ROTA  —  plan engineers across custom shifts & days.
   Weekly grid (engineers x 7 days), client-visible, admin-editable.
   =================================================================== */
let ROTA_WEEK = mondayOf(new Date());
function mondayOf(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-day); return x; }
/* LOCAL date formatting/parsing — avoids UTC off-by-one (e.g. in BST). */
function ymd(d){ const x=new Date(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); }
function parseYmd(s){ const p=String(s).slice(0,10).split('-').map(Number); return new Date(p[0],(p[1]||1)-1,p[2]||1); }
function jss(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function rotaShiftEngineers(){ return [...new Set((DATA.teams||[]).flatMap(t=>Array.isArray(t.roster)?t.roster.map(e=>e&&e.name):[]).filter(Boolean).concat(DATA.engineers||[]))]; }
function rotaWeekDates(){ const a=[]; for(let i=0;i<7;i++){ const d=new Date(ROTA_WEEK); d.setDate(d.getDate()+i); a.push(d); } return a; }
function rotaMove(n){ ROTA_WEEK.setDate(ROTA_WEEK.getDate()+n*7); go('rota'); }
function rotaToday(){ ROTA_WEEK=mondayOf(new Date()); go('rota'); }
function pageRota(){
  const editor=isEditor();
  const week=rotaWeekDates(); const wk=week.map(ymd);
  const shifts=(DATA.rota||[]).filter(r=>wk.includes(String(r.shift_date||'').slice(0,10)));
  // engineers shown = those rostered to teams + any appearing in this week's rota
  let engs=[...new Set(rotaShiftEngineers().concat(shifts.map(s=>s.engineer).filter(Boolean)))].sort();
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const todayStr=ymd(new Date());
  const controls=`<div class="rota-bar">
    <div class="rota-nav"><button class="edit-btn" onclick="rotaMove(-1)">‹ Prev</button><button class="edit-btn" onclick="rotaToday()">This week</button><button class="edit-btn" onclick="rotaMove(1)">Next ›</button></div>
    <div class="rota-range">${week[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${week[6].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
    ${editor?`<div class="rota-actions"><button class="edit-btn" onclick="openShiftTypes()">⚙ Shift types</button> <button class="edit-btn" onclick="openPatternsList()">🗂 Patterns</button> <button class="edit-btn" onclick="openPatternFill()">⟳ Pattern fill</button> <button class="addbtn" onclick="openShiftForm()">＋ Add shift</button></div>`:''}
  </div>`;
  if(!engs.length){
    return sectionH('Shift Rota')+controls+emptyState('📆','No engineers to roster yet',editor?'Add engineers to a Team (Teams & Routes), then build the rota — or just tap “Add shift”.':'Your shift cover will appear here.');
  }
  // header row
  let head=`<th class="rota-eng">Engineer</th>`+week.map((d,i)=>`<th class="${ymd(d)===todayStr?'rota-today':''}">${dayNames[i]}<div class="rota-dnum">${d.getDate()}/${d.getMonth()+1}</div></th>`).join('');
  const cell=(eng,d)=>{
    const ds=ymd(d);
    const items=shifts.filter(s=>s.engineer===eng && String(s.shift_date||'').slice(0,10)===ds);
    const chips=items.map(s=>{
      const site=(DATA.sites||[]).find(x=>x.id===s.site_id);

      const where=site?` · ${esc(site.code||site.city||'')}`:(s.notes?` · ${esc(String(s.notes).slice(0,12))}`:'');
      const click=editor?`onclick="openShiftForm('${s.id}')"`:'';
      return `<div class="rshift" ${click} style="background:${esc(s.color||'#38bdf8')}22;border-color:${esc(s.color||'#38bdf8')}66"><b>${esc(s.shift_name||'Shift')}</b>${tm}<span class="rs-where">${where}</span></div>`;
    }).join('');
    const add=editor?`<button class="radd" title="Add shift" onclick="openShiftForm(null,'${jss(eng)}','${ds}')">＋</button>`:'';
    return `<td class="rota-cell ${ds===todayStr?'rota-today':''}">${chips}${add}</td>`;
  };
  const engCell=eng=>`<td class="rota-eng"><span>${esc(eng)}</span>${editor?`<button class="reng-del" title="Remove this engineer from the rota" onclick="deleteEngineerShifts('${jss(eng)}')">✕</button>`:''}</td>`;
  const rows=engs.map(eng=>`<tr>${engCell(eng)}${week.map(d=>cell(eng,d)).join('')}</tr>`).join('');
  const legend=(DATA.shiftTypes||[]).length?`<div class="rota-legend">${(DATA.shiftTypes||[]).map(t=>`<span><i style="background:${esc(t.color||'#38bdf8')}"></i> ${esc(t.name)} ${t.start_time?`<span class="muted">${esc(String(t.start_time).slice(0,5))}–${esc(String(t.end_time||'').slice(0,5))}</span>`:''}</span>`).join('')}</div>`:'';
  return sectionH('Shift Rota','Plan cover across shifts &amp; days'+(VIEW==='client'?' · provided by Mercury':''))+controls+
    `<div class="card rota-card"><div class="rota-scroll"><table class="rota"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>${legend}</div>`;
}

async function runPatternFill(){
  const eng=val('pf_eng'), typeId=val('pf_type'), from=val('pf_from'), to=val('pf_to'), mode=val('pf_mode');
  if(!eng){ msg('Choose an engineer.','err'); return; }
  if(!typeId){ msg('Choose a shift type.','err'); return; }
  if(!from||!to){ msg('Choose a date range.','err'); return; }
  const t=(DATA.shiftTypes||[]).find(x=>x.id===typeId); if(!t){ msg('Shift type not found.','err'); return; }
  const start=parseYmd(from), end=parseYmd(to);
  if(end<start){ msg('“To” must be after “From”.','err'); return; }
  const dows=[...document.querySelectorAll('.pf_dow:checked')].map(c=>Number(c.value));
  const onN=num('pf_on')||0, offN=num('pf_off')||0;
  const pid=(self.crypto&&crypto.randomUUID)?crypto.randomUUID():('pat-'+Date.now()+'-'+Math.random().toString(36).slice(2,8));
  const siteId=val('pf_site')||null;
  const rows=[]; let idx=0;
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    let include=false;
    if(mode==='weekdays'){ include=dows.includes((d.getDay()+6)%7); }
    else { const cyc=onN+offN; include = cyc>0 ? (idx%cyc)<onN : false; idx++; }
    if(include) rows.push({ client_id:CLIENT.id, engineer:eng, shift_date:ymd(d), shift_type_id:typeId,
      shift_name:t.name, start_time:t.start_time||null, end_time:t.end_time||null, color:t.color||'#38bdf8',
      site_id:siteId, pattern_id:pid });
  }
  if(!rows.length){ msg('That pattern produced no shifts — check your selection.','err'); return; }
  if(rows.length>400){ msg('That would create '+rows.length+' shifts — please narrow the range.','err'); return; }
  const btn=el('pfSave'); btn.disabled=true; btn.textContent=`Creating ${rows.length}…`;
  const {error}=await sb.from('rota_shifts').insert(rows);
  if(error){ btn.disabled=false; btn.textContent='Create shifts'; msg('Could not create: '+error.message,'err'); return; }
  msg(`✓ Created ${rows.length} shifts.`,'ok'); await loadClientData(); setTimeout(()=>{ closeForm(); go('rota'); },500);
}

/* ================= COMPLIANCE COCKPIT (admin) =================
   Every expiry & right-to-work status across internal engineers,
   agency workers, suppliers and client documents — in one place. */
function complianceItems(){
  const out=[];
  const push=(o)=>{ const st=cardStatus(o.expiry); if(o.c==null) o.c=st.c; if(o.label==null) o.label=st.label; o.days = o.expiry? Math.ceil((new Date(o.expiry)-Date.now())/86400000) : null; out.push(o); };
  // internal competency cards (from team rosters)
  (HQDATA&&HQDATA.teams?HQDATA.teams:[]).forEach(t=>{ (Array.isArray(t.roster)?t.roster:[]).forEach(e=>{ if(!e||!e.name) return; (Array.isArray(e.cards)?e.cards:[]).forEach(c=>{ if(c&&c.type&&c.expiry) push({who:e.name,type:'Engineer',cat:'Card',subject:c.type,expiry:c.expiry,extra:''}); }); }); });
  // internal travel docs (engineer_hr)
  (ENGHR||[]).forEach(h=>{ const nm=h.full_name||'';
    if(h.a1_expiry) push({who:nm,type:'Engineer',cat:'A1 certificate',subject:'A1',expiry:h.a1_expiry,extra:''});
    if(h.medical_expiry) push({who:nm,type:'Engineer',cat:'Medical insurance',subject:h.medical_provider||'Medical',expiry:h.medical_expiry,extra:''});
    if(h.passport_expiry) push({who:nm,type:'Engineer',cat:'Passport',subject:'Passport',expiry:h.passport_expiry,extra:''});
  });
  // agency engineers (cards + travel + right-to-work)
  (SDATA.engineers||[]).forEach(e=>{ const sup=((SUPPLIERS||[]).find(s=>s.id===e.supplier_id)||{}).name||'Agency';
    (Array.isArray(e.cards)?e.cards:[]).forEach(c=>{ if(c&&c.type&&c.expiry) push({who:e.full_name,type:'Agency',cat:'Card',subject:c.type,expiry:c.expiry,extra:sup}); });
    if(e.a1_expiry) push({who:e.full_name,type:'Agency',cat:'A1 certificate',subject:'A1',expiry:e.a1_expiry,extra:sup});
    if(e.medical_expiry) push({who:e.full_name,type:'Agency',cat:'Medical insurance',subject:e.medical_provider||'Medical',expiry:e.medical_expiry,extra:sup});
    if(e.passport_expiry) push({who:e.full_name,type:'Agency',cat:'Passport',subject:'Passport',expiry:e.passport_expiry,extra:sup});
    if(e.rtw_status==='Expired') out.push({who:e.full_name,type:'Agency',cat:'Right to work',subject:'RTW expired',expiry:null,extra:sup,c:'red',label:'expired',days:null});
    else if(e.rtw_status==='Not checked') out.push({who:e.full_name,type:'Agency',cat:'Right to work',subject:'RTW not checked',expiry:null,extra:sup,c:'amber',label:'check',days:null});
  });
  // supplier company documents
  (SDATA.documents||[]).forEach(d=>{ const sup=((SUPPLIERS||[]).find(s=>s.id===d.supplier_id)||{}).name||'Supplier'; if(d.expiry) push({who:sup,type:'Supplier',cat:d.doc_type||'Document',subject:d.label,expiry:d.expiry,extra:''}); });
  // client documents
  (HQDATA&&HQDATA.documents?HQDATA.documents:[]).forEach(d=>{ if(d.expiry_date) push({who:clientName(d.client_id),type:'Client doc',cat:d.doc_type||'Document',subject:d.title,expiry:d.expiry_date,extra:''}); });
  // sort: red first, then soonest expiry
  const rank={red:0,amber:1,green:2,grey:3};
  return out.sort((a,b)=> (rank[a.c]-rank[b.c]) || ((a.days==null?9e9:a.days)-(b.days==null?9e9:b.days)));
}
/* Compliance status for a single agency engineer (used to gate assignments) */
function engComplianceStatus(engId){
  const e=(SDATA.engineers||[]).find(x=>x.id===engId); const block=[],warn=[];
  if(!e) return {block,warn};
  if(e.rtw_status==='Expired') block.push('Right to work has expired');
  else if(e.rtw_status==='Not checked') warn.push('Right to work not checked');
  (Array.isArray(e.cards)?e.cards:[]).forEach(c=>{ if(!c||!c.expiry) return; const st=cardStatus(c.expiry); if(st.c==='red') block.push((c.type||'Card')+' expired'); else if(st.c==='amber') warn.push((c.type||'Card')+' expiring soon'); });
  [['A1',e.a1_expiry],['Medical insurance',e.medical_expiry],['Passport',e.passport_expiry]].forEach(p=>{ if(!p[1]) return; const st=cardStatus(p[1]); if(st.c==='red') warn.push(p[0]+' expired'); else if(st.c==='amber') warn.push(p[0]+' expiring soon'); });
  return {block,warn};
}

  const expired=all.filter(x=>x.c==='red').length;
  const soon30=all.filter(x=>x.c==='amber'&&x.days!=null&&x.days<=30).length || all.filter(x=>x.c==='amber').length;
  const amber=all.filter(x=>x.c==='amber').length;
  const k=`<div class="grid kpis" style="margin-bottom:14px">
    ${kpi(expired?'r':'g','⛔','Expired',expired,'')}
    ${kpi(amber?'a':'g','⏳','Expiring soon',amber,'')}
    ${kpi('c','🗂','Items tracked',all.length,'')}
    ${kpi('g','✅','Valid',all.filter(x=>x.c==='green').length,'')}
  </div>`;
  let rows=all.slice();
  if(COMP.view==='attention') rows=rows.filter(x=>x.c==='red'||x.c==='amber');
  else if(COMP.view==='expired') rows=rows.filter(x=>x.c==='red');
  else if(COMP.view==='expiring') rows=rows.filter(x=>x.c==='amber');
  if(COMP.type!=='all') rows=rows.filter(x=>x.type===COMP.type);
  const vBtn=(v,l)=>`<button class="edit-btn ${COMP.view===v?'on':''}" onclick="compSet('view','${v}')">${l}</button>`;

  const dfmt=w=>{ if(!w) return '—'; const d=new Date(w); return isNaN(d)?'—':d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); };
  const daysTxt=x=>{ if(x.days==null) return x.label?('· '+x.label):''; if(x.days<0) return 'expired '+(-x.days)+'d ago'; if(x.days===0) return 'expires today'; return 'in '+x.days+'d'; };
  const table = rows.length ? `<div class="card" style="overflow-x:auto"><table class="tbl"><thead><tr><th>Status</th><th>Who</th><th>Item</th><th>Category</th><th>Type</th><th>Expiry</th></tr></thead><tbody>

  return k+controls+table;

/* Consolidated competency cards for a registry engineer — merges the
   cards stored on their record with any found live on team rosters. */
function engRegCards(e){
  const map={};
  const add=c=>{ if(!c||!c.type) return; const k=String(c.type).trim().toLowerCase(); const ex=map[k];
    if(!ex || (c.file&&!ex.file) || (c.expiry&&(!ex.expiry||String(c.expiry)>String(ex.expiry)))) map[k]={type:c.type,number:c.number||'',expiry:c.expiry||null,file:c.file||null}; };
  (Array.isArray(e.cards)?e.cards:[]).forEach(add);
  const key=String(e.full_name||'').trim().toLowerCase();
  (HQDATA&&HQDATA.teams?HQDATA.teams:[]).forEach(t=>{ (Array.isArray(t.roster)?t.roster:[]).forEach(r=>{ if(r&&String(r.name||'').trim().toLowerCase()===key){ (Array.isArray(r.cards)?r.cards:[]).forEach(add); } }); });
  return Object.values(map);
}

/* Async: uploads any newly-attached cert copies, then returns the roster JSON. */
async function collectRosterAsync(){
  const out=[];
  for(const b of [...document.querySelectorAll('#rosWrap .engblock')]){
    const name=b.querySelector('.eg-n').value.trim(); if(!name) continue;
    const role=b.querySelector('.eg-r').value.trim(), phone=b.querySelector('.eg-p').value.trim();
    const cards=[];
    for(const c of [...b.querySelectorAll('.cardrow-w')]){
      const type=c.querySelector('.cd-t').value.trim(); if(!type) continue;
      const number=c.querySelector('.cd-n').value.trim();
      const expiry=c.querySelector('.cd-e').value||null;
      let file=c.getAttribute('data-file')||'';
      const fi=c.querySelector('.cd-f');
      if(fi&&fi.files&&fi.files[0]){
        const f=fi.files[0];
        const ext=((f.name||'').split('.').pop()||'pdf').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,5)||'pdf';
        const sn=(name+'-'+type).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40);
        const u=await uploadBlob(f, `competency/${CLIENT.id}/${sn}_${Date.now()}.${ext}`, f.type);
        if(u) file=u;
      }
      cards.push({type,number,expiry,file:file||null});
    }
    out.push({name,role,phone,cards});
  }
  return out;
}

function gatherInstallPayload(){
  return { site_id:val('ir_site')||null, discipline:val('ir_disc'), engineer:engMultiCollect('ir_eng')||null,
    report_date:val('ir_date')||null, progress_pct:num('ir_prog'), plan_flag:val('ir_flag')||null,
    planned_days:num('ir_pd'), actual_days:num('ir_ad'), hours_worked:num('ir_hours'), headcount:num('ir_head'),
    work_completed:val('ir_done')||null, materials:val('ir_mat')||null, issues:val('ir_iss')||null, next_steps:val('ir_next')||null,
    loto_permit: el('ir_loto')?el('ir_loto').checked:undefined, loto_ref:val('ir_lotoref')||null,
    handback_signed: el('ir_handback')?el('ir_handback').checked:undefined, rme_signoff:val('ir_rme')||null };
}
function prefillInstallFromPayload(p){
  const set=(id,v)=>{ const e=el(id); if(e&&v!=null) e.value=v; };
  set('ir_site',p.site_id); set('ir_disc',p.discipline); engMultiSet('ir_eng',p.engineer); set('ir_date',p.report_date);
  set('ir_prog',p.progress_pct); set('ir_flag',p.plan_flag); set('ir_pd',p.planned_days); set('ir_ad',p.actual_days);
  set('ir_hours',p.hours_worked); set('ir_head',p.headcount); set('ir_done',p.work_completed); set('ir_mat',p.materials);
  set('ir_iss',p.issues); set('ir_next',p.next_steps); set('ir_lotoref',p.loto_ref); set('ir_rme',p.rme_signoff);
  if(el('ir_loto')) el('ir_loto').checked=!!p.loto_permit;
  if(el('ir_handback')) el('ir_handback').checked=!!p.handback_signed;
}
function draftEmpty(p){ return !(p.work_completed||p.materials||p.issues||p.next_steps||p.site_id); }
let DRAFT_TIMER=null;
function startInstallAutosave(){ if(DRAFT_TIMER) clearInterval(DRAFT_TIMER); DRAFT_TIMER=setInterval(()=>{ try{ if(el('ir_done')) saveInstallDraft(false); }catch(e){} }, 20000); }
function stopInstallAutosave(){ if(DRAFT_TIMER){ clearInterval(DRAFT_TIMER); DRAFT_TIMER=null; } }
async function saveInstallDraft(explicit){
  if(!CLIENT || !SESSION) return;
  const p=gatherInstallPayload();
  if(draftEmpty(p) && !CAPTURE.draftId){ if(explicit) msg('Add some detail first, then save the draft.','err'); return; }
  const btn=el('irDraft'); if(explicit&&btn){ btn.disabled=true; btn.textContent='Saving…'; }
  // on an explicit save, persist any newly-taken photos so they survive too
  if(explicit && (CAPTURE.photos.length)){ try{ const base=`${CLIENT.slug}/install/DRAFT-${CAPTURE.draftId||Date.now()}`; for(let i=0;i<CAPTURE.photos.length;i++){ const u=await uploadDataUrl(CAPTURE.photos[i], `${base}/p${Date.now()}_${i}.jpg`); if(u){ CAPTURE.existing=(CAPTURE.existing||[]).concat([u]); } } CAPTURE.photos=[]; renderThumbs(); }catch(e){} }
  const title=(p.work_completed||'').slice(0,60) || 'Install report (draft)';
  const row={ created_by:SESSION.user.id, client_id:CLIENT.id, report_type:'install', site_id:p.site_id||null, title:title, payload:p, media:(CAPTURE.existing||[]), updated_at:new Date().toISOString() };
  try{
    if(CAPTURE.draftId){ await sb.from('report_drafts').update(row).eq('id',CAPTURE.draftId); }
    else { const {data,error}=await sb.from('report_drafts').insert(row).select().maybeSingle(); if(!error&&data) CAPTURE.draftId=data.id; }
    if(explicit){ msg('✓ Draft saved — resume it any time from Install Reports.','ok'); try{ await loadClientData(); }catch(e){} }
  }catch(e){ if(explicit) msg('Could not save draft: '+(e.message||e),'err'); }
  if(explicit&&btn){ btn.disabled=false; btn.textContent='💾 Save draft'; }
}
async function discardDraft(id){ if(!confirm('Discard this draft report? This cannot be undone.')) return; try{ await sb.from('report_drafts').delete().eq('id',id); }catch(e){ alert('Could not discard: '+(e.message||e)); return; } await loadClientData(); go('installs'); }
function resumeInstallDraft(id){ const d=(DATA.drafts||[]).find(x=>x.id===id); if(!d) return; openInstallForm(null,false,d); }
async function submitInstall(reportId){
  if(!val('f_client')){ msg('Please choose the client this report is for.','err'); const c=el('f_client'); if(c)c.focus(); return; }
  const sid=val('ir_site'); if(!sid){ msg('Please choose a site.','err'); return; }
  if(!val('ir_done')){ msg('Please note what was completed today.','err'); return; }
  const btn=el('irSave'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  const issues=val('ir_iss');
  const row={ client_id:CLIENT.id, site_id:sid, discipline:val('ir_disc'), engineer:engMultiCollect('ir_eng')||null,
    report_date:val('ir_date')||new Date().toISOString().slice(0,10), progress_pct:num('ir_prog')||0,
    plan_flag:val('ir_flag')||null, planned_days:num('ir_pd'), actual_days:num('ir_ad'),
    hours_worked:num('ir_hours'), headcount:num('ir_head'),
    work_completed:val('ir_done'), materials:val('ir_mat')||null, issues:issues||null,
    delay_reason:issues||null, next_steps:val('ir_next')||null };
  // Pipp-only confirmations (harmless for others; only added when present on the form)
  if(isPipp()){ row.loto_permit = el('ir_loto')?el('ir_loto').checked:null; row.loto_ref=val('ir_lotoref')||null; row.handback_signed = el('ir_handback')?el('ir_handback').checked:null; row.rme_signoff=val('ir_rme')||null; }
  const stripPipp=(o)=>{ const c=Object.assign({},o); delete c.loto_permit; delete c.loto_ref; delete c.handback_signed; delete c.rme_signoff; return c; };
  const schemaErr=(e)=>e && /find the '.*' column|schema cache|column .* does not exist/i.test(e.message||'');
  let savedId=reportId;
  if(reportId){ let {error}=await sb.from('progress_reports').update(row).eq('id',reportId);
    if(schemaErr(error)){ const r2=await sb.from('progress_reports').update(stripPipp(row)).eq('id',reportId); error=r2.error; }
    if(error){ btn.disabled=false; btn.textContent='Save changes'; msg('Could not save: '+error.message,'err'); return; } }
  else { row.submitted_at=new Date().toISOString();
    let {data:ins,error}=await sb.from('progress_reports').insert(row).select().maybeSingle();
    if(schemaErr(error)){ const r2=await sb.from('progress_reports').insert(stripPipp(row)).select().maybeSingle(); ins=r2.data; error=r2.error; }
    if(error){ btn.disabled=false; btn.textContent='Post report'; msg('Could not save: '+error.message,'err'); return; }
    savedId=ins?ins.id:null; }
  // photos & videos -> storage + media + link (best-effort, never blocks the save)
  if(CAPTURE.photos.length || (CAPTURE.videos||[]).length){ btn.textContent='Uploading media…'; const ref='INSTALL-'+(savedId||Date.now());
    const urls=await uploadCapture('install', savedId, `${CLIENT.slug}/install/${ref}`);
    if(urls.length&&savedId){ const merged=(CAPTURE.existing||[]).concat(urls); try{ await sb.from('progress_reports').update({media_links:merged}).eq('id',savedId); }catch(e){} }
  } else if((CAPTURE.existing||[]).length && savedId){ try{ await sb.from('progress_reports').update({media_links:CAPTURE.existing}).eq('id',savedId); }catch(e){} }
  // if this came from a draft, clear it now that it is submitted
  stopInstallAutosave();
  if(CAPTURE.draftId){ try{ await sb.from('report_drafts').delete().eq('id',CAPTURE.draftId); }catch(e){} CAPTURE.draftId=null; }
  msg('✓ Saved — the client portal now shows this update.','ok');
  if(!reportId) await notifyClient(CLIENT.id,'report','New install report added','installs','A new install progress report is on your dashboard.');
  await loadClientData(); setTimeout(()=>{ closeForm(); go('installs'); }, 700);
}
async function deleteInstall(reportId){
  if(!confirm('Delete this install report? This cannot be undone.')) return;
  const {error}=await sb.from('progress_reports').delete().eq('id',reportId);
  if(error){ alert('Could not delete: '+error.message); return; }
  await loadClientData(); closeForm(); go('installs');
}

function engineerDatalist(){
  const set=new Set(DATA.engineers||[]);
  (ENGREG||[]).forEach(e=>{ if(e&&e.full_name&&e.status!=='Left') set.add(e.full_name); });   // master registry
  (DATA.teams||[]).forEach(t=>(Array.isArray(t.roster)?t.roster:[]).forEach(e=>{ if(e&&e.name) set.add(e.name); }));
  (DATA.sites||[]).forEach(s=>(Array.isArray(s.crew)?s.crew:[]).forEach(c=>{ if(c&&c.name) set.add(c.name); }));
  return `<datalist id="engList">${[...set].sort().map(n=>`<option value="${esc(n)}">`).join('')}</datalist>`;
}
/* ---- multiple engineers on a report -------------------------------
   Renders a list of engineer inputs with an "add" button. The FIRST input
   keeps the base id (so existing required-field checks still work), and
   all names are joined with ", " into the single engineer field so every
   view, list, PDF and the HQ feed shows them with no schema change. */
function engRowHtml(base, name, first){
  return `<div class="engrow" style="display:flex;gap:6px;margin-bottom:5px"><input class="${base}_i" ${first?`id="${base}"`:''} list="engList" value="${esc(name||'')}" placeholder="Engineer name" style="flex:1">${first?'':`<button type="button" class="crew-rm" title="Remove" onclick="this.closest('.engrow').remove()">✕</button>`}</div>`;
}
function engMultiField(base, value){
  const names=String(value||'').split(',').map(s=>s.trim()).filter(Boolean); if(!names.length) names.push('');
  return `<div class="engmulti" id="${base}_wrap">${names.map((n,i)=>engRowHtml(base,n,i===0)).join('')}<button type="button" class="addbtn" style="margin-top:2px;font-size:12px" onclick="engMultiAdd('${base}')">＋ Add another engineer</button></div>`;
}
function engMultiAdd(base){ const w=el(base+'_wrap'); if(!w) return; const btn=w.querySelector('.addbtn'); const div=document.createElement('div'); div.className='engrow'; div.style.cssText='display:flex;gap:6px;margin-bottom:5px'; div.innerHTML=`<input class="${base}_i" list="engList" placeholder="Engineer name" style="flex:1"><button type="button" class="crew-rm" title="Remove" onclick="this.closest('.engrow').remove()">✕</button>`; w.insertBefore(div, btn); const inp=div.querySelector('input'); if(inp) inp.focus(); }
function engMultiCollect(base){ const w=el(base+'_wrap'); if(!w){ return val(base); } const names=[...w.querySelectorAll('.'+base+'_i')].map(i=>String(i.value||'').trim()).filter(Boolean); return names.join(', '); }
function engMultiSet(base, value){ const w=el(base+'_wrap'); if(!w){ const e=el(base); if(e) e.value=value||''; return; } const names=String(value||'').split(',').map(s=>s.trim()).filter(Boolean); if(!names.length) return; const btn=w.querySelector('.addbtn'); [...w.querySelectorAll('.engrow')].forEach(r=>r.remove()); names.forEach((n,i)=>{ const div=document.createElement('div'); div.className='engrow'; div.style.cssText='display:flex;gap:6px;margin-bottom:5px'; div.innerHTML=engRowHtml(base,n,i===0).replace(/^<div[^>]*>/,'').replace(/<\/div>$/,''); w.insertBefore(div, btn); }); }

/* photos */
function setupPhoto(){
  el('photoInput').addEventListener('change', e=>{
    [...e.target.files].forEach(file=>{
      if((file.type||'').startsWith('video')){
        CAPTURE.videos=CAPTURE.videos||[]; CAPTURE.videos.push(file); renderThumbs();
      } else {
        const r=new FileReader();
        r.onload=ev=>{ CAPTURE.photos.push(ev.target.result); renderThumbs(); };
        r.readAsDataURL(file);
      }
    });
    e.target.value='';
  });
}
function renderThumbs(){
  const w=el('photoWrap'); if(!w) return;
  w.querySelectorAll('.thumb,.vthumb').forEach(t=>t.remove());
  CAPTURE.photos.forEach(src=>{ const img=document.createElement('img'); img.className='thumb'; img.src=src; w.insertBefore(img, w.firstChild); });
  (CAPTURE.videos||[]).forEach(file=>{ const d=document.createElement('div'); d.className='vthumb'; let nm=esc(file.name||'video'); if(nm.length>14)nm=nm.slice(0,12)+'…'; d.innerHTML='🎬<span>'+nm+'</span>'; w.insertBefore(d, w.firstChild); });
}
/* signature */
function setupSig(){
  const c=el('sigpad'); if(!c) return;
  c.width=c.offsetWidth*2; c.height=c.offsetHeight*2; const ctx=c.getContext('2d'); ctx.scale(2,2); ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#0f2033';
  let drawing=false, has=false;
  const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return [t.clientX-r.left, t.clientY-r.top];};
  const start=e=>{e.preventDefault();drawing=true;has=true;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(x,y);};
  const move=e=>{if(!drawing)return;e.preventDefault();const[x,y]=pos(e);ctx.lineTo(x,y);ctx.stroke();};
  const end=()=>{drawing=false; if(has) CAPTURE.sig=c.toDataURL('image/png');};
  c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  c.addEventListener('touchstart',start);c.addEventListener('touchmove',move);c.addEventListener('touchend',end);
}
function clearSig(){ const c=el('sigpad'); if(c){ c.getContext('2d').clearRect(0,0,c.width,c.height); CAPTURE.sig=null; } }
/* gps */
function captureGps(){
  const n=el('gpsNote'); if(!navigator.geolocation){ if(n)n.textContent='📍 Location not available on this device'; return; }
  navigator.geolocation.getCurrentPosition(
    p=>{ CAPTURE.gps={lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy)}; if(n)n.textContent=`📍 Location captured (±${CAPTURE.gps.acc}m)`; },
    ()=>{ if(n)n.textContent='📍 Location permission declined (report will still save)'; },
    {enableHighAccuracy:true,timeout:8000}
  );
}

/* upload a dataURL to Supabase Storage, return public URL (or null on failure) */
async function uploadBlob(blob, path, contentType){
  try{
    const {error}=await sb.storage.from('evidence').upload(path, blob, {contentType:contentType||blob.type||'application/octet-stream', upsert:true});
    if(error){ console.warn('upload failed',error); return null; }
    return sb.storage.from('evidence').getPublicUrl(path).data.publicUrl;
  }catch(e){ console.warn('upload error',e); return null; }
}
/* Upload a sensitive file to the PRIVATE 'secure' bucket. Returns the PATH
   (not a public URL) — the file is only reachable via a short-lived signed
   link created for a permitted user. */
async function uploadSecure(blob, path, contentType){
  try{
    const {error}=await sb.storage.from('secure').upload(path, blob, {contentType:contentType||blob.type||'application/octet-stream', upsert:true});
    if(error){ console.warn('secure upload failed',error); return null; }
    return path;
  }catch(e){ console.warn('secure upload error',e); return null; }
}
/* Open a sensitive file via a short-lived signed URL (60s). RLS decides
   whether the current user is allowed — if not, they get nothing. */
async function viewSecure(path){
  if(!path) return;
  try{
    const {data,error}=await sb.storage.from('secure').createSignedUrl(path, 60);
    if(error||!data||!data.signedUrl){ alert('Sorry — that document could not be opened (you may not have access).'); return; }
    window.open(data.signedUrl,'_blank','noopener');
  }catch(e){ alert('Sorry — that document could not be opened.'); }
}
/* A green/amber/red chip for an EU-travel item based on status + expiry. */
function travelChip(label, status, expiry){
  let c='grey', txt=status||'—';
  if(status==='Not required'){ c='grey'; }
  else if(status==='Held'||status==='Valid'){ c=cardStatus(expiry).c==='red'?'red':(cardStatus(expiry).c==='amber'?'amber':'green'); if(expiry) txt=(cardStatus(expiry).label?('Held · '+cardStatus(expiry).label):'Held'); }
  else if(status==='Applied'){ c='amber'; }
  else if(status==='Expired'){ c='red'; }
  return `<span class="chip ${c}">${esc(label)}: ${esc(txt)}</span>`;
}
async function uploadDataUrl(dataUrl, path){
  try{ const blob=await (await fetch(dataUrl)).blob(); return await uploadBlob(blob, path, blob.type||'image/jpeg'); }
  catch(e){ console.warn('upload error',e); return null; }
}
/* Uploads all captured photos AND videos for a report, records them in the
   media gallery (with image/video type), and returns the list of URLs. */
async function uploadCapture(reportType, reportId, pathBase){
  const urls=[];
  for(let i=0;i<CAPTURE.photos.length;i++){
    const u=await uploadDataUrl(CAPTURE.photos[i], `${pathBase}/photo${i+1}.jpg`);
    if(u){ urls.push(u); try{ await sb.from('media').insert({client_id:CLIENT.id,report_type:reportType,report_id:reportId||null,file_url:u,media_type:'image'}); }catch(e){} }
  }
  const vids=CAPTURE.videos||[];
  for(let i=0;i<vids.length;i++){
    const f=vids[i]; let ext=((f.name||'').split('.').pop()||'mp4').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,5)||'mp4';
    const u=await uploadBlob(f, `${pathBase}/video${i+1}.${ext}`, f.type||'video/mp4');
    if(u){ urls.push(u); try{ await sb.from('media').insert({client_id:CLIENT.id,report_type:reportType,report_id:reportId||null,file_url:u,media_type:'video'}); }catch(e){} }
  }
  return urls;
}

/* SUBMIT — DB row first (never lost), then best-effort media + PDF */
async function submitForm(type, editId){
  const f=FORMS[type];
  if(!val('f_client')){ msg('Please choose the client this report is for.','err'); const c=el('f_client'); if(c)c.focus(); return; }
  for(const id of f.required){ if(!val(id)){ msg('Please fill in the required fields.','err'); el(id).focus(); return; } }
  const btn=el('saveBtn'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  // ---- EDIT MODE (admins): update the existing report in place ----
  if(editId){
    const erow=f.collect();
    if(type==='callout'){ erow.customer_sign_name=val('f_signname')||null; }
    const {error}=await sb.from(f.table).update(erow).eq('id',editId);
    if(error){ btn.disabled=false; btn.textContent='Save changes'; msg('Could not save: '+error.message,'err'); return; }
    // append any newly-added photos/videos (existing media is kept)
    if(CAPTURE.photos.length || (CAPTURE.videos||[]).length){ btn.textContent='Uploading media…'; const eref=(f.prefix+'-EDIT-'+editId); const urls=await uploadCapture(type, editId, `${CLIENT.slug}/${eref}`);
      if(type==='shift' && urls.length){ try{ const merged=(CAPTURE.existing||[]).concat(urls); await sb.from(f.table).update({media_links:merged}).eq('id',editId); }catch(e){} } }
    msg('✓ Report updated.','ok'); await loadClientData();
    setTimeout(()=>{ closeForm(); go(type==='callout'?'callouts':'shifts'); }, 700); return;
  }
  const ref=f.prefix+'-'+Date.now();
  const row=Object.assign(f.collect(), {
    client_id: CLIENT.id,
    submitted_at: new Date().toISOString(),
    latitude: CAPTURE.gps?CAPTURE.gps.lat:null,
    longitude: CAPTURE.gps?CAPTURE.gps.lng:null
  });
  if(type==='callout'){ row.job_number=ref; row.customer_sign_name=val('f_signname')||null; }
  // 1) Save the row — this is the source of truth.
  //    Resilient: if a table is missing an optional column (e.g. latitude on
  //    some report tables), strip the optional fields and retry so the
  //    engineer's report is never lost.
  let {data:ins,error}=await sb.from(f.table).insert(row).select().maybeSingle();
  if(error && /find the '.*' column|schema cache|column .* does not exist/i.test(error.message||'')){
    const core=Object.assign({},row); delete core.latitude; delete core.longitude; delete core.map_link;
    const r2=await sb.from(f.table).insert(core).select().maybeSingle(); ins=r2.data; error=r2.error;
  }
  if(error){ btn.disabled=false; btn.textContent='Submit report'; msg('Could not save: '+error.message,'err'); return; }
  const id=ins?ins.id:null;
  // 2) Best-effort: upload photos & videos + signature, generate PDF
  btn.textContent='Uploading media…';
  const photoUrls=await uploadCapture(type, id, `${CLIENT.slug}/${ref}`);
  let sigUrl=null; if(CAPTURE.sig) sigUrl=await uploadDataUrl(CAPTURE.sig, `${CLIENT.slug}/${ref}/signature.png`);
  // PDF
  btn.textContent='Building PDF…';
  let pdfUrl=null;
  try{ const pdfData=buildPdf(type, row, ref); if(pdfData) pdfUrl=await uploadDataUrl(pdfData, `${CLIENT.slug}/${ref}/report.pdf`); }catch(e){ console.warn('pdf failed',e); }
  // 3) write back the links
  try{ const patch={}; if(type==='callout'){patch.internal_notes=(row.internal_notes||'')+(sigUrl?'':'');} patch.pdf_url=pdfUrl; if(type==='shift'){patch.media_links=photoUrls;} if(type==='callout'){patch.map_link=CAPTURE.gps?`https://maps.google.com/?q=${CAPTURE.gps.lat},${CAPTURE.gps.lng}`:null;} await sb.from(f.table).update(patch).eq('id',id); }catch(e){}
  msg('✓ Report saved'+(pdfUrl?' — PDF generated':'')+'.','ok');
  await notifyClient(CLIENT.id, 'report', (type==='callout'?'New call-out report':'New shift report')+' added', type==='callout'?'callouts':'shifts', 'A new report has been added to your dashboard.');
  await loadClientData();
  setTimeout(()=>{ closeForm(); go(type==='callout'?'callouts':'shifts'); }, 900);
}

/* branded PDF via jsPDF */
function buildPdf(type, row, ref){
  if(!window.jspdf) return null;
  const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:'pt',format:'a4'});
  const W=595; let y=48;
  doc.setFillColor(10,14,22); doc.rect(0,0,W,70,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.text('MERCURY', 40, 38);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(180,200,220); doc.text('Automated Solutions — Operations', 40, 54);
  doc.setTextColor(15,32,51); doc.setFont('helvetica','bold'); doc.setFontSize(15);
  y=100; doc.text((type==='callout'?'Call-Out Report':'Shift Report'), 40, y);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(90,107,128);
  doc.text(`${CLIENT.name}   ·   Ref ${ref}   ·   ${new Date().toLocaleString('en-GB')}`, 40, y+16);
  doc.setDrawColor(225,235,243); doc.line(40,y+26,W-40,y+26); y+=44;
  const line=(k,v)=>{ if(v==null||v==='')return; doc.setFont('helvetica','bold');doc.setTextColor(90,107,128);doc.setFontSize(9);doc.text(k.toUpperCase(),40,y);
    doc.setFont('helvetica','normal');doc.setTextColor(15,32,51);doc.setFontSize(11);
    const lines=doc.splitTextToSize(String(v),W-80); doc.text(lines,40,y+14); y+=14+lines.length*13+8; };
  const site=(DATA.sites.find(s=>s.id===row.site_id)||{});
  line('Site', site.code?`${site.code} — ${site.city||''}`:'General');
  line('Engineer', row.engineer);
  if(type==='callout'){ line('Priority',row.priority); line('Status',row.status); line('Asset',row.asset_reference); line('Fault',row.fault_description); line('Work carried out',row.work_carried_out); line('Parts used',row.parts_used); if(row.downtime_minutes!=null)line('Downtime (mins)',row.downtime_minutes); line('Follow-up required',row.follow_up_required?'Yes':'No'); }
  else { line('Shift',row.shift); line('Hours worked',row.hours_worked); line('Status',row.status); line('Work completed',row.work_completed); line('Issues / handover',row.issues); line('Near-miss',row.near_miss); }
  if(CAPTURE.gps) line('Location', `${CAPTURE.gps.lat.toFixed(5)}, ${CAPTURE.gps.lng.toFixed(5)} (±${CAPTURE.gps.acc}m)`);
  // photos
  CAPTURE.photos.slice(0,4).forEach((p,i)=>{ if(y>720){doc.addPage();y=48;} try{ doc.addImage(p,'JPEG',40+(i%2)*media_w(),y,media_w()-10,110); if(i%2===1)y+=120; }catch(e){} });
  if(CAPTURE.photos.length%2===1)y+=120;
  // signature
  if(CAPTURE.sig){ if(y>660){doc.addPage();y=48;} doc.setFont('helvetica','bold');doc.setTextColor(90,107,128);doc.setFontSize(9);doc.text('CUSTOMER SIGNATURE',40,y); try{doc.addImage(CAPTURE.sig,'PNG',40,y+8,200,80);}catch(e){} if(type==='callout'&&row.customer_sign_name){doc.setFont('helvetica','normal');doc.setTextColor(15,32,51);doc.setFontSize(10);doc.text(row.customer_sign_name,40,y+104);} }
  doc.setTextColor(150,160,175);doc.setFontSize(8);doc.text('Generated by Mercury Operations Platform',40,820);
  return doc.output('datauristring');
}

async function submitLinkLogin(clientId){
  const email=val('ll_email').trim(); if(!email){ msg('Please enter the login email.','err'); return; }
  const btn=el('llSave'); btn.disabled=true; btn.textContent='Linking…'; msg('','');
  let prof=null;
  try{ const r=await sb.from('profiles').select('id,email').ilike('email',email).limit(1); prof=(r.data&&r.data[0])||null; }catch(e){}
  if(!prof){ btn.disabled=false; btn.textContent='🔗 Link login'; msg('No account found for that email yet. Create it first in Supabase → Authentication → Users, then try again.','err'); return; }
  const {error}=await sb.from('profiles').update({role:'client', client_id:clientId}).eq('id',prof.id);
  if(error){ btn.disabled=false; btn.textContent='🔗 Link login'; msg('Could not link: '+error.message,'err'); return; }
  msg('✓ Linked. That login now sees only this client.','ok');
  await loadLogins(); setTimeout(()=>{ closeForm(); renderShell(); go('clients'); }, 800);
}
async function deleteClient(clientId){
  const c=CLIENTS.find(x=>x.id===clientId)||{};
  if(!confirm('Delete "'+(c.name||'this client')+'" and ALL of its sites, reports, photos, documents and schedule?\n\nThis cannot be undone. Any login attached will be unlinked (the Supabase account itself stays — delete that in Supabase if you no longer need it).')) return;
  try{
    await sb.from('profiles').update({client_id:null}).eq('client_id',clientId);
    const {error}=await sb.from('clients').delete().eq('id',clientId);
    if(error){ alert('Could not delete: '+error.message); return; }
  }catch(e){ alert('Could not delete: '+(e.message||e)); return; }
  if(CLIENT && CLIENT.id===clientId) CLIENT=CLIENTS.find(x=>x.id!==clientId)||null;
  await refreshClients(); await loadLogins(); closeForm(); renderShell(); go('clients');
}

async function submitClient(clientId){
  const name=val('c_name'); if(!name){ msg('Please enter a client name.','err'); return; }
  let slug=val('c_slug')||slugify(name);
  const btn=el('cliSave'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  let logo=val('c_logo')||null;
  const lf=el('c_logofile');
  if(lf && lf.files && lf.files[0]){ btn.textContent='Uploading logo…'; try{ const f=lf.files[0]; const path='logos/'+slug+'_'+Date.now()+'.'+(f.name.split('.').pop()||'png'); const {error}=await sb.storage.from('evidence').upload(path,f,{upsert:true}); if(!error) logo=sb.storage.from('evidence').getPublicUrl(path).data.publicUrl; }catch(e){} }
  const row={ name:name, slug:slug, brand_color:val('c_color')||'#38bdf8', programme_title:val('c_prog')||null, system_ref:val('c_sys')||null, logo_url:logo, is_active:true };
  const res = clientId ? await sb.from('clients').update(row).eq('id',clientId) : await sb.from('clients').insert(row);
  if(res.error){ btn.disabled=false; btn.textContent=clientId?'Save changes':'Add client'; msg('Could not save: '+res.error.message+(res.error.message.includes('duplicate')?' (that short code is taken — change the slug)':''),'err'); return; }
  msg('✓ Saved.','ok'); await refreshClients(); setTimeout(()=>{ closeForm(); renderShell(); go('clients'); },600);
}

   COMMAND CENTRE  —  live ops: SLA timers, map, today board, check-in
   =================================================================== */
const SLA_HOURS={'Priority 1':4,'Priority 2':8,'Priority 3':24,'Priority 4':72};
function isOpenCallout(r){ const s=String(r.status||'').toLowerCase(); return !(s.includes('complete')||s.includes('closed')); }
function slaState(r){
  const tgt=SLA_HOURS[r.priority]||24;
  const start=new Date(r.submitted_at||r.call_date||Date.now()).getTime();
  const deadline=start+tgt*3600*1000;
  const remMs=deadline-Date.now();
  const remH=remMs/3600000;
  let cls='ok', label;
  if(remMs<0){ cls='breach'; label='BREACHED '+fmtDur(-remMs)+' ago'; }
  else { if(remH<=tgt*0.25) cls='warn'; label=fmtDur(remMs)+' left'; }
  return {cls,label,tgt};
}
function fmtDur(ms){ const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000); if(h>=24){const d=Math.floor(h/24);return d+'d '+(h%24)+'h';} return h>0?(h+'h '+m+'m'):(m+'m'); }

function pageCommand(){
  const opens=(DATA.callouts||[]).filter(isOpenCallout);
  const ranked=opens.map(r=>({r,s:slaState(r)})).sort((a,b)=>{
    const order={breach:0,warn:1,ok:2}; return order[a.s.cls]-order[b.s.cls];
  });
  const breaches=ranked.filter(x=>x.s.cls==='breach').length;
  const p1=opens.filter(r=>r.priority==='Priority 1').length;
  const today=new Date().toISOString().slice(0,10);
  const reportsToday=[...(DATA.callouts||[]),...(DATA.shifts||[]),...(DATA.daily||[])].filter(r=>String(r.submitted_at||'').slice(0,10)===today).length;
  const geoPts=geoPoints();
  const k=`<div class="grid kpis">
    ${kpi('c','🔧','Open Call-Outs',opens.length,'')}
    ${kpi(breaches?'r':'g','⏱','SLA Breaches',breaches,'')}
    ${kpi(p1?'r':'g','🚨','Priority 1 Open',p1,'')}
    ${kpi('c','📍','Located Activity',geoPts.length,'')}
    ${kpi('v','✓','Reports Today',reportsToday,'')}</div>`;
  const slaList = ranked.length
    ? ranked.map(({r,s})=>`<div class="sla ${s.cls}"><div class="ref">${esc(r.job_number||'—')}</div>
        <div class="bd"><div class="t">${esc(String(r.fault_description||'').slice(0,70)||'Call-out')}</div>
        <div class="m">${esc(r.priority||'')} · ${esc(r.engineer||'unassigned')} · ${esc(r.status||'')}</div></div>
        <div class="timer">${priChip(r.priority)}<br>${s.label}</div></div>`).join('')
    : '<div class="empty"><div class="big">✅</div><b>No open call-outs</b><div style="font-size:13px;margin-top:4px">All clear for this client.</div></div>';
  return `<div class="sechead"><h3>🛰 Command Centre</h3><span class="sub">${esc(CLIENT.name)} · live</span><span class="line"></span><button class="checkin" onclick="checkIn()">📍 Check in here</button></div>
    ${k}
    <div class="row2" style="margin-top:16px">
      <div class="card"><h4>⏱ Open Call-Outs &amp; SLA</h4><div class="csub">Sorted by urgency · timers vs priority target</div>${slaList}</div>
      <div class="card"><h4>🗺 Activity Map</h4><div class="csub">Recent report &amp; check-in locations</div>
        ${geoPts.length?'<div id="opsMap"></div>':'<div class="empty"><div class="big">🗺</div><b>No located activity yet</b><div style="font-size:13px;margin-top:4px">Reports filed with location turned on will pin here.</div></div>'}</div>
    </div>
    <div class="card" style="margin-top:16px"><h4>👷 Engineers — last known location</h4><div class="csub">From check-ins &amp; located reports · times are when last seen, not continuous tracking</div>${lastSeenHtml()}</div>
    <div class="card" style="margin-top:16px"><h4>📡 Live Activity</h4><div class="csub">Most recent across this client</div>
      ${(function(){const f=buildFeed();return f.length?`<div class="list">${f.map(x=>`<div class="litem"><div class="av">${esc(x.who)}</div><div class="bd"><div class="t">${esc(x.title)}</div><div class="m">${esc(x.msg)}</div></div><div class="when">${esc(x.when)}</div></div>`).join('')}</div>`:'<div class="empty"><div class="big">📡</div><b>No activity yet</b></div>';})()}
    </div>`;
}
