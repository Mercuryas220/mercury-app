function pageCheckins(){
  if(!CLIENT) return emptyState('📍','Choose a client','Pick a client to see where our engineers are on their sites.');
  const pts=geoPoints();
  return `<div class="sechead"><h3>📍 Site Check-ins</h3><span class="sub">${esc(CLIENT.name)} · where our engineers are on your sites</span><span class="line"></span></div>
    <div class="card"><h4>🗺 Activity Map</h4><div class="csub">Recent check-in &amp; located report locations</div>
      ${pts.length?'<div id="opsMap"></div>':'<div class="empty"><div class="big">🗺</div><b>No located activity yet</b><div style="font-size:13px;margin-top:4px">When our engineers check in on site or file a report with location on, it appears here.</div></div>'}</div>
    <div class="card" style="margin-top:16px"><h4>👷 Engineers — last known location</h4><div class="csub">From check-ins &amp; located reports · times are when last seen, not continuous tracking</div>${lastSeenHtml()}</div>`;
}
function geoPoints(){
  const pts=[];
  const add=(r,type)=>{ const la=Number(r.latitude),ln=Number(r.longitude); if(la&&ln&&!isNaN(la)&&!isNaN(ln)) pts.push({la,ln,type,who:r.engineer||r.supervisor||'',when:r.submitted_at||r.event_at,txt:r.fault_description||r.work_completed||r.current_status||type}); };
  (DATA.callouts||[]).forEach(r=>add(r,'Call-out'));
  (DATA.daily||[]).forEach(r=>add(r,'Daily report'));
  (DATA.gps||[]).forEach(r=>add(r,'Check-in'));
  return pts;
}
function initOpsMap(){
  if(typeof L==='undefined') return;
  const elm=el('opsMap'); if(!elm) return;
  const pts=geoPoints(); if(!pts.length) return;
  try{
    const map=L.map(elm,{scrollWheelZoom:false}).setView([pts[0].la,pts[0].ln],6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);
    const grp=[];
    pts.forEach(p=>{ const m=L.marker([p.la,p.ln]).addTo(map); m.bindPopup(`<b>${esc(p.type)}</b><br>${esc(p.who||'')}<br>${esc(String(p.txt||'').slice(0,60))}`); grp.push([p.la,p.ln]); });
    if(grp.length>1) map.fitBounds(grp,{padding:[30,30]});
  }catch(e){ console.warn('map failed',e); }
}
const CHECKIN_STATUSES=['On Site','Travelling','On Break','Off Duty'];
function lastSeen(){
  const by={};
  (DATA.gps||[]).forEach(g=>{ const who=g.engineer||'Unknown'; const t=+new Date(g.event_at||0);
    if(!by[who] || t>by[who]._t){ by[who]={engineer:who,status:g.current_status||'Checked in',site:g.site_name,when:g.event_at,la:Number(g.latitude),ln:Number(g.longitude),notes:g.notes,_t:t}; } });
  return Object.values(by).sort((a,b)=>b._t-a._t);
}
function lastSeenHtml(){
  const ls=lastSeen();
  if(!ls.length) return `<div class="empty"><div class="big">📍</div><b>No check-ins yet</b><div style="font-size:13px;margin-top:4px">Engineers tap “Check in here” on this page to log where they are. You’ll see their last known location and status here.</div></div>`;
  const sc=s=>s==='On Site'?'green':s==='Travelling'?'cyan':s==='On Break'?'amber':s==='Off Duty'?'grey':'cyan';
  return `<div class="list">${ls.map(e=>{
    const ll=(e.la&&e.ln&&!isNaN(e.la)&&!isNaN(e.ln))?`<a class="pdf-link" href="https://www.google.com/maps?q=${e.la},${e.ln}" target="_blank">Map ↗</a>`:'';
    return `<div class="litem"><div class="av">${esc((e.engineer||'··').split(' ').map(w=>w[0]).join('').slice(0,2))}</div>
      <div class="bd"><div class="t">${esc(e.engineer)} <span class="chip ${sc(e.status)}" style="margin-left:4px">${esc(e.status)}</span></div>
      <div class="m">${e.site?esc(e.site)+' · ':''}${esc(String(e.notes||'').slice(0,50))}</div></div>
      <div class="when">${esc(rel(e.when))} ${ll}</div></div>`;
  }).join('')}</div>`;
}

async function submitCheckIn(){
  const btn=el('ciSave'); btn.disabled=true; btn.textContent='Locating…'; msg('','');
  const base={client_id:CLIENT.id, engineer:val('ci_eng')||(PROFILE.full_name||PROFILE.email), current_status:val('ci_status')||'On Site', action_type:'Check-in', site_name:val('ci_site')||null, notes:val('ci_note')||null, event_at:new Date().toISOString()};
  const save=async(lat,ln)=>{
    try{ const {error}=await sb.from('gps_events').insert(Object.assign({},base,{latitude:lat,longitude:ln}));
      if(error){ msg('Could not save: '+error.message,'err'); btn.disabled=false; btn.textContent='Check in'; return; }
      msg('✓ Checked in.','ok'); await loadClientData(); setTimeout(()=>{ closeForm(); go('command'); },600);
    }catch(e){ msg('Could not save: '+(e.message||e),'err'); btn.disabled=false; btn.textContent='Check in'; }
  };
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>save(p.coords.latitude,p.coords.longitude), ()=>{ msg('Saved without location (permission declined).','ok'); save(null,null); }, {enableHighAccuracy:true,timeout:8000});
  } else { save(null,null); }
}

    quote:[['Quote title',rec.title],['End customer',rec.end_customer],['Reference',rec.opportunity_ref],['Discipline',rec.discipline],['System',rec.system_type],['Scope',rec.scope],['Quantity / scale',rec.quantity_scale],['Site',rec.site_address],['Quote needed by',rec.quote_needed_by||rec.deadline],['Target start',rec.required_start],['Drawings',rec.drawings_available],['Budget / target',rec.budget_indication],['Contact',[rec.contact_name,rec.contact_phone,rec.contact_email].filter(Boolean).join(' · ')],['Status',rec.status],['Notes',rec.notes]]
  }[type]||[];
  try{
    const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:'pt',format:'a4'}); const W=595,H=842; let y=0;
    doc.setFillColor(10,14,22); doc.rect(0,0,W,118,'F');
    try{ doc.addImage(MLOGO,'PNG',40,30,58,58); }catch(e){}
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(19); doc.text(titleMap[type]||'Report',112,56);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(180,200,220);
    doc.text(`${CLIENT?CLIENT.name:''}${siteName?('  ·  '+siteName):''}  ·  ${new Date(rec.submitted_at||rec.created_at||Date.now()).toLocaleDateString('en-GB')}`,112,76);
    y=150;
    const line=(k,v)=>{ if(v==null||v==='')return; doc.setFont('helvetica','bold');doc.setTextColor(90,107,128);doc.setFontSize(9);doc.text(String(k).toUpperCase(),40,y);
      doc.setFont('helvetica','normal');doc.setTextColor(15,32,51);doc.setFontSize(11); const ls=doc.splitTextToSize(textOnly(String(v)),W-80); doc.text(ls,40,y+14); y+=14+ls.length*13+8; if(y>H-90){doc.addPage();y=48;} };
    F.forEach(f=>line(f[0],f[1]));
    // photos linked to this report (images only — PDFs can't embed video)
    const photos=(DATA.media||[]).filter(m=>m.report_id===id && m.file_url && !isVideoMedia(m)).slice(0,4);
    for(let i=0;i<photos.length;i++){ const du=await urlToDataUrl(photos[i].file_url); if(!du)continue; if(y>H-150){doc.addPage();y=48;} const col=i%2; try{ doc.addImage(du, du.indexOf('png')>-1?'PNG':'JPEG', 40+col*((W-80)/2+10), y, (W-80)/2-5, 105);}catch(e){} if(col===1)y+=115; }
    doc.setTextColor(150,160,175);doc.setFontSize(8);doc.text('Generated by Mercury Operations Platform · '+new Date().toLocaleString('en-GB'),40,H-26);
    doc.save((type)+'-'+(rec.job_number||rec.title||id).toString().replace(/[^a-z0-9]/gi,'_').slice(0,30)+'.pdf');
  }catch(e){ alert('Could not build PDF: '+(e.message||e)); }
}

function docExpiry(d){
  if(!d.expiry_date) return {cls:'grey',label:'No expiry'};
  const days=Math.ceil((new Date(d.expiry_date)-Date.now())/86400000);
  if(days<0) return {cls:'red',label:'Expired '+(-days)+'d ago'};
  if(days<=30) return {cls:'amber',label:'Expires in '+days+'d'};
  return {cls:'green',label:'Valid · expires '+String(d.expiry_date).slice(0,10)};
}

  const soon=docs.filter(d=>{if(!d.expiry_date)return false;const dd=Math.ceil((new Date(d.expiry_date)-Date.now())/86400000);return dd>=0&&dd<=30;}).length;
  const head=`<div class="sechead"><h3>📁 Documents</h3><span class="sub">${docs.length} on file${expired?` · ${expired} expired`:''}${soon?` · ${soon} expiring soon`:''}</span><span class="line"></span>${canAddDocs()?`<button class="addbtn" onclick="openDocForm()">＋ Add document</button>`:''}</div>`;

function pageProjectPlan(){
  const editor=isEditor(); const canAdd=canAddDocs();
  const docs=(DATA.documents||[]).filter(d=>(d.doc_class||'library')==='project');
  const head=`<div class="sechead"><h3>📐 Project Plan</h3><span class="sub">${docs.length} project file${docs.length===1?'':'s'} · drawings, minutes, toolbox talks &amp; more</span><span class="line"></span>${canAdd?`<button class="addbtn" onclick="openProjectDocForm()">＋ Add project file</button>`:''}</div>`;
  if(!docs.length) return head+emptyState('📐','No project files yet',canAdd?'Tap “Add project file” to upload drawings, kick-off packs, meeting minutes, toolbox talks, the programme, RAMS or handover documents — to a site or to the whole project.':'Project drawings, minutes, toolbox talks and other documents will appear here.');
  // optional site filter
  const sitesWith=[...new Set(docs.map(d=>d.site_id).filter(Boolean))];
  const filter=`<div class="fld" style="max-width:280px;margin-bottom:12px"><label>Filter by site</label><select id="pp_filter" onchange="renderProjectFilter()"><option value="">All files</option><option value="__cw">Client-wide only</option>${(DATA.sites||[]).filter(s=>sitesWith.includes(s.id)).map(s=>`<option value="${s.id}">${esc(s.code||s.city||'Site')}</option>`).join('')}</select></div>`;
  // group by category
  const cats=PROJECT_DOC_TYPES.filter(c=>docs.some(d=>(d.doc_type||'Other')===c));
  const other=docs.filter(d=>!PROJECT_DOC_TYPES.includes(d.doc_type||'Other'));
  const groups=cats.map(c=>{
    const list=docs.filter(d=>(d.doc_type||'Other')===c);
    return projGroupHtml(c,list,editor);
  }).join('') + (other.length?projGroupHtml('Other',other,editor):'');
  return head+filter+`<div id="ppGroups">${groups}</div>`;
}
function projGroupHtml(cat,list,editor){

/* ===================================================================
   ANALYTICS & INSIGHTS  (internal) — computed live from the data
   =================================================================== */
function analyticsData(){
  const co=DATA.callouts||[], sh=DATA.shifts||[];
  // by month
  const months={}; co.forEach(r=>{const m=String(r.submitted_at||r.call_date||'').slice(0,7); if(m)months[m]=(months[m]||0)+1;});
  const mKeys=Object.keys(months).sort().slice(-12);
  // priority
  const pri={}; co.forEach(r=>{const p=r.priority||'Unspecified'; pri[p]=(pri[p]||0)+1;});
  // top sites (repeat faults)
  const siteCount={}; co.forEach(r=>{ const s=(DATA.sites||[]).find(x=>x.id===r.site_id); const key=s?(s.code||s.city):(r.internal_notes?String(r.internal_notes).replace(/^.*Site:\s*/,'').slice(0,18):'Unassigned'); siteCount[key]=(siteCount[key]||0)+1; });
  const topSites=Object.entries(siteCount).sort((a,b)=>b[1]-a[1]).slice(0,7);
  // engineer activity
  const eng={}; co.forEach(r=>{if(r.engineer)eng[r.engineer]=(eng[r.engineer]||0)+1;}); sh.forEach(r=>{if(r.engineer)eng[r.engineer]=(eng[r.engineer]||0)+1;});
  const topEng=Object.entries(eng).sort((a,b)=>b[1]-a[1]).slice(0,8);
  // SLA: resolved within target (needs completed_time); else current open health
  let resolved=0, within=0;
  co.forEach(r=>{ const s=String(r.status||'').toLowerCase(); if((s.includes('complete')||s.includes('closed'))&&r.completed_time&&r.submitted_at){ resolved++; const hrs=(new Date(r.completed_time)-new Date(r.submitted_at))/3600000; if(hrs<=(SLA_HOURS[r.priority]||24)) within++; } });
  const opens=co.filter(isOpenCallout); const breaching=opens.filter(r=>slaState(r).cls==='breach').length;
  const slaPct = resolved? Math.round(within/resolved*100) : (opens.length? Math.round((opens.length-breaching)/opens.length*100) : 100);
  const slaLabel = resolved? `${within}/${resolved} resolved within target` : (opens.length? `${opens.length-breaching}/${opens.length} open within SLA`:'No call-outs');
  // kpis
  const downs=co.map(r=>Number(r.downtime_minutes)).filter(n=>!isNaN(n)&&n>0);
  const avgDown=downs.length?Math.round(downs.reduce((a,b)=>a+b,0)/downs.length):null;
  const followups=co.filter(r=>r.follow_up_required===true).length;
  const hours=sh.map(r=>Number(r.hours_worked)).filter(n=>!isNaN(n)); const totHours=hours.reduce((a,b)=>a+b,0);
  return {mKeys,months,pri,topSites,topEng,slaPct,slaLabel,kpis:{total:co.length,open:opens.length,avgDown,followups,shifts:sh.length,totHours}};
}

function hqPlanInner(){

  if(mode==='jobs'){ const jg=hqJobsGantt(); return headCard+jg.gantt+`</div>`+jg.detail; }
  const cols=hqPlanCols(mode,from,to);
  const colByKey={}; cols.forEach(c=>colByKey[c.key]=c);
  const agg={};
  const cellOf=(cid,ck)=>{ const c=agg[cid]||(agg[cid]={}); return c[ck]||(c[ck]={days:new Set(),eng:new Set(),sites:new Set(),shifts:0,prog:new Set()}); };
  // source 1: confirmed shift rota
  rota.forEach(r=>{ if(!r.shift_date) return; const x=+parseYmd(r.shift_date); if(x<fT||x>tT) return; const ck=hqBucketKey(mode,r.shift_date); if(!colByKey[ck]) return; const cell=cellOf(r.client_id,ck); cell.shifts++; cell.days.add(r.shift_date); if(r.engineer) cell.eng.add(r.engineer); const s=siteById[r.site_id]; cell.sites.add(s?(s.code||s.city||'Site'):'General'); });
  // source 2: programme / install windows (site planned_start..planned_end) — completed jobs are excluded (they live in Completed Works)
  sites.forEach(s=>{ if(!s.planned_start||!s.planned_end||!s.client_id) return; if(['Complete','Closed'].includes(String(s.status||''))) return; const ps=+parseYmd(s.planned_start), pe=+parseYmd(s.planned_end); if(pe<fT||ps>tT) return; cols.forEach(c=>{ if(pe>=c.t0 && ps<=c.t1){ cellOf(s.client_id,c.key).prog.add(s.code||s.city||'Site'); } }); });
  const clientIds=Object.keys(agg);
  if(!clientIds.length) return headCard+emptyState('📅','No planned work in this range','Nothing in any Shift Rota or programme for these dates. Use ‹ › or change the range to look at another period.')+`</div>`;
  const rotaMetric=cell=> mode==='day' ? (cell.eng.size||cell.shifts) : cell.days.size;
  let maxRota=1, maxProg=1; clientIds.forEach(cid=>Object.values(agg[cid]).forEach(cell=>{ const mv=rotaMetric(cell); if(mv>maxRota)maxRota=mv; if(cell.prog.size>maxProg)maxProg=cell.prog.size; }));
  const rows=clientIds.map(cid=>{ const cells=Object.values(agg[cid]); return {cid, rdays:cells.reduce((a,c)=>a+c.days.size,0), psites:new Set(cells.flatMap(c=>[...c.prog])).size}; }).sort((a,b)=> (b.rdays-a.rdays) || (b.psites-a.psites) || clientName(a.cid).localeCompare(clientName(b.cid)));
  const todayKey=hqBucketKey(mode,ymd(new Date()));
  const head=`<tr><th class="msticky">Client</th>${cols.map(c=>`<th class="${c.key===todayKey?'mnow':''}">${esc(c.label)}<div class="myr">${esc(c.sub)}</div></th>`).join('')}</tr>`;
  const body=rows.map(rw=>{ const cm=agg[rw.cid];
    const cells=cols.map(c=>{ const cell=cm[c.key]; if(!cell) return `<td class="mcell empty ${c.key===todayKey?'mnow':''}">·</td>`;
      const hasRota=cell.days.size>0, hasProg=cell.prog.size>0;
      const tipBits=[clientName(rw.cid), c.full];
      if(hasRota) tipBits.push('Shifts: '+cell.days.size+' day'+(cell.days.size===1?'':'s')+' · '+cell.eng.size+' eng ('+([...cell.eng].sort().join(', ')||'unassigned')+')');
      if(hasProg) tipBits.push('Programme: '+[...cell.prog].join(', '));
      const tip=tipBits.join(' · ');
      if(hasRota){ const inten=(0.22+0.78*(rotaMetric(cell)/maxRota)).toFixed(2); const big= mode==='day'? cell.eng.size : cell.days.size; const small= mode==='day'? '' : `<span>${cell.eng.size}👷</span>`;
        return `<td class="mcell ${c.key===todayKey?'mnow':''}" style="background:rgba(56,189,248,${inten})" title="${esc(tip)}"><b>${big}</b>${small}${hasProg?'<span class="pflag" title="Programme / install window">📐</span>':''}</td>`; }
      // programme-only cell
      const inten=(0.2+0.6*(cell.prog.size/maxProg)).toFixed(2);
      return `<td class="mcell progcell ${c.key===todayKey?'mnow':''}" style="background:rgba(168,85,247,${inten})" title="${esc(tip)}"><b>${cell.prog.size}</b><span>📐</span></td>`;
    }).join('');
    const tag=rw.rdays?`${rw.rdays}d`:''; const ptag=rw.psites?`${rw.psites}📐`:'';
    return `<tr onclick="enterClient('${rw.cid}')" style="cursor:pointer"><td class="msticky"><b>${esc(clientName(rw.cid))}</b><span class="muted" style="font-size:10px"> ${[tag,ptag].filter(Boolean).join(' · ')}</span></td>${cells}</tr>`;
  }).join('');
  const grid=`<div class="mgrid-wrap"><table class="mgrid">${head}${body}</table></div>
    <div class="legend"><span><i style="background:rgba(56,189,248,.85)"></i> ${mode==='day'?'Confirmed shifts — engineers on site':'Confirmed shifts — days planned'}</span><span><i style="background:rgba(168,85,247,.8)"></i> 📐 Programme / install window — sites on site</span><span>darker = busier</span><span>hover a cell for detail · click a client to open</span></div>`;
  const detRows=[];
  rows.forEach(rw=>{ const cm=agg[rw.cid]; cols.forEach(c=>{ const cell=cm[c.key]; if(!cell) return; const engs=[...cell.eng].sort(); const hasRota=cell.days.size>0, hasProg=cell.prog.size>0;
    const type=hasRota&&hasProg?'<span class="chip cyan">Shifts</span> <span class="chip violet">Programme</span>':hasRota?'<span class="chip cyan">Shifts</span>':'<span class="chip violet">Programme</span>';
    const siteList=[...new Set([...cell.sites,...cell.prog])].map(s=>esc(s)).join(', ');
    const who=engs.length?engs.map(e=>`<span class="chip cyan" style="margin:1px 2px">${esc(e)}</span>`).join(''):(hasProg?'<span class="muted">install window — no shifts yet</span>':'<span class="muted">unassigned</span>');
    detRows.push(`<tr onclick="enterClient('${rw.cid}')" style="cursor:pointer"><td><b>${esc(clientName(rw.cid))}</b></td><td>${esc(c.full)}</td><td>${type}</td><td>${siteList}</td><td>${cell.days.size||'—'}</td><td>${who}</td></tr>`); }); });
  const detail=`<div class="card" style="margin-top:16px"><h4>📋 Planned work — detail</h4><div class="csub">Shifts and programme windows in the selected range · click a row to open the client</div>
    <table><thead><tr><th>Client</th><th>${mode==='month'?'Month':mode==='week'?'Week of':'Date'}</th><th>Type</th><th>Site(s)</th><th>Shift days</th><th>Engineers / status</th></tr></thead><tbody>${detRows.join('')}</tbody></table></div>`;
  return headCard+grid+`</div>`+detail;
}

/* ============ JOB STATUS — internal mobilisation / readiness (RAG) ============ */
const JOB_RISK=['Low','Medium','High'];
function siteDone(s){ return ['Complete','Closed'].includes(String(s.status||'')) || Number(s.progress_pct||0)>=100; }
/* AUTO job readiness — every live site/job is derived from your real data.
   No manual entry: labour comes from the rota/teams, documents from the
   document vault, dates from the site schedule. Stays RED until ready. */
function autoJobs(){
  if(!HQDATA) return [];
  const sites=(HQDATA.sites||[]).filter(s=>!siteDone(s));
  const rota=(HQDATA.rota||[]); const docs=(HQDATA.documents||[]);
  const overrides={}; (HQDATA.jobs||[]).forEach(j=>{ if(j.site_id) overrides[j.site_id]=j; });
  const engBySite={}; rota.forEach(r=>{ if(r.site_id&&r.engineer){ (engBySite[r.site_id]=engBySite[r.site_id]||new Set()).add(r.engineer); } });
  // supplier (temp-labour) engineers booked onto a site count toward the labour check too
  const supBySite={}; (SDATA.assignments||[]).forEach(a=>{ if(a.site_id && ['Booked','On site'].includes(a.status)){ const nm=supEngName(a.engineer_id); if(nm&&nm!=='—') (supBySite[a.site_id]=supBySite[a.site_id]||new Set()).add(nm+' (agency)'); } });
  const docByClient={}; docs.forEach(d=>{ docByClient[d.client_id]=(docByClient[d.client_id]||0)+1; });
  return sites.map(s=>{
    const o=overrides[s.id]||{};
    const oc=Array.isArray(o.checklist)?o.checklist:[];
    const manualAuto={}; oc.forEach(it=>{ if(it&&it.auto&&it.key) manualAuto[it.key]=!!it.done; });  // manually-actioned auto checks
    // engineers allocated = crew assigned on the site + anyone booked on the rota (deduped)
    const rotaNames=engBySite[s.id]?[...engBySite[s.id]]:[];
    const supNames=supBySite[s.id]?[...supBySite[s.id]]:[];
    const crewNames=Array.isArray(s.crew)?s.crew.map(c=>c&&(c.name||(typeof c==='string'?c:''))).map(x=>String(x||'').trim()).filter(Boolean):[];
    const engs=[...new Set([...crewNames,...rotaNames,...supNames])].sort();
    const reqN=Number(o.engineers_required||0);
    let labourData, labourInfo;
    if(reqN>0){ labourData = engs.length>=reqN; labourInfo = engs.length+' of '+reqN+' allocated'+(engs.length?(' — '+engs.join(', ')):''); }
    else { labourData = engs.length>0 || !!s.team_id; labourInfo = engs.length?engs.join(', '):(s.team_id?'Team assigned':''); }
    const hasDocs = (docByClient[s.client_id]||0)>0;
    const labourLabel = reqN>0 ? ('Engineers allocated ('+engs.length+'/'+reqN+')') : 'Engineers / labour allocated';
    const checks=[
      {key:'start', label:'Start date confirmed', auto:true, dataDone:!!s.planned_start, manualDone:!!manualAuto.start, done: !!s.planned_start||!!manualAuto.start},
      {key:'labour', label:labourLabel, auto:true, dataDone:labourData, manualDone:!!manualAuto.labour, done: labourData||!!manualAuto.labour, info: labourInfo, reqN:reqN },
      {key:'docs', label:'Documents in place (RAMS, risk assessment…)', auto:true, dataDone:hasDocs, manualDone:!!manualAuto.docs, done: hasDocs||!!manualAuto.docs}
    ];
    oc.forEach(it=>{ if(it&&it.label&&!it.auto) checks.push({label:it.label, done:!!it.done, custom:true}); });
    return {site:s, id:s.id, client_id:s.client_id, title:(s.code||s.city||'Site'), loc:[s.city,s.country].filter(Boolean).join(', '), start_date:s.planned_start||null, checks, engs, override:o, status_override:(o.status_override||null), risk:(o.risk||'Medium'), notes:o.notes||''};
  });
}
function jobStatus(j){
  const outstanding=(j.checks||[]).filter(c=>!c.done);
  const today=new Date(); today.setHours(0,0,0,0);
  const daysTo=j.start_date? Math.ceil((parseYmd(j.start_date)-today)/86400000) : null;
  if(j.status_override && ['green','amber','red'].includes(j.status_override)){ const m={green:'Ready (set)',amber:'Watch (set)',red:'Held (set)'}; return {cls:j.status_override,label:m[j.status_override],outstanding,daysTo,manual:true}; }
  if(!outstanding.length) return {cls:'green',label:'Ready to start',outstanding,daysTo};
  return {cls:'red',label:'Not ready — actions outstanding',outstanding,daysTo};   // stays red until everything is in place
}
function riskChip(r){ const c=r==='High'?'red':r==='Low'?'green':'amber'; return `<span class="chip ${c}">${esc(r||'Medium')}</span>`; }
function pageJobs(){
  if(PROFILE.role!=='admin') return emptyState('🔒','Admins only','Job Status is an internal mobilisation-control view for Mercury administrators.');

  const completed=(HQDATA.sites||[]).filter(siteDone).length;

  const notReady=withStat.filter(x=>x.s.cls!=='green').sort((a,b)=>{ const da=a.j.start_date||'9999-99', db=b.j.start_date||'9999-99'; return String(da).localeCompare(String(db)); });
  const ready=withStat.filter(x=>x.s.cls==='green').sort((a,b)=>{ const da=a.j.start_date||'9999-99', db=b.j.start_date||'9999-99'; return String(da).localeCompare(String(db)); });
  const k=`<div class="grid kpis">
    ${kpi('r','🔴','Not ready',notReady.length,'')}
    ${kpi('g','🟢','Ready to start',ready.length,'')}

  const header=`<div class="sechead"><h3>🚦 Job Status — Mobilisation Control</h3><span class="sub">Auto-built from your sites, rota &amp; documents · red until ready, then it drops off</span><span class="line"></span><button class="addbtn reportbtn" onclick="loadHQ().then(()=>go('jobs'))">↻ Refresh</button></div>`;
  const intro=`<div class="card" style="margin-bottom:14px"><div class="csub" style="margin:0">Every live job appears here automatically. It stays 🔴 <b>red</b> until the engineers are allocated, the documents are in place and the start date is confirmed — then it turns 🟢 <b>ready</b> and drops off the action list. When the works are finished it moves to <b onclick="go('completed')" style="cursor:pointer;color:var(--cyan)">Completed Works ↗</b>. Click any job to add site-specific checks (permits, materials, access…).</div></div>`;

    const out=s.outstanding.length?s.outstanding.slice(0,5).map(i=>`<span class="chip ${s.cls==='green'?'green':'red'}" style="margin:1px 2px">${esc(i.label)}</span>`).join('')+(s.outstanding.length>5?` <span class="muted">+${s.outstanding.length-5}</span>`:''):'<span class="chip green">All in place</span>';
    return `<tr onclick="openJobReadiness('${j.id}')" style="cursor:pointer">
      <td><span class="rag rag-${s.cls}"></span><b>${esc(s.label)}</b></td>
      <td><b>${esc(j.title)}</b><div class="muted" style="font-size:11px">${esc(clientName(j.client_id))}${j.loc?(' · '+esc(j.loc)):''}</div></td>
      <td>${esc(j.start_date?String(j.start_date).slice(0,10):'—')}</td>
      <td>${due}</td>
      <td><div class="pcell" style="min-width:70px"><div class="pbar ${done>=total&&total?'green':'cyan'}"><i style="width:${total?Math.round(done/total*100):0}%"></i></div><b>${done}/${total}</b></div></td>
      <td>${out}</td></tr>`; };
  const notReadyTable = notReady.length
    ? `<div class="card"><h4>🔴 Needs action before start</h4><div class="csub">Jobs that aren’t ready yet — soonest first</div><table><thead><tr><th>Status</th><th>Job</th><th>Start</th><th>Due in</th><th>Readiness</th><th>Outstanding</th></tr></thead><tbody>${notReady.map(rowOf).join('')}</tbody></table></div>`
    : `<div class="card">${emptyState('✅','Everything is ready','No live job has outstanding actions. New jobs appear here automatically as soon as a site or shift is created.')}</div>`;
  const readyBlock = ready.length
    ? `<details class="mfolder" style="margin-top:16px"><summary><span class="mf-name">🟢 Ready to start (${ready.length})</span><span class="mf-count">fully mobilised — kept here until the works complete</span></summary><div class="card" style="margin-top:10px"><table><thead><tr><th>Status</th><th>Job</th><th>Start</th><th>Due in</th><th>Readiness</th><th></th></tr></thead><tbody>${ready.map(rowOf).join('')}</tbody></table></div></details>`
    : '';
  if(!jobs.length) return header+k+emptyState('🚦','No live jobs yet','Jobs appear here automatically from your Sites &amp; Schedule and Shift Rota. Add a site (with a start date) or book a shift and it shows up instantly — red until it’s fully ready.');
  return header+k+intro+notReadyTable+readyBlock;
}
/* Optional: add job-specific checks / notes / a manual hold to a site.

      <div class="fld"><label>Engineers required for this job</label><input id="j_engreq" type="number" min="0" step="1" value="${o.engineers_required!=null?o.engineers_required:''}" placeholder="e.g. 4 — the labour check clears once this many are booked on the rota (leave blank for ‘any labour’)"></div>
      <div class="fld">
        <div class="crewhd"><label style="margin:0">Extra job-specific checks</label><button type="button" class="edit-btn" onclick="addJobCheck()">＋ Add item</button></div>
        <div id="jChecks"></div>

      </div>

        <div class="fld"><label>Risk if not ready</label><select id="j_risk">${riskOpts}</select></div>
      </div>

  </div>`;
  document.body.appendChild(wrap);

let JR_AUTO={}, JR_AUTODEFS=[];

function pageHQ(){

  const items=hqItems();
  const co=HQDATA.callouts.filter(isOpenCallout);
  const p1=co.filter(r=>r.priority==='Priority 1').length;

  const expired=HQDATA.documents.filter(d=>d.expiry_date&&new Date(d.expiry_date)<Date.now()).length;
  const expiring=HQDATA.documents.filter(d=>{if(!d.expiry_date)return false;const dd=Math.ceil((new Date(d.expiry_date)-Date.now())/86400000);return dd>=0&&dd<=30;}).length;
  const crit=HQDATA.risks.filter(r=>String(r.risk_level||'')==='Critical'&&!['Closed','Complete'].includes(String(r.status||''))).length;
  const newReq=(HQDATA.requests||[]).filter(r=>['New','Reviewing'].includes(String(r.status||''))).length;
  // per-client rollup
  const byClient={};
  const bump=(cid,k)=>{ byClient[cid]=byClient[cid]||{co:0,br:0,dx:0,rk:0}; byClient[cid][k]++; };
  co.forEach(r=>{ bump(r.client_id,'co'); if(slaState(r).cls==='breach')bump(r.client_id,'br'); });
  HQDATA.documents.forEach(d=>{ if(d.expiry_date){const dd=Math.ceil((new Date(d.expiry_date)-Date.now())/86400000); if(dd<=30)bump(d.client_id,'dx');} });
  HQDATA.risks.forEach(r=>{ if(String(r.risk_level||'')==='Critical'&&!['Closed','Complete'].includes(String(r.status||'')))bump(r.client_id,'rk'); });
  const activeClients=Object.keys(byClient).sort((a,b)=>(byClient[b].co+byClient[b].br+byClient[b].dx+byClient[b].rk)-(byClient[a].co+byClient[a].br+byClient[a].dx+byClient[a].rk));

  const openCoByClient={}; co.forEach(r=>{ openCoByClient[r.client_id]=(openCoByClient[r.client_id]||0)+1; });
  const openRkByClient={}; HQDATA.risks.forEach(r=>{ if(!['Closed','Complete'].includes(String(r.status||''))) openRkByClient[r.client_id]=(openRkByClient[r.client_id]||0)+1; });
  const crmByClient={}; crmStatusArr.forEach(s=>{ crmByClient[s.client_id]=s; });
  const pipeByClient={}; let pipeTotal=0; crmOppArr.forEach(o=>{ if(String(o.stage||'')!=='Lost' && String(o.stage||'')!=='Won'){ pipeByClient[o.client_id]=(pipeByClient[o.client_id]||0)+Number(o.value||0); pipeTotal+=Number(o.value||0); } });

  return `<div class="sechead"><h3>🏠 HQ — Business Overview</h3><span class="sub">Across all ${CLIENTS.length} clients · live</span><span class="line"></span><button class="addbtn reportbtn" onclick="loadHQ().then(()=>go('hq'))">↻ Refresh</button></div>

      <table><thead><tr><th>Client</th><th>Stage</th><th>Sites</th><th>Avg progress</th><th>Call-outs</th><th>Risks</th><th>Next follow-up</th><th>Pipeline</th></tr></thead><tbody>${portfolioRows}</tbody></table></div>

async function submitQuote(){
  if(!val('q_title')){ msg('Please add a short title.','err'); return; }
  if(!val('q_scope')){ msg('Please describe what needs pricing.','err'); return; }
  if(!val('q_needed')){ msg('Please add when you need the quote by.','err'); return; }
  const btn=el('qSave'); btn.disabled=true; btn.textContent='Submitting…'; msg('','');
  const ref='QUO-'+Date.now();
  const row={ client_id:CLIENT.id, kind:'quote', submitted_by:(PROFILE.full_name||PROFILE.email), title:val('q_title'),
    work_type:'Quotation', discipline:val('q_disc'), system_type:val('q_system'), priority:'Normal',
    end_customer:val('q_endcust')||null, opportunity_ref:val('q_ref')||null, quote_needed_by:val('q_needed')||null,
    scope:val('q_scope'), quantity_scale:val('q_qty'), site_address:val('q_address'),
    required_start:val('q_start')||null, deadline:val('q_needed')||null, drawings_available:val('q_drawings'),
    budget_indication:val('q_budget'), contact_name:val('q_contact'), contact_phone:val('q_phone'), contact_email:val('q_email'),
    notes:val('q_notes'), status:'New' };
  const {data:ins,error}=await sb.from('work_requests').insert(row).select().maybeSingle();
  if(error){ btn.disabled=false; btn.textContent='Submit quote request'; msg('Could not submit: '+error.message,'err'); return; }
  if(CAPTURE.photos.length || (CAPTURE.videos||[]).length){ btn.textContent='Uploading attachments…';
    const urls=await uploadCapture('quote', ins?ins.id:null, `${CLIENT.slug}/quotes/${ref}`);
    if(urls.length){ try{ await sb.from('work_requests').update({media_links:urls}).eq('id',ins.id); }catch(e){} }
  }
  msg('✓ Quote request submitted — we\'ll come back to you with a price.','ok');
  await loadClientData();
  setTimeout(()=>{ closeForm(); go('quotes'); }, 1100);
}
async function updateQuoteStatus(id,status){
  try{ await sb.from('work_requests').update({status}).eq('id',id);
    if(['Quoted','Accepted','Declined'].includes(status)){ const r=(DATA.requests||[]).find(x=>x.id===id)||{}; await notifyClient(CLIENT.id,'quote','Quote '+status.toLowerCase()+': '+(r.title||'your quote request'),'quotes', status==='Quoted'?'Your quote is ready to view.':status==='Accepted'?'We’ve accepted your quote request.':'There’s an update on your quote request.'); }
    await loadClientData(); if(HQDATA){await loadHQ();} go('quotes'); }
  catch(e){ alert('Could not update: '+(e.message||e)); }
}

function cardDatalist(){ return `<datalist id="cardTypes">${CARD_TYPES.map(c=>`<option value="${esc(c)}">`).join('')}</datalist>`; }
function cardStatus(expiry){ if(!expiry) return {c:'grey',label:''}; const d=(new Date(expiry)-Date.now())/86400000; if(isNaN(d)) return {c:'grey',label:''}; if(d<0) return {c:'red',label:'expired'}; if(d<60) return {c:'amber',label:'expiring'}; return {c:'green',label:''}; }
function discChip(d){ const c=d==='Electrical'?'amber':d==='Mechanical'?'cyan':'grey'; const i=d==='Electrical'?'⚡':d==='Mechanical'?'🔧':'🔩'; return `<span class="chip ${c}">${i} ${esc(d||'—')}</span>`; }

/* Permissions:
   - isEditor(): can MANAGE/edit/delete records — ADMINS ONLY.
   - canSubmit(): can ADD field reports (call-outs, shifts, install reports,
     check-ins) — admins AND engineers, in the internal view (never clients). */
function isEditor(){ return VIEW!=='client' && PROFILE.role==='admin'; }
function canSubmit(){ return VIEW!=='client' && (PROFILE.role==='admin' || PROFILE.role==='engineer'); }

async function submitDailyUpdate(){
  const sid=val('du_site'); if(!sid){ msg('Please choose a site.','err'); return; }
  if(!val('du_done')){ msg('Please note what was completed today.','err'); return; }
  const btn=el('duSave'); btn.disabled=true; btn.textContent='Posting…'; msg('','');
  const site=(DATA.sites||[]).find(x=>x.id===sid)||{};
  const prog=num('du_prog'); const status=val('du_status');
  const ref='PIPP-DAILY-'+Date.now();
  const row={ client_id:CLIENT.id, site_id:sid, report_date:val('du_date')||new Date().toISOString().slice(0,10),
    supervisor:val('du_sup'), status:status, progress_pct:prog, work_completed:val('du_done'),
    work_planned_tomorrow:val('du_tomorrow'), blockers:val('du_block'), hours_worked:num('du_hours'), submitted_at:new Date().toISOString() };
  const {data:ins,error}=await sb.from('daily_reports').insert(row).select().maybeSingle();
  if(error){ btn.disabled=false; btn.textContent='Post update'; msg('Could not post: '+error.message,'err'); return; }
  // update the site itself so dashboards + client portal reflect it
  try{ await sb.from('sites').update({progress_pct:prog!=null?prog:site.progress_pct, status:status}).eq('id',sid); }catch(e){}
  // photos & videos -> storage + media + link
  if(CAPTURE.photos.length || (CAPTURE.videos||[]).length){ btn.textContent='Uploading media…';
    const urls=await uploadCapture('daily', ins?ins.id:null, `${CLIENT.slug}/daily/${ref}`);
    if(urls.length){ try{ await sb.from('daily_reports').update({media_links:urls}).eq('id',ins.id); }catch(e){} }
  }
  // auto-raise a risk if there are blockers or the site is flagged
  if(val('du_block') || status==='Delayed' || status==='At Risk'){
    try{ await sb.from('risks').insert({client_id:CLIENT.id, site_id:sid, source_report_id:ins?ins.id:null,

      description: val('du_block')||('Site marked '+status), owner:'Programme Manager', status:'Open'}); }catch(e){}
  }
  msg('✓ Update posted — the client portal now shows '+ (prog!=null?prog+'%':'the latest')+'.','ok');
  await notifyClient(CLIENT.id,'report','New progress update'+(site.code?(' — '+site.code):''),'reports','A new site progress update is on your dashboard.');

}

async function collectCardsAsync(wrapId, whoName){
  const out=[]; const wrap=el(wrapId); if(!wrap) return out;
  const sid=(PROFILE.role==='admin'?(window.__manageSup||'admin'):(SUPPLIER&&SUPPLIER.id))||'sup';
  for(const c of [...wrap.querySelectorAll('.cardrow-w')]){
    const type=c.querySelector('.cd-t').value.trim(); if(!type) continue;

    let file=c.getAttribute('data-file')||'';
    const fi=c.querySelector('.cd-f');
    if(fi&&fi.files&&fi.files[0]){
      const f=fi.files[0];
      const ext=((f.name||'').split('.').pop()||'pdf').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,5)||'pdf';
      const sn=((whoName||'eng')+'-'+type).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40);
      const u=await uploadBlob(f, `supplier/${sid}/${sn}_${Date.now()}.${ext}`, f.type);

    }
    out.push({type,number,expiry,file:file||null});

function supScore(sid){
  const engs=(SDATA.engineers||[]).filter(e=>e.supplier_id===sid);
  const flags={green:0,amber:0,red:0,grey:0}; engs.forEach(e=>{ flags[engFlagFor(e)]++; });
  const asgActive=(SDATA.assignments||[]).filter(a=>a.supplier_id===sid && ['Booked','On site'].includes(a.status)).length;
  const tsPending=(SDATA.timesheets||[]).filter(t=>t.supplier_id===sid && t.status==='Submitted').length;
  const rs=(SDATA.ratings||[]).filter(r=>r.supplier_id===sid);
  const sc=[]; rs.forEach(r=>['quality','safety','timekeeping','attitude'].forEach(k=>{ if(r[k]!=null) sc.push(Number(r[k])); }));
  const avg=sc.length?(sc.reduce((a,b)=>a+b,0)/sc.length):null;
  return {engs:engs.length, flags, asgActive, tsPending, avg};
}

async function submitAssign(supplierId, editId){
  const engId=val('a_eng')||null;   // optional — blank means "supplier to fill"
  if(engId && !complianceGateOk(engId, supEngName(engId))) return;   // gate on tickets/right-to-work
  const btn=el('asgSave'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  const title=val('a_title')||null;
  const row={ supplier_id:supplierId, engineer_id:engId, client_id:val('a_client')||null, site_id:val('a_site')||null, site_label:val('a_loc')||null, title:title, start_date:val('a_start')||null, end_date:val('a_end')||null, shift:val('a_shift')||null, charge_rate:num('a_rate') };
  let error;
  if(editId){ row.status=val('a_status')||'Booked'; const rr=await sb.from('supplier_assignments').update(row).eq('id',editId); error=rr.error; }
  else { row.status='Booked'; const rr=await sb.from('supplier_assignments').insert(row); error=rr.error; }
  if(error){ btn.disabled=false; btn.textContent=editId?'Save changes':'🗓 Create assignment'; msg('Could not save: '+error.message,'err'); return; }
  // notify the supplier on their portal
  const where=[val('a_loc'), val('a_start')].filter(Boolean).join(' · ');
  await notifySupplier(supplierId, 'assignment',
    editId?('Job updated: '+(title||'Job')):(engId?('New job assigned: '+(title||'Job')):('New job to fill: '+(title||'Job'))),
    'sup_jobs',
    (engId?'Booked for '+supEngName(engId):'Please assign one of your engineers')+(where?(' — '+where):''));
  msg('✓ Saved & supplier notified.','ok');
  await loadSuppliers(); await reconcilePlacements(supplierId); await loadSuppliers();
  setTimeout(()=>{ closeForm(); openSupManage(supplierId); }, 800);
}

/* Tidy up: drop internal team placements for engineers with no live allocation */
async function reconcilePlacements(supplierId){
  const active=(SDATA.assignments||[]).filter(a=>['Booked','On site'].includes(a.status));
  const engIds=new Set((SDATA.engineers||[]).filter(e=>e.supplier_id===supplierId).map(e=>e.id));
  for(const p of (PLACEMENTS||[]).filter(x=>engIds.has(x.engineer_id))){
    const still=active.some(a=>a.engineer_id===p.engineer_id && a.client_id===p.client_id);
    if(still) continue;
    try{
      if(p.team_id){ const r=await sb.from('teams').select('id,roster').eq('id',p.team_id).maybeSingle(); if(r&&r.data){ const key=String(p.engineer_name||'').trim().toLowerCase(); const nros=(Array.isArray(r.data.roster)?r.data.roster:[]).filter(x=>String(x.name||'').trim().toLowerCase()!==key); await sb.from('teams').update({roster:nros}).eq('id',p.team_id); } }
      await sb.from('agency_placement').delete().eq('id',p.id);
    }catch(e){ console.warn('reconcile',e&&e.message); }
  }
}

async function collectHrFields(prefix, secureDir, whoName){
  async function up(inputId, tag){
    const fi=el(inputId); let path=fi?(fi.getAttribute('data-path')||''):'';
    if(fi&&fi.files&&fi.files[0]){ const f=fi.files[0]; const ext=((f.name||'').split('.').pop()||'pdf').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,5)||'pdf'; const sn=((whoName||'eng')+'-'+tag).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40); const p=await uploadSecure(f, `${secureDir}/${sn}_${Date.now()}.${ext}`, f.type); if(p) path=p; }
    return path||null;
  }
  return {
    home_address:val(prefix+'_addr')||null, date_of_birth:val(prefix+'_dob')||null, nationality:val(prefix+'_nat')||null,
    nok_name:val(prefix+'_nokn')||null, nok_relationship:val(prefix+'_nokr')||null, nok_phone:val(prefix+'_nokp')||null,
    a1_status:val(prefix+'_a1s')||null, a1_expiry:val(prefix+'_a1e')||null, a1_file:await up(prefix+'_a1f','a1'),
    medical_provider:val(prefix+'_medp')||null, medical_number:val(prefix+'_medn')||null, medical_expiry:val(prefix+'_mede')||null, medical_file:await up(prefix+'_medf','medical'),
    passport_number:val(prefix+'_passn')||null, passport_expiry:val(prefix+'_passe')||null, passport_file:await up(prefix+'_passf','passport'),
    hr_notes:val(prefix+'_hrnotes')||null
  };
}

  if(fi&&fi.files&&fi.files[0]){ const f=fi.files[0]; const ext=((f.name||'').split('.').pop()||'pdf').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,5)||'pdf'; const sn=label.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40); fileUrl=await uploadBlob(f, `supplier/${SUPPLIER.id}/docs/${sn}_${Date.now()}.${ext}`, f.type); }
  const row={ supplier_id:SUPPLIER.id, label:label, doc_type:val('d_type')||null, expiry:val('d_exp')||null, file_path:fileUrl };
  const {error}=await sb.from('supplier_documents').insert(row);
  if(error){ btn.disabled=false; btn.textContent='Add document'; msg('Could not save: '+error.message,'err'); return; }
  msg('✓ Saved.','ok'); await supRefresh('sup_docs');
}
async function deleteSupDoc(id){ if(!confirm('Delete this document?')) return; const {error}=await sb.from('supplier_documents').delete().eq('id',id); if(error){ alert('Could not delete: '+error.message); return; } await supRefresh('sup_docs'); }

/* ---------- ADMIN: RATE CARD (cost + sell, admin-only) ---------- */
function openRateCard(){
  if(PROFILE.role!=='admin') return;
  const trades=[...new Set([ ...RATECARD.filter(r=>r.scope==='trade').map(r=>r.trade), ...(SDATA.engineers||[]).map(e=>e.trade), 'Mechanical','Electrical','Multi-skilled','Labourer' ].filter(Boolean))].sort();
  const engs=(SDATA.engineers||[]).slice().sort((a,b)=>String(a.full_name||'').localeCompare(String(b.full_name||'')));
  const rcInput=(cls,v)=>`<input class="${cls}" type="number" min="0" step="0.01" value="${v!=null?esc(String(v)):''}" style="width:88px" placeholder="—">`;
  const tradeRows=trades.map(tr=>{ const ex=RATECARD.find(r=>r.scope==='trade' && String(r.trade||'').toLowerCase()===tr.toLowerCase()); return `<tr class="rc-row" data-scope="trade" data-trade="${esc(tr)}" data-id="${ex?ex.id:''}"><td><b>${esc(tr)}</b></td><td>${rcInput('rc-cost',ex?ex.cost_rate:null)}</td><td>${rcInput('rc-sell',ex?ex.sell_rate:null)}</td></tr>`; }).join('');
  const engRows=engs.map(e=>{ const ex=RATECARD.find(r=>r.scope==='engineer' && r.engineer_id===e.id); const res=resolveRates(e); return `<tr class="rc-row" data-scope="engineer" data-eng="${e.id}" data-id="${ex?ex.id:''}"><td>${esc(e.full_name)}<div class="muted" style="font-size:11px">${esc(e.trade||'—')} · card: ${res.cost!=null?gbp(res.cost):'—'}/${res.sell!=null?gbp(res.sell):'—'}</div></td><td>${rcInput('rc-cost',ex?ex.cost_rate:null)}</td><td>${rcInput('rc-sell',ex?ex.sell_rate:null)}</td></tr>`; }).join('');
  const wrap=document.createElement('div'); wrap.className='modal-bg'; wrap.id='modalBg';
  wrap.innerHTML=`<div class="modal" style="max-width:640px">
    <div class="modal-h"><h3>💷 Rate card</h3><button class="modal-x" onclick="closeForm()">✕</button></div>
    <div class="modal-b" id="rcBox">
      <div class="box see" style="background:var(--panel2);border:1px dashed var(--line2);border-radius:10px;padding:11px 13px;font-size:12px;color:var(--muted);margin-bottom:14px"><b>Cost</b> = what we pay the supplier (auto-fills jobs). <b>Sell</b> = what we charge the client. Sell &amp; margin are <b>admin-only</b> — never shown to suppliers, engineers or clients. Leave blank to inherit the trade rate.</div>
      <h4 style="margin:4px 0 6px">By trade — the card</h4>
      <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Trade</th><th>Cost £/hr</th><th>Sell £/hr</th></tr></thead><tbody>${tradeRows||'<tr><td colspan="3" class="muted">No trades yet</td></tr>'}</tbody></table></div>
      <div style="display:flex;gap:8px;margin:8px 0 16px"><input id="rc_newtrade" placeholder="Add a trade (e.g. Pipefitter)" style="flex:1"><button class="edit-btn" onclick="rcAddTrade()">＋ Add trade</button></div>
      <h4 style="margin:4px 0 6px">Per-engineer overrides</h4>
      <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Engineer</th><th>Cost £/hr</th><th>Sell £/hr</th></tr></thead><tbody>${engRows||'<tr><td colspan="3" class="muted">No engineers yet</td></tr>'}</tbody></table></div>
    </div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeForm()">Cancel</button><button class="btn" id="rcSave" onclick="saveRateCard()">Save rate card</button></div>
    <div class="savemsg" id="saveMsg" style="padding-bottom:14px"></div>
  </div>`;
  document.body.appendChild(wrap);
}
function rcAddTrade(){ const t=(val('rc_newtrade')||'').trim(); if(!t) return; const tb=document.querySelector('#rcBox table tbody'); if(!tb) return; tb.insertAdjacentHTML('beforeend',`<tr class="rc-row" data-scope="trade" data-trade="${esc(t)}" data-id=""><td><b>${esc(t)}</b></td><td><input class="rc-cost" type="number" min="0" step="0.01" style="width:88px" placeholder="—"></td><td><input class="rc-sell" type="number" min="0" step="0.01" style="width:88px" placeholder="—"></td></tr>`); el('rc_newtrade').value=''; }
async function saveRateCard(){
  const btn=el('rcSave'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  const rows=[...document.querySelectorAll('#rcBox .rc-row')];
  const ups=[], ins=[];
  rows.forEach(r=>{ const id=r.getAttribute('data-id')||''; const scope=r.getAttribute('data-scope'); const trade=r.getAttribute('data-trade')||null; const eng=r.getAttribute('data-eng')||null;
    const cv=r.querySelector('.rc-cost').value, sv=r.querySelector('.rc-sell').value;
    const c=cv===''?null:Number(cv), s=sv===''?null:Number(sv);
    if(id){ ups.push({id, cost_rate:c, sell_rate:s, updated_at:new Date().toISOString()}); }
    else if(c!=null||s!=null){ ins.push({scope, trade:scope==='trade'?trade:null, engineer_id:scope==='engineer'?eng:null, supplier_id:scope==='engineer'?((engById(eng)||{}).supplier_id||null):null, cost_rate:c, sell_rate:s}); }
  });
  try{
    for(const u of ups){ const id=u.id; const rest={cost_rate:u.cost_rate,sell_rate:u.sell_rate,updated_at:u.updated_at}; const {error}=await sb.from('rate_card').update(rest).eq('id',id); if(error) throw error; }
    if(ins.length){ const {error}=await sb.from('rate_card').insert(ins); if(error) throw error; }
  }catch(e){ btn.disabled=false; btn.textContent='Save rate card'; msg('Could not save: '+(e.message||e),'err'); return; }
  msg('✓ Rate card saved.','ok'); await supRefresh('suppliers');
}

/* ---------- ADMIN: PROFIT — Project P&L + supplier summary ---------- */
function pageFinance(){
  if(PROFILE.role!=='admin') return emptyState('🔒','Admins only','This area is for the Mercury team.');
  const approved=(SDATA.timesheets||[]).filter(t=>['Approved','Paid'].includes(t.status));
  const asgById={}; (SDATA.assignments||[]).forEach(a=>asgById[a.id]=a);
  // group approved timesheets by client (via assignment)
  const byClient={};
  approved.forEach(t=>{ const a=asgById[t.assignment_id]; const cid=(a&&a.client_id)||'__none'; const c=byClient[cid]||(byClient[cid]={cost:0,rev:0,hrs:0,hasSell:false}); const cost=tsCost(t); const rev=tsRevenue(t); c.cost+=cost; c.hrs+=tsHours(t); if(rev!=null){ c.rev+=rev; c.hasSell=true; } });
  // fixed project values by client
  const projByClient={}; (PROJFIN||[]).forEach(p=>{ const c=projByClient[p.client_id]||(projByClient[p.client_id]={sell:0,cost:0,items:[]}); c.sell+=Number(p.sell_value||0); c.cost+=Number(p.cost_budget||0); c.items.push(p); });
  const clientIds=[...new Set([...Object.keys(byClient).filter(x=>x!=='__none'), ...Object.keys(projByClient)])];
  // totals
  let tRev=0,tCost=0,tProj=0;
  clientIds.forEach(cid=>{ const b=byClient[cid]||{rev:0,cost:0}; const p=projByClient[cid]||{sell:0}; tRev+=b.rev; tCost+=b.cost; tProj+=p.sell; });
  const grandRev=tRev+tProj; const profit=grandRev-tCost; const marginPct=grandRev>0?Math.round(profit/grandRev*100):0;
  const k=`<div class="grid kpis" style="margin-bottom:14px">
    ${kpi('cyan','£','Revenue',gbp(grandRev).replace('£',''),'')}
    ${kpi('','🧾','Labour cost',gbp(tCost).replace('£',''),'')}
    ${kpi(profit>=0?'green':'red','📈','Profit',gbp(profit).replace('£',''),'')}
    ${kpi(profit>=0?'green':'red','%','Margin',marginPct,'%')}
  </div>`;
  const note=`<div class="note" style="margin-bottom:12px;font-size:12px">Revenue = hourly charge-out (from approved timesheets × the rate card’s sell rate) <b>plus</b> any fixed project values you record below. Labour cost = what you pay suppliers on approved timesheets. All figures here are admin-only.</div>`;
  const rows = clientIds.length ? clientIds.map(cid=>{ const b=byClient[cid]||{cost:0,rev:0,hrs:0,hasSell:false}; const p=projByClient[cid]||{sell:0}; const rev=b.rev+p.sell; const cost=b.cost; const pr=rev-cost; const mp=rev>0?Math.round(pr/rev*100):0;
      return `<tr><td><b>${esc(supClientName(cid)||'Unassigned')}</b></td><td>${b.hrs||0} h</td><td>${gbp(cost)}</td><td>${b.hasSell?gbp(b.rev):'<span class="muted">—</span>'}</td><td>${p.sell?gbp(p.sell):'<span class="muted">—</span>'}</td><td><b>${gbp(rev)}</b></td><td class="${pr>=0?'':'neg'}" style="color:${pr>=0?'var(--green)':'var(--red)'}"><b>${gbp(pr)}</b></td><td>${rev>0?mp+'%':'—'}</td></tr>`; }).join('')
    : `<tr><td colspan="8" class="muted" style="padding:14px">No approved timesheets or project values yet. Approve some timesheets and set sell rates on the rate card to see profit here.</td></tr>`;
  const pnl=`<div class="card" style="overflow-x:auto"><div class="sechead" style="margin-top:0"><h3 style="font-size:15px">Project P&amp;L</h3><span class="line"></span><button class="edit-btn" onclick="openProjValue()">＋ Add project value</button></div>
    <table class="tbl"><thead><tr><th>Client / project</th><th>Hours</th><th>Labour cost</th><th>Charge-out</th><th>Fixed value</th><th>Revenue</th><th>Profit</th><th>Margin</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  // supplier summary
  const supRows=(SUPPLIERS||[]).map(s=>{ const ts=approved.filter(t=>t.supplier_id===s.id); let cost=0,rev=0,hrs=0,hasSell=false; ts.forEach(t=>{ cost+=tsCost(t); hrs+=tsHours(t); const r=tsRevenue(t); if(r!=null){ rev+=r; hasSell=true; } }); const pr=rev-cost; return {s,cost,rev,hrs,hasSell,pr,n:ts.length}; }).filter(x=>x.n>0);
  const supSummary = supRows.length ? `<div class="card" style="overflow-x:auto;margin-top:16px"><h4 style="margin:0 0 10px">Supplier summary (approved timesheets)</h4>
    <table class="tbl"><thead><tr><th>Supplier</th><th>Timesheets</th><th>Hours</th><th>Cost</th><th>Charge-out</th><th>Margin</th></tr></thead><tbody>
    ${supRows.map(x=>`<tr><td><b>${esc(x.s.name)}</b></td><td>${x.n}</td><td>${x.hrs} h</td><td>${gbp(x.cost)}</td><td>${x.hasSell?gbp(x.rev):'<span class="muted">—</span>'}</td><td style="color:${x.pr>=0?'var(--green)':'var(--red)'}"><b>${x.hasSell?gbp(x.pr):'—'}</b></td></tr>`).join('')}
    </tbody></table></div>` : '';
  // recorded fixed project values list
  const pvList=(PROJFIN||[]).length?`<div class="card" style="margin-top:16px"><h4 style="margin:0 0 10px">Fixed project values</h4><table class="tbl"><thead><tr><th>Client</th><th>Project</th><th>Sell value</th><th>Cost budget</th><th></th></tr></thead><tbody>${PROJFIN.map(p=>`<tr><td>${esc(supClientName(p.client_id)||'—')}</td><td>${esc(p.label||'—')}</td><td><b>${gbp(p.sell_value||0)}</b></td><td>${p.cost_budget?gbp(p.cost_budget):'—'}</td><td><button class="edit-btn" style="color:var(--red)" onclick="deleteProjValue('${p.id}')">🗑</button></td></tr>`).join('')}</tbody></table></div>`:'';
  return `<div class="sechead"><h3>Profit &amp; Margins</h3><span class="sub">Admin-only · project P&amp;L and supplier profitability</span><span class="line"></span></div>`+k+note+pnl+supSummary+pvList;
}
function openProjValue(){
  const wrap=document.createElement('div'); wrap.className='modal-bg'; wrap.id='modalBg';
  wrap.innerHTML=`<div class="modal">
    <div class="modal-h"><h3>Add project value</h3><button class="modal-x" onclick="closeForm()">✕</button></div>
    <div class="modal-b">
      <div class="fld"><label>Client <span class="req">*</span></label><select id="pv_client"><option value="">— select client —</option>${(CLIENTS||[]).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div>
      <div class="fld"><label>Project / job label</label><input id="pv_label" placeholder="e.g. Leeds DC conveyor — fixed price"></div>
      <div class="frow">
        <div class="fld"><label>Sell value (£) <span class="req">*</span></label><input id="pv_sell" type="number" min="0" step="0.01" placeholder="agreed revenue"></div>
        <div class="fld"><label>Cost budget (£, optional)</label><input id="pv_cost" type="number" min="0" step="0.01" placeholder="planned cost"></div>
      </div>
      <div class="fld"><label>Notes</label><input id="pv_notes" placeholder="Optional"></div>
    </div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeForm()">Cancel</button><button class="btn" id="pvSave" onclick="submitProjValue()">Add value</button></div>
    <div class="savemsg" id="saveMsg" style="padding-bottom:14px"></div>
  </div>`;
  document.body.appendChild(wrap);
}
async function submitProjValue(){
  const cid=val('pv_client'); if(!cid){ msg('Please choose a client.','err'); return; }
  const sell=num('pv_sell'); if(sell==null){ msg('Please enter a sell value.','err'); return; }
  const btn=el('pvSave'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  const row={ client_id:cid, label:val('pv_label')||null, sell_value:sell, cost_budget:num('pv_cost'), notes:val('pv_notes')||null };
  const {error}=await sb.from('project_finance').insert(row);
  if(error){ btn.disabled=false; btn.textContent='Add value'; msg('Could not save: '+error.message,'err'); return; }
  msg('✓ Saved.','ok'); await supRefresh('finance');
}
async function deleteProjValue(id){ if(!confirm('Delete this project value?')) return; const {error}=await sb.from('project_finance').delete().eq('id',id); if(error){ alert('Could not delete: '+error.message); return; } await supRefresh('finance'); }

const TITLES={hq:'HQ — Business Overview',clients:'Clients',jobs:'Job Status — Mobilisation Control',completed:'Completed Works',crm:'CRM — Client Engagement',command:'Command Centre',checkins:'Site Check-ins',engineers:'Engineers — Team Register',compliance:'Compliance — Expiries & Right to Work',overview:'Programme Overview',sites:'Sites & Progress',schedule:'Schedule',rota:'Shift Rota',teams:'Teams & Routes',installs:'Install Reports',risks:'Risk Register',callouts:'Call-Out Reports',shifts:'Shift Reports',reports:'Activity Feed',gallery:'Photo Evidence',analytics:'Analytics & Insights',documents:'Documents',project:'Project Plan',requests:'Work Requests',quotes:'Quote Requests',quality:'Quality & Handover',suppliers:'Suppliers — Labour Partners',finance:'Profit & Margins',sup_home:'Supplier Dashboard',sup_engineers:'My Engineers',sup_jobs:'My Assignments',sup_timesheets:'Timesheets',sup_feedback:'Performance & Feedback',sup_docs:'Company Documents'};
function go(page){
  CURRENT=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  const pt=el('pageTitle'); if(pt) pt.textContent=TITLES[page]||'';
  let html='';
  try{
    if(page==='hq')html=pageHQ();
    else if(page==='engineers')html=pageEngineers();
    else if(page==='compliance')html=pageCompliance();
    else if(page==='suppliers')html=pageSuppliers();
    else if(page==='finance')html=pageFinance();
    else if(page==='sup_home')html=pageSupHome();
    else if(page==='sup_engineers')html=pageSupEngineers();
    else if(page==='sup_jobs')html=pageSupJobs();
    else if(page==='sup_timesheets')html=pageSupTimesheets();
    else if(page==='sup_feedback')html=pageSupFeedback();
    else if(page==='sup_docs')html=pageSupDocs();
    else if(page==='clients')html=pageClients();
    else if(page==='jobs')html=pageJobs();
    else if(page==='completed')html=pageCompleted();
    else if(!CLIENT){ html=emptyState('👈','Choose a client','Pick a client from the dropdown above'+(PROFILE.role==='admin'?', the Clients page or HQ':'')+' to open their dashboard.'); }
    else if(page==='command')html=pageCommand();
    else if(page==='checkins')html=pageCheckins();
    else if(page==='overview')html=pageOverview();
    else if(page==='sites')html=pageSites();
    else if(page==='schedule')html=pageSchedule();
    else if(page==='rota')html=pageRota();
    else if(page==='teams')html=pageTeams();
    else if(page==='installs')html=pageInstalls();
    else if(page==='risks')html=pageRisks();
    else if(page==='callouts')html=pageCallouts();
    else if(page==='shifts')html=pageShifts();
    else if(page==='reports')html=pageReports();
    else if(page==='gallery')html=pageGallery();
    else if(page==='requests')html=pageRequests();
    else if(page==='quotes')html=pageQuotes();
    else if(page==='analytics')html=pageAnalytics();
    else if(page==='documents')html=pageDocuments();
    else if(page==='project')html=pageProjectPlan();
    else if(page==='crm')html=pageCRM();
    else if(page==='quality')html=pageQuality();
  }catch(e){ html=emptyState('⚠','Something went wrong drawing this page',esc(e.message)); }
  el('content').innerHTML=html;
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  buildCharts(page);
  if(page==='command'||page==='checkins') setTimeout(initOpsMap, 60);
}
function buildCharts(page){
  if(typeof Chart==='undefined')return;
  try{
    Chart.defaults.color=getComputedStyle(document.body).getPropertyValue('--muted');
    if(page==='overview' && el('countryChart')){
      const by={},cnt={};
      DATA.sites.filter(s=>s.country).forEach(s=>{by[s.country]=(by[s.country]||0)+Number(s.progress_pct||0);cnt[s.country]=(cnt[s.country]||0)+1;});
      const labels=Object.keys(by); if(!labels.length)return;
      charts.country=new Chart(el('countryChart'),{type:'doughnut',data:{labels:labels.map(l=>(flagEmoji[l]||'')+' '+l),datasets:[{data:labels.map(l=>Math.round(by[l]/cnt[l])),backgroundColor:['#38bdf8','#22c55e','#a78bfa','#f59e0b','#fb7185','#34d399'],borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{position:'right',labels:{boxWidth:12,padding:10,font:{size:11}}}}}});
    }
    if(page==='analytics'){
      const a=analyticsData(); const grid={color:getComputedStyle(document.body).getPropertyValue('--line2')};
      if(el('aMonth')) charts.m=new Chart(el('aMonth'),{type:'bar',data:{labels:a.mKeys,datasets:[{label:'Call-outs',data:a.mKeys.map(m=>a.months[m]),backgroundColor:'#38bdf8',borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{y:{grid,beginAtZero:true,ticks:{precision:0}},x:{grid:{display:false}}}}});
      if(el('aPri')){ const pl=Object.keys(a.pri); charts.p=new Chart(el('aPri'),{type:'doughnut',data:{labels:pl,datasets:[{data:pl.map(p=>a.pri[p]),backgroundColor:['#ef4444','#f59e0b','#38bdf8','#22c55e','#a78bfa'],borderWidth:0}]},options:{cutout:'60%',plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}}); }
      if(el('aSites')) charts.s=new Chart(el('aSites'),{type:'bar',data:{labels:a.topSites.map(x=>x[0]),datasets:[{label:'Call-outs',data:a.topSites.map(x=>x[1]),backgroundColor:'#fb7185',borderRadius:6}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid,beginAtZero:true,ticks:{precision:0}},y:{grid:{display:false}}}}});
      if(el('aEng')) charts.e=new Chart(el('aEng'),{type:'bar',data:{labels:a.topEng.map(x=>x[0]),datasets:[{label:'Reports',data:a.topEng.map(x=>x[1]),backgroundColor:'#22c55e',borderRadius:6}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid,beginAtZero:true,ticks:{precision:0}},y:{grid:{display:false}}}}});
    }
  }catch(e){console.warn('chart skipped',e);}
}
