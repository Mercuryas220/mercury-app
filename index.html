<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mercury Operations Platform</title>
<!-- Installable app (home-screen) -->
<meta name="theme-color" content="#0a0e16">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mercury">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ===================================================================
   ▼▼▼ THE ONLY TWO LINES YOU EDIT ARE A FEW LINES BELOW, IN THE
       SECTION MARKED "YOUR SETTINGS". Everything else: leave as-is.
   =================================================================== */
:root{
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --bg:#0a0e16;--bg2:#0e131d;--panel:#121a27;--panel2:#172234;--line:#1f2b3d;--line2:#2a3a52;
  --text:#eaf1fb;--muted:#8497b0;--faint:#5b6c85;--green:#22c55e;--cyan:#38bdf8;--amber:#f59e0b;
  --red:#ef4444;--violet:#a78bfa;--green-soft:rgba(34,197,94,.14);--cyan-soft:rgba(56,189,248,.14);
  --amber-soft:rgba(245,158,11,.16);--red-soft:rgba(239,68,68,.16);--radius:16px;--sidebar:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:radial-gradient(900px 500px at 12% -8%,rgba(56,189,248,.10),transparent 60%),radial-gradient(900px 500px at 100% 0%,rgba(34,197,94,.08),transparent 55%),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.45;transition:background .4s}
body.client{--bg:#f4f7fb;--bg2:#fff;--panel:#fff;--panel2:#f7fafd;--line:#e6edf5;--line2:#d6e1ee;--text:#0f2033;--muted:#5a6b80;--faint:#8a9bb0;background:radial-gradient(900px 480px at 10% -10%,rgba(56,189,248,.10),transparent 60%),radial-gradient(800px 460px at 100% -5%,rgba(34,197,94,.08),transparent 55%),var(--bg)}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
/* login / setup */
.center{min-height:100vh;display:grid;place-items:center;padding:24px}
.authcard{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:34px;box-shadow:0 30px 70px rgba(0,0,0,.5)}
.authlogo{width:52px;height:52px;border-radius:14px;background:conic-gradient(from 220deg,var(--cyan),var(--green));display:grid;place-items:center;font-weight:800;color:#04121f;font-size:24px;margin:0 auto 18px}
.authcard h1{font-size:21px;text-align:center;margin-bottom:4px}
.authcard p.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.field input{width:100%;padding:12px 13px;border-radius:11px;border:1px solid var(--line2);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit}
.field input:focus{outline:none;border-color:var(--cyan)}
.btn{width:100%;padding:12px;border:0;border-radius:11px;background:linear-gradient(135deg,var(--cyan),var(--green));color:#04121f;font-weight:800;font-size:14.5px;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.6;cursor:wait}
.authmsg{font-size:13px;margin-top:14px;text-align:center;min-height:18px}
.authmsg.err{color:var(--red)}.authmsg.ok{color:var(--green)}
.setupbox{font-size:13px;color:var(--muted);line-height:1.6}
.setupbox code{background:#04121f;color:#7fd9ff;padding:2px 6px;border-radius:5px;font-size:12px}
/* shell */
.shell{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--line);padding:20px 16px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 6px 18px;border-bottom:1px solid var(--line);margin-bottom:16px}
.logo{width:40px;height:40px;border-radius:11px;flex:none;background:conic-gradient(from 220deg,var(--cyan),var(--green));display:grid;place-items:center;font-weight:800;color:#04121f;font-size:18px}
.brand h1{font-size:15px;font-weight:800}.brand p{font-size:11px;color:var(--muted)}
.navlabel{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:18px 8px 8px;font-weight:700}
.nav-btn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:var(--muted);font-family:inherit;font-size:13.5px;font-weight:600;padding:10px 12px;border-radius:11px;cursor:pointer;transition:.15s;margin-bottom:2px}
.nav-btn:hover{background:var(--panel);color:var(--text)}
.nav-btn.active{background:var(--panel2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line2)}
.nav-btn .ic{width:20px;text-align:center;font-size:15px}.nav-btn.active .ic{color:var(--cyan)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px}
.side-foot{margin-top:18px;padding:12px;border-radius:12px;background:var(--panel);border:1px solid var(--line);font-size:11.5px;color:var(--muted)}
.logout{margin-top:10px;width:100%;background:transparent;border:1px solid var(--line2);color:var(--muted);padding:9px;border-radius:10px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:16px;padding:16px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(12px)}
.topbar .crumb{font-size:12.5px;color:var(--muted)}.topbar h2{font-size:19px;font-weight:800}
.spacer{flex:1}
.cli-select{padding:8px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--line2);color:var(--text);font-family:inherit;font-size:13px;font-weight:600}
.toggle{display:flex;background:var(--panel);border:1px solid var(--line2);border-radius:999px;padding:3px;gap:2px}
.toggle button{border:0;background:transparent;color:var(--muted);font-family:inherit;font-weight:700;font-size:12.5px;padding:7px 15px;border-radius:999px;cursor:pointer}
.toggle button.on{background:linear-gradient(135deg,var(--cyan),var(--green));color:#04121f}
.live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600}
.live .beat{width:9px;height:9px;border-radius:50%;background:var(--green);animation:beat 1.8s infinite}
@keyframes beat{0%,100%{box-shadow:0 0 0 0 var(--green-soft)}50%{box-shadow:0 0 0 6px transparent}}
.content{padding:24px 28px 60px;max-width:1480px;width:100%}
.section-h{display:flex;align-items:center;gap:10px;margin:30px 2px 14px}.section-h:first-child{margin-top:6px}
.section-h h3{font-size:15px;font-weight:800}.section-h .sub{font-size:12px;color:var(--muted)}.section-h .line{flex:1;height:1px;background:var(--line)}
.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.kpi{position:relative;overflow:hidden}.kpi .lbl{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.kpi .val{font-size:30px;font-weight:800;margin-top:8px;letter-spacing:-.5px;display:flex;align-items:baseline;gap:6px}.kpi .val small{font-size:14px;font-weight:600;color:var(--muted)}
.kpi .spark{position:absolute;right:14px;top:16px;width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:18px}
.kpi.g .spark{background:var(--green-soft);color:var(--green)}.kpi.c .spark{background:var(--cyan-soft);color:var(--cyan)}
.kpi.a .spark{background:var(--amber-soft);color:var(--amber)}.kpi.r .spark{background:var(--red-soft);color:var(--red)}.kpi.v .spark{background:rgba(167,139,250,.16);color:var(--violet)}
.row2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px}.row2b{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:1080px){.row2,.row2b{grid-template-columns:1fr}}
/* ---- responsive: slide-in drawer on narrow screens & phones ---- */
.hamburger{display:none;border:1px solid var(--line2);background:var(--panel);color:var(--text);width:40px;height:40px;border-radius:10px;font-size:19px;cursor:pointer;font-family:inherit;flex:none}
.navscrim{display:none}
@media(max-width:980px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;height:100vh;width:272px;z-index:60;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 60px rgba(0,0,0,.6)}
  body.nav-open .sidebar{transform:none}
  .navscrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55}
  body.nav-open .navscrim{display:block}
  .hamburger{display:inline-flex;align-items:center;justify-content:center}
  .content{padding:18px 15px 70px}
  .topbar{padding:13px 15px;gap:11px}
  .topbar h2{font-size:17px}
  .cli-select{max-width:150px}
}
.card h4{font-size:14px;font-weight:800;margin-bottom:3px;display:flex;align-items:center;gap:8px}.card .csub{font-size:12px;color:var(--muted);margin-bottom:14px}
.chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
.chip.green{background:var(--green-soft);color:var(--green)}.chip.cyan{background:var(--cyan-soft);color:var(--cyan)}.chip.amber{background:var(--amber-soft);color:var(--amber)}.chip.red{background:var(--red-soft);color:var(--red)}.chip.grey{background:var(--panel2);color:var(--muted)}
.chip.violet{background:rgba(167,139,250,.16);color:var(--violet)}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700;padding:0 10px 10px;border-bottom:1px solid var(--line)}
td{padding:11px 10px;border-bottom:1px solid var(--line)}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--panel2)}
.site-code{font-weight:800;font-size:12.5px}.muted{color:var(--muted)}
.pbar{height:7px;border-radius:6px;background:var(--line2);overflow:hidden;min-width:90px}
.pbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--green))}
.pbar.amber i{background:linear-gradient(90deg,var(--amber),#fbbf24)}.pbar.red i{background:linear-gradient(90deg,var(--red),#fb7185)}
.pcell{display:flex;align-items:center;gap:9px}.pcell b{font-size:12px;width:34px;text-align:right}
.gantt{font-size:12px}.gantt .grow{display:grid;grid-template-columns:148px 1fr;align-items:center;gap:10px;padding:5px 0}
.gantt .gname{display:flex;align-items:center;gap:8px;font-weight:600}
.gantt .gtrack{position:relative;height:22px;background:var(--panel2);border-radius:7px;overflow:hidden}
.gantt .gbar{position:absolute;top:3px;height:16px;border-radius:5px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:700;color:#04121f;white-space:nowrap;overflow:hidden}
.gantt .gscale{display:grid;grid-template-columns:148px 1fr;gap:10px;margin-bottom:6px;color:var(--faint);font-size:10.5px;font-weight:700}
.gantt .gmonths{display:flex;justify-content:space-between}
.gantt .today{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--cyan);z-index:3}
.list{display:flex;flex-direction:column;gap:10px}
.litem{display:flex;gap:12px;padding:12px;border-radius:12px;background:var(--panel2);border:1px solid var(--line)}
.litem .av{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:800;font-size:12px;background:var(--cyan-soft);color:var(--cyan)}
.litem .bd{flex:1;min-width:0}.litem .bd .t{font-size:13px;font-weight:700}.litem .bd .m{font-size:11.5px;color:var(--muted);margin-top:2px}
.litem .when{font-size:11px;color:var(--faint);white-space:nowrap}
.teamgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.teamcard{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:15px}
.teamcard .th{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.teamcard .nm{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px}.teamcard .tdot{width:10px;height:10px;border-radius:50%}
.teamcard .meta{font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--line)}.teamcard .meta:last-child{border-bottom:0}.teamcard .meta b{color:var(--text);font-weight:700}
.ringwrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.ring{position:relative;width:150px;height:150px;flex:none}.ring svg{transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:grid;place-items:center;text-align:center}.ring .mid b{font-size:34px;font-weight:800}.ring .mid span{font-size:11px;color:var(--muted);font-weight:600}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:13px;text-align:center}
.metrics div{background:var(--panel2);border-radius:9px;padding:9px 4px}.metrics b{display:block;font-size:16px;font-weight:800}.metrics span{font-size:9.5px;color:var(--muted);text-transform:uppercase}
.banner{display:flex;gap:13px;align-items:center;padding:14px 16px;border-radius:13px;background:linear-gradient(100deg,var(--cyan-soft),var(--green-soft));border:1px solid var(--line2);margin-bottom:18px}
.banner .ic{font-size:22px}.banner .bd b{font-size:13.5px}.banner .bd p{font-size:12px;color:var(--muted)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:12px}.legend span{display:flex;align-items:center;gap:6px}.legend i{width:11px;height:11px;border-radius:3px}
.note{font-size:11.5px;color:var(--faint);margin-top:8px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}.empty .big{font-size:34px;margin-bottom:8px}
.hide{display:none!important}
canvas{max-width:100%}
/* ---- report capture button ---- */
.addbtn{display:inline-flex;align-items:center;gap:7px;border:0;background:linear-gradient(135deg,var(--cyan),var(--green));color:#04121f;font-family:inherit;font-weight:800;font-size:13px;padding:9px 15px;border-radius:11px;cursor:pointer}
.addbtn.sm{padding:7px 12px;font-size:12.5px}
.sechead{display:flex;align-items:center;gap:12px;margin:30px 2px 14px}
.sechead h3{font-size:15px;font-weight:800}.sechead .sub{font-size:12px;color:var(--muted)}.sechead .line{flex:1;height:1px;background:var(--line)}
/* ---- modal / form ---- */
.modal-bg{position:fixed;inset:0;background:rgba(3,8,15,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:26px 14px}
.modal{width:100%;max-width:560px;background:var(--panel);border:1px solid var(--line2);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.55);overflow:hidden;margin-bottom:40px}
.modal-h{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2}
.modal-h h3{font-size:16px;font-weight:800;flex:1}
.modal-x{border:0;background:var(--panel2);color:var(--text);width:32px;height:32px;border-radius:9px;font-size:16px;cursor:pointer;font-family:inherit}
.modal-b{padding:18px 22px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line2);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--cyan)}
.fld textarea{min-height:72px;resize:vertical}
.fld .req{color:var(--red)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.frow{grid-template-columns:1fr}}
.check-row{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--text)}
.check-row input{width:auto}
.photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photos .thumb{width:62px;height:62px;border-radius:9px;object-fit:cover;border:1px solid var(--line2)}
.photo-add{width:62px;height:62px;border-radius:9px;border:1px dashed var(--line2);background:var(--panel2);color:var(--muted);font-size:22px;display:grid;place-items:center;cursor:pointer}
.sigpad{border:1px solid var(--line2);border-radius:10px;background:#fff;touch-action:none;width:100%;height:140px;display:block}
.sig-clear{font-size:11.5px;color:var(--cyan);background:none;border:0;cursor:pointer;font-family:inherit;margin-top:5px}
.gps-note{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;margin-top:4px}
.modal-foot{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--panel)}
.modal-foot .btn{flex:1}
.btn-ghost{flex:none;background:var(--panel2);border:1px solid var(--line2);color:var(--text);border-radius:11px;font-family:inherit;font-weight:700;font-size:14px;padding:0 16px;cursor:pointer}
.savemsg{font-size:13px;text-align:center;padding:6px 0 0;min-height:16px}
.savemsg.err{color:var(--red)}.savemsg.ok{color:var(--green)}
.pdf-link{font-size:11.5px;color:var(--cyan);font-weight:700}
.mini-th{display:inline-flex;gap:3px;vertical-align:middle}
.mini-th img{width:22px;height:22px;border-radius:4px;object-fit:cover;border:1px solid var(--line2)}
.logomark{width:100%;height:100%;object-fit:contain;padding:5px;box-sizing:border-box}
.logo.logo-mark,.authlogo.logo-mark{background:#0a0e16}
/* ---- command centre ---- */
#opsMap{height:300px;border-radius:13px;border:1px solid var(--line);overflow:hidden}
.leaflet-popup-content{font-family:var(--font);font-size:12px}
.sla{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);margin-bottom:9px}
.sla .ref{font-weight:800;font-size:13px;min-width:90px}
.sla .bd{flex:1;min-width:0}.sla .bd .t{font-size:12.5px}.sla .bd .m{font-size:11px;color:var(--muted)}
.sla .timer{font-weight:800;font-size:14px;white-space:nowrap;text-align:right}
.sla.breach{border-color:rgba(239,68,68,.5);background:var(--red-soft)}.sla.breach .timer{color:var(--red)}
.sla.warn{border-color:rgba(245,158,11,.5)}.sla.warn .timer{color:var(--amber)}
.sla.ok .timer{color:var(--green)}
.checkin{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);background:var(--panel2);color:var(--text);font-family:inherit;font-weight:700;font-size:12.5px;padding:9px 14px;border-radius:11px;cursor:pointer}
/* ---- client portal polish ---- */
:root{--brand:#22c55e}
.brandlogo-img{width:40px;height:40px;border-radius:11px;object-fit:cover;flex:none}
.client-hero{display:flex;gap:22px;align-items:center;flex-wrap:wrap;padding:24px;border-radius:18px;background:linear-gradient(120deg, color-mix(in srgb,var(--brand) 14%, var(--panel)), var(--panel));border:1px solid var(--line2);margin-bottom:18px}
.client-hero .logo-lg{width:66px;height:66px;border-radius:16px;display:grid;place-items:center;font-weight:800;font-size:28px;color:#fff;background:var(--brand);flex:none;overflow:hidden}
.client-hero .logo-lg img{width:100%;height:100%;object-fit:cover}
.client-hero .ht{flex:1;min-width:200px}
.client-hero h2{font-size:23px;letter-spacing:-.3px}
.client-hero p{color:var(--muted);font-size:13.5px;margin-top:3px}
.client-hero .by{font-size:11px;color:var(--faint);margin-top:8px;font-weight:600}
.timeline{position:relative;padding-left:24px;margin-top:4px}
.timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line2)}
.tl-item{position:relative;margin-bottom:15px}
.tl-item::before{content:'';position:absolute;left:-22px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 22%, transparent)}
.tl-item .d{font-size:11px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.tl-item .t{font-size:13.5px;font-weight:700;margin-top:1px}
.tl-item .m{font-size:12px;color:var(--muted)}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.gallery a{display:block;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:var(--panel2);transition:.15s}
.gallery a:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.25)}
.gallery img{width:100%;height:130px;object-fit:cover;display:block;background:var(--panel2)}
.gallery .cap{font-size:11px;color:var(--muted);padding:7px 9px}
.pbar.brand i{background:var(--brand)}
/* ---- site editor crew rows ---- */
.crewrow{display:grid;grid-template-columns:1.3fr 1fr 1fr 34px;gap:8px;margin-bottom:8px;align-items:center}
.crewrow input{width:100%;padding:9px 10px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit}
.crew-rm{border:1px solid var(--line2);background:var(--panel2);color:var(--red);border-radius:9px;height:36px;cursor:pointer;font-family:inherit;font-weight:800}
.crewhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.crewhd b{font-size:12px;color:var(--muted);font-weight:700}
.edit-btn{border:1px solid var(--line2);background:var(--panel2);color:var(--text);font-family:inherit;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer}
@media(max-width:560px){.crewrow{grid-template-columns:1fr 1fr 30px}.crewrow .cw-p{grid-column:1 / 3}}
</style>

const el=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const flagEmoji={UK:'🇬🇧',GB:'🇬🇧',IT:'🇮🇹',ES:'🇪🇸',FR:'🇫🇷',DE:'🇩🇪',IE:'🇮🇪',BE:'🇧🇪'};
const flagOf=s=>({'Complete':'green','Live':'cyan','At Risk':'amber','Delayed':'red','Mobilising':'cyan','Not Started':'grey','Pending':'grey'}[s]||'grey');
const pbarClass=s=>s==='Delayed'?'red':(s==='At Risk'?'amber':'');
const isConfigured=()=>!SUPABASE_URL.includes('_HERE')&&!SUPABASE_ANON_KEY.includes('_HERE');

let sb=null, SESSION=null, PROFILE=null, CLIENTS=[], CLIENT=null;
let VIEW='internal', CURRENT='overview', DATA={}, charts={};

/* ============ BOOT ============ */
window.addEventListener('DOMContentLoaded', async ()=>{
  if(!isConfigured()){ renderSetup(); return; }
  if(typeof supabase==='undefined'){ renderLoadError(); return; }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const {data:{session}} = await sb.auth.getSession();
  if(session){ SESSION=session; await startApp(); } else { renderLogin(); }
});

/* ============ LOGIN SCREEN ============ */
function renderLogin(){
  el('root').innerHTML=`<div class="center"><div class="authcard">
    <div class="authlogo logo-mark"><img class="logomark" src="${MLOGO}" alt="Mercury"></div><h1>Mercury Operations</h1>
    <p class="sub">Sign in to your dashboard</p>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="email" required autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="pw" required autocomplete="current-password"></div>
      <button class="btn" id="loginBtn" type="submit">Sign in</button>
      <div class="authmsg" id="authMsg"></div>
    </form></div></div>`;
  el('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=el('loginBtn'), msg=el('authMsg');
    btn.disabled=true; btn.textContent='Signing in…'; msg.textContent=''; msg.className='authmsg';
    const {error} = await sb.auth.signInWithPassword({email:el('email').value.trim(), password:el('pw').value});
    if(error){ msg.textContent=error.message; msg.className='authmsg err'; btn.disabled=false; btn.textContent='Sign in'; return; }
    const {data:{session}} = await sb.auth.getSession();
    SESSION=session; await startApp();
  });
}

/* ============ LOAD PROFILE + CLIENTS, THEN RENDER SHELL ============ */
async function startApp(){
  el('root').innerHTML=`<div class="center"><div class="muted">Loading your dashboard…</div></div>`;
  // profile
  const {data:prof} = await sb.from('profiles').select('*').eq('id',SESSION.user.id).maybeSingle();
  PROFILE = prof || {role:'client', full_name:SESSION.user.email, email:SESSION.user.email};
  // clients (RLS lets everyone read the list; we restrict non-admins to their own)
  let {data:clients} = await sb.from('clients').select('*').order('name');
  clients = clients || [];
  if(PROFILE.role!=='admin' && PROFILE.client_id) clients = clients.filter(c=>c.id===PROFILE.client_id);
  CLIENTS = clients;
  CLIENT = CLIENTS[0] || null;
  // clients see the portal view; admins/engineers default to internal
  VIEW = (PROFILE.role==='client') ? 'client' : 'internal';
  document.body.classList.toggle('client', VIEW==='client');
  // Admins land on the business-wide HQ overview; clients/engineers go into their dashboard.
  if(PROFILE.role==='admin'){
    await loadHQ();
    renderShell();
    go('hq');
  } else if(CLIENT){
    renderShell();
    await loadClientData(); go('overview');
  } else {
    renderShell();
    go('overview'); // graceful: shows a "no client" message instead of a blank screen
  }
}

/* Enter a specific client's dashboard (from the Clients hub or dropdown) */
async function enterClient(id){
  CLIENT = CLIENTS.find(c=>c.id===id) || CLIENT;
  if(!CLIENT) return;
  await loadClientData();
  const crumb=document.querySelector('.crumb'); if(crumb) crumb.textContent=CLIENT.name;
  const sel=el('cliSelect'); if(sel) sel.value=CLIENT.id;
  go('overview');
}

/* ============ FETCH ALL DATA FOR THE SELECTED CLIENT ============ */
async function loadClientData(){
  if(!CLIENT) return;
  const cid=CLIENT.id;
  const q=(t,extra)=>sb.from(t).select(extra||'*').eq('client_id',cid);
  const [sites,teams,risks,daily,callouts,qa,progress,shifts] = await Promise.all([
    q('sites'), q('teams'), q('risks'),
    q('daily_reports').order('submitted_at',{ascending:false}).limit(100),
    q('callout_reports').order('submitted_at',{ascending:false}).limit(200),
    q('qa_signoffs').order('submitted_at',{ascending:false}).limit(100),
    q('progress_reports').order('submitted_at',{ascending:false}).limit(100),
    q('shift_reports').order('submitted_at',{ascending:false}).limit(200)
  ]);

/* ============ DERIVED VALUES ============ */
function rollups(){
  const sites=DATA.sites.filter(s=>String(s.status||'')!=='Pending');
  const active=sites.filter(s=>!['Pending','Not Started'].includes(s.status));
  const complete=sites.filter(s=>s.status==='Complete');
  const live=sites.filter(s=>['Live','At Risk','Delayed','Mobilising'].includes(s.status));
  const avg=active.length?Math.round(active.reduce((a,s)=>a+Number(s.progress_pct||0),0)/active.length):0;
  const onSched=active.filter(s=>!['Delayed','At Risk'].includes(s.status)).length;
  const onSchedPct=active.length?Math.round(onSched/active.length*100):0;
  const openRisks=DATA.risks.filter(r=>!['Closed','Complete'].includes(String(r.status||'')));
  const crit=openRisks.filter(r=>String(r.risk_level||'')==='Critical');
  return {sites,active,complete,live,avg,onSchedPct,openRisks,crit,total:DATA.sites.length};
}
function kpi(cls,icon,label,val,unit){return `<div class="card kpi ${cls}"><div class="spark">${icon}</div><div class="lbl">${label}</div><div class="val">${val}${unit?`<small>${unit}</small>`:''}</div></div>`;}
function sectionH(t,s){return `<div class="section-h"><h3>${t}</h3>${s?`<span class="sub">${s}</span>`:''}<span class="line"></span></div>`;}
function emptyState(icon,title,msg){return `<div class="card"><div class="empty"><div class="big">${icon}</div><b>${title}</b><div style="margin-top:6px;font-size:13px">${msg}</div></div></div>`;}

/* gantt across the client's date range */
function gantt(){
  const dated=DATA.sites.filter(s=>s.planned_start&&s.planned_end);
  if(!dated.length) return emptyState('📅','No dates scheduled yet','Add planned start/end dates to your sites and the timeline appears here.');
  const ds=dated.map(s=>+new Date(s.planned_start)), de=dated.map(s=>+new Date(s.planned_end));
  const min=Math.min(...ds), max=Math.max(...de), span=Math.max(1,max-min);
  const pct=d=>((+new Date(d)-min)/span)*100;
  const rows=dated.sort((a,b)=>new Date(a.planned_start)-new Date(b.planned_start)).map(s=>{
    const l=pct(s.planned_start), r=pct(s.planned_end), w=Math.max(2.5,r-l);
    const col=s.status==='Complete'?'linear-gradient(90deg,#22c55e,#4ade80)':s.status==='Delayed'?'linear-gradient(90deg,#ef4444,#fb7185)':s.status==='At Risk'?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#38bdf8,#22c55e)';
    return `<div class="grow"><div class="gname"><span class="chip ${flagOf(s.status)}" style="padding:2px 7px">${esc(s._team)}</span> ${flagEmoji[s.country]||''} ${esc(s.code||s.city)}</div>
      <div class="gtrack"><div class="gbar" style="left:${l}%;width:${w}%;background:${col}">${Number(s.progress_pct)>0?Math.round(s.progress_pct)+'%':''}</div></div></div>`;
  }).join('');
  return `<div class="gantt">${rows}<div class="legend"><span><i style="background:#38bdf8"></i> In progress</span><span><i style="background:#22c55e"></i> Complete</span><span><i style="background:#f59e0b"></i> At risk</span><span><i style="background:#ef4444"></i> Delayed</span></div></div>`;
}
function ring(p,label){const r=58,c=2*Math.PI*r,o=c-(p/100)*c;return `<div class="ring"><svg width="150" height="150" viewBox="0 0 150 150"><circle cx="75" cy="75" r="${r}" fill="none" stroke="var(--line2)" stroke-width="12"/><circle cx="75" cy="75" r="${r}" fill="none" stroke="url(#g)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${o}"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#22c55e"/></linearGradient></defs></svg><div class="mid"><div><b>${p}%</b><span>${label}</span></div></div></div>`;}

/* milestones: a delivery "story" from sites, QA sign-offs and reports */
function milestones(){
  const ev=[];
  (DATA.sites||[]).filter(s=>s.status==='Complete').forEach(s=>ev.push({date:s.planned_end||s.created_at,t:`${esc(s.code||s.city||'Site')} completed`,m:`${esc(s.city||'')} ${esc(s.country||'')}`.trim()}));
  (DATA.qa||[]).forEach(q=>{const s=(DATA.sites||[]).find(x=>x.id===q.site_id)||{};ev.push({date:q.signoff_date||q.submitted_at,t:`Handover signed — ${esc(s.code||s.city||'site')}`,m:'QA sign-off complete'});});
  (DATA.daily||[]).slice(0,6).forEach(d=>{const s=(DATA.sites||[]).find(x=>x.id===d.site_id)||{};ev.push({date:d.report_date||d.submitted_at,t:`Progress update — ${esc(s.code||s.city||'')}`,m:esc(String(d.work_completed||'').slice(0,70))});});
  return ev.filter(e=>e.date).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,8);
}

/* signature */
function setupSig(){
  const c=el('sigpad'); if(!c) return;
  c.width=c.offsetWidth*2; c.height=c.offsetHeight*2; const ctx=c.getContext('2d'); ctx.scale(2,2); ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#0f2033';
  let drawing=false, has=false;
  const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return [t.clientX-r.left, t.clientY-r.top];};
  const start=e=>{e.preventDefault();drawing=true;has=true;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(x,y);};
  const move=e=>{if(!drawing)return;e.preventDefault();const[x,y]=pos(e);ctx.lineTo(x,y);ctx.stroke();};
  const end=()=>{drawing=false; if(has) CAPTURE.sig=c.toDataURL('image/png');};
  c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  c.addEventListener('touchstart',start);c.addEventListener('touchmove',move);c.addEventListener('touchend',end);
}
function clearSig(){ const c=el('sigpad'); if(c){ c.getContext('2d').clearRect(0,0,c.width,c.height); CAPTURE.sig=null; } }
/* gps */
function captureGps(){
  const n=el('gpsNote'); if(!navigator.geolocation){ if(n)n.textContent='📍 Location not available on this device'; return; }
  navigator.geolocation.getCurrentPosition(
    p=>{ CAPTURE.gps={lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy)}; if(n)n.textContent=`📍 Location captured (±${CAPTURE.gps.acc}m)`; },
    ()=>{ if(n)n.textContent='📍 Location permission declined (report will still save)'; },
    {enableHighAccuracy:true,timeout:8000}
  );
}

/* upload a dataURL to Supabase Storage, return public URL (or null on failure) */
async function uploadDataUrl(dataUrl, path){
  try{
    const blob=await (await fetch(dataUrl)).blob();
    const {error}=await sb.storage.from('evidence').upload(path, blob, {contentType:blob.type||'image/png', upsert:true});
    if(error){ console.warn('upload failed',error); return null; }
    const {data}=sb.storage.from('evidence').getPublicUrl(path);
    return data.publicUrl;
  }catch(e){ console.warn('upload error',e); return null; }
}

/* SUBMIT — DB row first (never lost), then best-effort media + PDF */
async function submitForm(type){
  const f=FORMS[type];
  for(const id of f.required){ if(!val(id)){ msg('Please fill in the required fields.','err'); el(id).focus(); return; } }
  const btn=el('saveBtn'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  const ref=f.prefix+'-'+Date.now();
  const row=Object.assign(f.collect(), {
    client_id: CLIENT.id,
    submitted_at: new Date().toISOString(),
    latitude: CAPTURE.gps?CAPTURE.gps.lat:null,
    longitude: CAPTURE.gps?CAPTURE.gps.lng:null
  });
  if(type==='callout'){ row.job_number=ref; row.customer_sign_name=val('f_signname')||null; }
  // 1) Save the row — this is the source of truth
  const {data:ins,error}=await sb.from(f.table).insert(row).select().maybeSingle();
  if(error){ btn.disabled=false; btn.textContent='Submit report'; msg('Could not save: '+error.message,'err'); return; }
  const id=ins?ins.id:null;
  // 2) Best-effort: upload photos + signature, generate PDF
  btn.textContent='Uploading photos…';
  const photoUrls=[];
  for(let i=0;i<CAPTURE.photos.length;i++){ const u=await uploadDataUrl(CAPTURE.photos[i], `${CLIENT.slug}/${ref}/photo${i+1}.jpg`); if(u)photoUrls.push(u); }
  let sigUrl=null; if(CAPTURE.sig) sigUrl=await uploadDataUrl(CAPTURE.sig, `${CLIENT.slug}/${ref}/signature.png`);
  // media table rows
  for(const u of photoUrls){ try{ await sb.from('media').insert({client_id:CLIENT.id, report_type:type, report_id:id, file_url:u}); }catch(e){} }
  // PDF
  btn.textContent='Building PDF…';
  let pdfUrl=null;
  try{ const pdfData=buildPdf(type, row, ref); if(pdfData) pdfUrl=await uploadDataUrl(pdfData, `${CLIENT.slug}/${ref}/report.pdf`); }catch(e){ console.warn('pdf failed',e); }
  // 3) write back the links
  try{ const patch={}; if(type==='callout'){patch.internal_notes=(row.internal_notes||'')+(sigUrl?'':'');} patch.pdf_url=pdfUrl; if(type==='shift'){patch.media_links=photoUrls;} if(type==='callout'){patch.map_link=CAPTURE.gps?`https://maps.google.com/?q=${CAPTURE.gps.lat},${CAPTURE.gps.lng}`:null;} await sb.from(f.table).update(patch).eq('id',id); }catch(e){}
  msg('✓ Report saved'+(pdfUrl?' — PDF generated':'')+'.','ok');
  await loadClientData();
  setTimeout(()=>{ closeForm(); go(type==='callout'?'callouts':'shifts'); }, 900);
}

/* branded PDF via jsPDF */
function buildPdf(type, row, ref){
  if(!window.jspdf) return null;

  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(180,200,220); doc.text('Automated Solutions — Operations', 40, 54);
  doc.setTextColor(15,32,51); doc.setFont('helvetica','bold'); doc.setFontSize(15);
  y=100; doc.text((type==='callout'?'Call-Out Report':'Shift Report'), 40, y);

  doc.text(`${CLIENT.name}   ·   Ref ${ref}   ·   ${new Date().toLocaleString('en-GB')}`, 40, y+16);
  doc.setDrawColor(225,235,243); doc.line(40,y+26,W-40,y+26); y+=44;
  const line=(k,v)=>{ if(v==null||v==='')return; doc.setFont('helvetica','bold');doc.setTextColor(90,107,128);doc.setFontSize(9);doc.text(k.toUpperCase(),40,y);
    doc.setFont('helvetica','normal');doc.setTextColor(15,32,51);doc.setFontSize(11);
    const lines=doc.splitTextToSize(String(v),W-80); doc.text(lines,40,y+14); y+=14+lines.length*13+8; };
  const site=(DATA.sites.find(s=>s.id===row.site_id)||{});

  else { line('Shift',row.shift); line('Hours worked',row.hours_worked); line('Status',row.status); line('Work completed',row.work_completed); line('Issues / handover',row.issues); line('Near-miss',row.near_miss); }
  if(CAPTURE.gps) line('Location', `${CAPTURE.gps.lat.toFixed(5)}, ${CAPTURE.gps.lng.toFixed(5)} (±${CAPTURE.gps.acc}m)`);
  // photos
  CAPTURE.photos.slice(0,4).forEach((p,i)=>{ if(y>720){doc.addPage();y=48;} try{ doc.addImage(p,'JPEG',40+(i%2)*media_w(),y,media_w()-10,110); if(i%2===1)y+=120; }catch(e){} });
  if(CAPTURE.photos.length%2===1)y+=120;
  // signature
  if(CAPTURE.sig){ if(y>660){doc.addPage();y=48;} doc.setFont('helvetica','bold');doc.setTextColor(90,107,128);doc.setFontSize(9);doc.text('CUSTOMER SIGNATURE',40,y); try{doc.addImage(CAPTURE.sig,'PNG',40,y+8,200,80);}catch(e){} if(type==='callout'&&row.customer_sign_name){doc.setFont('helvetica','normal');doc.setTextColor(15,32,51);doc.setFontSize(10);doc.text(row.customer_sign_name,40,y+104);} }
  doc.setTextColor(150,160,175);doc.setFontSize(8);doc.text('Generated by Mercury Operations Platform',40,820);
  return doc.output('datauristring');
}

/* ===================================================================
   COMMAND CENTRE  —  live ops: SLA timers, map, today board, check-in
   =================================================================== */
const SLA_HOURS={'Priority 1':4,'Priority 2':8,'Priority 3':24,'Priority 4':72};
function isOpenCallout(r){ const s=String(r.status||'').toLowerCase(); return !(s.includes('complete')||s.includes('closed')); }
function slaState(r){
  const tgt=SLA_HOURS[r.priority]||24;
  const start=new Date(r.submitted_at||r.call_date||Date.now()).getTime();
  const deadline=start+tgt*3600*1000;
  const remMs=deadline-Date.now();
  const remH=remMs/3600000;
  let cls='ok', label;
  if(remMs<0){ cls='breach'; label='BREACHED '+fmtDur(-remMs)+' ago'; }
  else { if(remH<=tgt*0.25) cls='warn'; label=fmtDur(remMs)+' left'; }
  return {cls,label,tgt};
}
function fmtDur(ms){ const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000); if(h>=24){const d=Math.floor(h/24);return d+'d '+(h%24)+'h';} return h>0?(h+'h '+m+'m'):(m+'m'); }

function pageCommand(){
  const opens=(DATA.callouts||[]).filter(isOpenCallout);
  const ranked=opens.map(r=>({r,s:slaState(r)})).sort((a,b)=>{
    const order={breach:0,warn:1,ok:2}; return order[a.s.cls]-order[b.s.cls];
  });
  const breaches=ranked.filter(x=>x.s.cls==='breach').length;
  const p1=opens.filter(r=>r.priority==='Priority 1').length;
  const today=new Date().toISOString().slice(0,10);
  const reportsToday=[...(DATA.callouts||[]),...(DATA.shifts||[]),...(DATA.daily||[])].filter(r=>String(r.submitted_at||'').slice(0,10)===today).length;
  const geoPts=geoPoints();

/* ===================================================================
   ANALYTICS & INSIGHTS  (internal) — computed live from the data
   =================================================================== */
function analyticsData(){
  const co=DATA.callouts||[], sh=DATA.shifts||[];
  // by month
  const months={}; co.forEach(r=>{const m=String(r.submitted_at||r.call_date||'').slice(0,7); if(m)months[m]=(months[m]||0)+1;});
  const mKeys=Object.keys(months).sort().slice(-12);
  // priority
  const pri={}; co.forEach(r=>{const p=r.priority||'Unspecified'; pri[p]=(pri[p]||0)+1;});
  // top sites (repeat faults)
  const siteCount={}; co.forEach(r=>{ const s=(DATA.sites||[]).find(x=>x.id===r.site_id); const key=s?(s.code||s.city):(r.internal_notes?String(r.internal_notes).replace(/^.*Site:\s*/,'').slice(0,18):'Unassigned'); siteCount[key]=(siteCount[key]||0)+1; });
  const topSites=Object.entries(siteCount).sort((a,b)=>b[1]-a[1]).slice(0,7);
  // engineer activity
  const eng={}; co.forEach(r=>{if(r.engineer)eng[r.engineer]=(eng[r.engineer]||0)+1;}); sh.forEach(r=>{if(r.engineer)eng[r.engineer]=(eng[r.engineer]||0)+1;});
  const topEng=Object.entries(eng).sort((a,b)=>b[1]-a[1]).slice(0,8);
  // SLA: resolved within target (needs completed_time); else current open health
  let resolved=0, within=0;
  co.forEach(r=>{ const s=String(r.status||'').toLowerCase(); if((s.includes('complete')||s.includes('closed'))&&r.completed_time&&r.submitted_at){ resolved++; const hrs=(new Date(r.completed_time)-new Date(r.submitted_at))/3600000; if(hrs<=(SLA_HOURS[r.priority]||24)) within++; } });
  const opens=co.filter(isOpenCallout); const breaching=opens.filter(r=>slaState(r).cls==='breach').length;
  const slaPct = resolved? Math.round(within/resolved*100) : (opens.length? Math.round((opens.length-breaching)/opens.length*100) : 100);
  const slaLabel = resolved? `${within}/${resolved} resolved within target` : (opens.length? `${opens.length-breaching}/${opens.length} open within SLA`:'No call-outs');
  // kpis
  const downs=co.map(r=>Number(r.downtime_minutes)).filter(n=>!isNaN(n)&&n>0);
  const avgDown=downs.length?Math.round(downs.reduce((a,b)=>a+b,0)/downs.length):null;
  const followups=co.filter(r=>r.follow_up_required===true).length;
  const hours=sh.map(r=>Number(r.hours_worked)).filter(n=>!isNaN(n)); const totHours=hours.reduce((a,b)=>a+b,0);
  return {mKeys,months,pri,topSites,topEng,slaPct,slaLabel,kpis:{total:co.length,open:opens.length,avgDown,followups,shifts:sh.length,totHours}};
}

function hqItems(){
  if(!HQDATA) return [];
  const items=[];
  HQDATA.callouts.filter(isOpenCallout).forEach(r=>{
    const s=slaState(r);

    else if(s.cls==='breach') items.push({sev:1,cls:'red',cat:'SLA breach',client_id:r.client_id,t:textOnly(r.fault_description||'Call-out'),m:(r.job_number||'')+' · '+(r.priority||''),extra:s.label});
  });
  HQDATA.documents.forEach(d=>{ if(!d.expiry_date)return; const days=Math.ceil((new Date(d.expiry_date)-Date.now())/86400000);
    if(days<0) items.push({sev:1,cls:'red',cat:'Document expired',client_id:d.client_id,t:textOnly(d.title||'Document'),m:d.doc_type||'',extra:'Expired '+(-days)+'d ago'});
    else if(days<=30) items.push({sev:2,cls:'amber',cat:'Document expiring',client_id:d.client_id,t:textOnly(d.title||'Document'),m:d.doc_type||'',extra:'In '+days+'d'});
  });
  HQDATA.risks.filter(r=>String(r.risk_level||'')==='Critical' && !['Closed','Complete'].includes(String(r.status||''))).forEach(r=>{
    items.push({sev:0,cls:'red',cat:'Critical risk',client_id:r.client_id,t:textOnly(r.title||'Critical risk'),m:'',extra:r.status||'Open'});
  });
  (HQDATA.requests||[]).filter(r=>['New','Reviewing'].includes(String(r.status||''))).forEach(r=>{

  const crit=HQDATA.risks.filter(r=>String(r.risk_level||'')==='Critical'&&!['Closed','Complete'].includes(String(r.status||''))).length;
  const newReq=(HQDATA.requests||[]).filter(r=>['New','Reviewing'].includes(String(r.status||''))).length;

  const list = items.length
    ? `<div class="list">${items.slice(0,40).map(it=>`<div class="litem"><div class="av" style="background:var(--${it.cls}-soft);color:var(--${it.cls})">${it.cat[0]}</div>

        <div class="when"><button class="addbtn sm" onclick="enterClient('${it.client_id}')">Open →</button></div></div>`).join('')}</div>`
    : `<div class="empty"><div class="big">✅</div><b>Nothing needs attention</b><div style="font-size:13px;margin-top:4px">No open Priority-1s, SLA breaches, expiring documents or critical risks across any client.</div></div>`;
  const clientRows = activeClients.length
    ? activeClients.map(cid=>{const b=byClient[cid];return `<tr onclick="enterClient('${cid}')" style="cursor:pointer">
        <td><b>${esc(clientName(cid))}</b></td>
        <td>${b.co||0}</td>
        <td>${b.br?`<span class="chip red">${b.br}</span>`:'0'}</td>
        <td>${b.dx?`<span class="chip amber">${b.dx}</span>`:'0'}</td>
        <td>${b.rk?`<span class="chip red">${b.rk}</span>`:'0'}</td>
        <td><span class="pdf-link">Open →</span></td></tr>`;}).join('')
    : '<tr><td colspan="6" class="muted" style="text-align:center;padding:20px">All clear across every client.</td></tr>';
  return `<div class="sechead"><h3>🏠 HQ — Business Overview</h3><span class="sub">Across all ${CLIENTS.length} clients · live</span><span class="line"></span><button class="addbtn reportbtn" onclick="loadHQ().then(()=>go('hq'))">↻ Refresh</button></div>
    ${k}
    <div class="row2" style="margin-top:16px">
      <div class="card"><h4>🔔 Needs Attention</h4><div class="csub">Everything across the business that needs action, most urgent first</div>${list}</div>
      <div class="card"><h4>🏢 By Client</h4><div class="csub">Clients with anything outstanding — click to open</div>
        <table><thead><tr><th>Client</th><th>Open</th><th>SLA</th><th>Docs</th><th>Risk</th><th></th></tr></thead><tbody>${clientRows}</tbody></table></div>
    </div>`;
}

        <div class="note">Up to ${MAX_CREW} engineers per site. Name, role and phone.</div>
      </div>
      <div class="fld"><label>Notes</label><textarea id="s_notes" placeholder="Any site notes">${esc(s.notes||'')}</textarea></div>
    </div>
    <div class="modal-foot">
      ${siteId?`<button class="btn-ghost" style="color:var(--red)" onclick="deleteSite('${siteId}')">Delete</button>`:''}
      <button class="btn-ghost" onclick="closeForm()">Cancel</button>
      <button class="btn" id="siteSave" onclick="submitSite(${siteId?`'${siteId}'`:'null'})">${siteId?'Save changes':'Add site'}</button>
    </div>
    <div class="savemsg" id="saveMsg" style="padding-bottom:14px"></div>
  </div>`;
  document.body.appendChild(wrap);
  (Array.isArray(s.crew)?s.crew:[]).forEach(c=>addCrewRow(c.name,c.role,c.phone));
  updateCrewCount();
}
async function submitSite(siteId){
  const code=val('s_code'), city=val('s_city');
  if(!code && !city){ msg('Give the site at least a code or a city.','err'); return; }
  const btn=el('siteSave'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  const crew=[...document.querySelectorAll('#crewWrap .crewrow')].map(r=>({name:r.querySelector('.cw-n').value.trim(),role:r.querySelector('.cw-r').value.trim(),phone:r.querySelector('.cw-p').value.trim()})).filter(c=>c.name);
  const row={ client_id:CLIENT.id, code:code||null, city:city||null, country:val('s_country')||null, address:val('s_address')||null,
    team_id:val('s_team')||null, status:val('s_status'), progress_pct:num('s_prog')||0, phase:num('s_phase')||1,
    work_days:num('s_wd'), travel_days:num('s_td'), working_hours:val('s_hours')||null,
    planned_start:val('s_start')||null, planned_end:val('s_end')||null, crew:crew, notes:val('s_notes')||null };
  const res = siteId ? await sb.from('sites').update(row).eq('id',siteId) : await sb.from('sites').insert(row);
  if(res.error){ btn.disabled=false; btn.textContent=siteId?'Save changes':'Add site'; msg('Could not save: '+res.error.message,'err'); return; }
  msg('✓ Saved.','ok'); await loadClientData(); setTimeout(()=>{ closeForm(); go('sites'); },600);
}
async function deleteSite(siteId){
  if(!confirm('Delete this site? This permanently removes it and cannot be undone.')) return;
  const {error}=await sb.from('sites').delete().eq('id',siteId);
  if(error){ alert('Could not delete: '+error.message); return; }
  await loadClientData(); closeForm(); go('sites');
}

/* ============ ROUTER ============ */
const TITLES={hq:'HQ — Business Overview',clients:'Clients',command:'Command Centre',overview:'Programme Overview',sites:'Sites & Progress',schedule:'Schedule',teams:'Teams & Routes',risks:'Risk Register',callouts:'Call-Out Reports',shifts:'Shift Reports',reports:'Activity Feed',gallery:'Photo Evidence',analytics:'Analytics & Insights',documents:'Documents',requests:'Work Requests',quality:'Quality & Handover'};
function go(page){
  CURRENT=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  const pt=el('pageTitle'); if(pt) pt.textContent=TITLES[page]||'';
  let html='';
  try{
    if(page==='hq')html=pageHQ();
    else if(page==='clients')html=pageClients();
    else if(!CLIENT){ html=emptyState('👈','Choose a client','Pick a client from the dropdown above'+(PROFILE.role==='admin'?', the Clients page or HQ':'')+' to open their dashboard.'); }
    else if(page==='command')html=pageCommand();
    else if(page==='overview')html=pageOverview();
    else if(page==='sites')html=pageSites();
    else if(page==='schedule')html=pageSchedule();
    else if(page==='teams')html=pageTeams();
    else if(page==='risks')html=pageRisks();
    else if(page==='callouts')html=pageCallouts();
    else if(page==='shifts')html=pageShifts();
    else if(page==='reports')html=pageReports();
    else if(page==='gallery')html=pageGallery();
    else if(page==='requests')html=pageRequests();
    else if(page==='analytics')html=pageAnalytics();
    else if(page==='documents')html=pageDocuments();
    else if(page==='quality')html=pageQuality();
  }catch(e){ html=emptyState('⚠','Something went wrong drawing this page',esc(e.message)); }
  el('content').innerHTML=html;
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  buildCharts(page);
  if(page==='command') setTimeout(initOpsMap, 60);
}
function buildCharts(page){
  if(typeof Chart==='undefined')return;
  try{
    Chart.defaults.color=getComputedStyle(document.body).getPropertyValue('--muted');
    if(page==='overview' && el('countryChart')){
      const by={},cnt={};
      DATA.sites.filter(s=>s.country).forEach(s=>{by[s.country]=(by[s.country]||0)+Number(s.progress_pct||0);cnt[s.country]=(cnt[s.country]||0)+1;});
      const labels=Object.keys(by); if(!labels.length)return;
      charts.country=new Chart(el('countryChart'),{type:'doughnut',data:{labels:labels.map(l=>(flagEmoji[l]||'')+' '+l),datasets:[{data:labels.map(l=>Math.round(by[l]/cnt[l])),backgroundColor:['#38bdf8','#22c55e','#a78bfa','#f59e0b','#fb7185','#34d399'],borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{position:'right',labels:{boxWidth:12,padding:10,font:{size:11}}}}}});
    }
    if(page==='analytics'){
      const a=analyticsData(); const grid={color:getComputedStyle(document.body).getPropertyValue('--line2')};
      if(el('aMonth')) charts.m=new Chart(el('aMonth'),{type:'bar',data:{labels:a.mKeys,datasets:[{label:'Call-outs',data:a.mKeys.map(m=>a.months[m]),backgroundColor:'#38bdf8',borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{y:{grid,beginAtZero:true,ticks:{precision:0}},x:{grid:{display:false}}}}});
      if(el('aPri')){ const pl=Object.keys(a.pri); charts.p=new Chart(el('aPri'),{type:'doughnut',data:{labels:pl,datasets:[{data:pl.map(p=>a.pri[p]),backgroundColor:['#ef4444','#f59e0b','#38bdf8','#22c55e','#a78bfa'],borderWidth:0}]},options:{cutout:'60%',plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}}); }
      if(el('aSites')) charts.s=new Chart(el('aSites'),{type:'bar',data:{labels:a.topSites.map(x=>x[0]),datasets:[{label:'Call-outs',data:a.topSites.map(x=>x[1]),backgroundColor:'#fb7185',borderRadius:6}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid,beginAtZero:true,ticks:{precision:0}},y:{grid:{display:false}}}}});
      if(el('aEng')) charts.e=new Chart(el('aEng'),{type:'bar',data:{labels:a.topEng.map(x=>x[0]),datasets:[{label:'Reports',data:a.topEng.map(x=>x[1]),backgroundColor:'#22c55e',borderRadius:6}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid,beginAtZero:true,ticks:{precision:0}},y:{grid:{display:false}}}}});
    }
  }catch(e){console.warn('chart skipped',e);}
}
</script>
