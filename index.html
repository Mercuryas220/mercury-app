<style>

:root{
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --bg:#0a0e16;--bg2:#0e131d;--panel:#121a27;--panel2:#172234;--line:#1f2b3d;--line2:#2a3a52;

  --red:#ef4444;--violet:#a78bfa;--green-soft:rgba(34,197,94,.14);--cyan-soft:rgba(56,189,248,.14);

}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:radial-gradient(900px 500px at 12% -8%,rgba(56,189,248,.10),transparent 60%),radial-gradient(900px 500px at 100% 0%,rgba(34,197,94,.08),transparent 55%),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.45;transition:background .4s}
body.client{--bg:#f4f7fb;--bg2:#fff;--panel:#fff;--panel2:#f7fafd;--line:#e6edf5;--line2:#d6e1ee;--text:#0f2033;--muted:#5a6b80;--faint:#8a9bb0;background:radial-gradient(900px 480px at 10% -10%,rgba(56,189,248,.10),transparent 60%),radial-gradient(800px 460px at 100% -5%,rgba(34,197,94,.08),transparent 55%),var(--bg)}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
/* login / setup */
.center{min-height:100vh;display:grid;place-items:center;padding:24px}
.authcard{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:34px;box-shadow:0 30px 70px rgba(0,0,0,.5)}
.authlogo{width:52px;height:52px;border-radius:14px;background:conic-gradient(from 220deg,var(--cyan),var(--green));display:grid;place-items:center;font-weight:800;color:#04121f;font-size:24px;margin:0 auto 18px}
.authcard h1{font-size:21px;text-align:center;margin-bottom:4px}
.authcard p.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.field input{width:100%;padding:12px 13px;border-radius:11px;border:1px solid var(--line2);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit}
.field input:focus{outline:none;border-color:var(--cyan)}
.btn{width:100%;padding:12px;border:0;border-radius:11px;background:linear-gradient(135deg,var(--cyan),var(--green));color:#04121f;font-weight:800;font-size:14.5px;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.6;cursor:wait}
.authmsg{font-size:13px;margin-top:14px;text-align:center;min-height:18px}
.authmsg.err{color:var(--red)}.authmsg.ok{color:var(--green)}
.setupbox{font-size:13px;color:var(--muted);line-height:1.6}
.setupbox code{background:#04121f;color:#7fd9ff;padding:2px 6px;border-radius:5px;font-size:12px}
/* shell */
.shell{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--line);padding:20px 16px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 6px 18px;border-bottom:1px solid var(--line);margin-bottom:16px}

.brand h1{font-size:15px;font-weight:800}.brand p{font-size:11px;color:var(--muted)}

.nav-btn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:var(--muted);font-family:inherit;font-size:13.5px;font-weight:600;padding:10px 12px;border-radius:11px;cursor:pointer;transition:.15s;margin-bottom:2px}
.nav-btn:hover{background:var(--panel);color:var(--text)}

.section-h{display:flex;align-items:center;gap:10px;margin:30px 2px 14px}.section-h:first-child{margin-top:6px}
.section-h h3{font-size:15px;font-weight:800}.section-h .sub{font-size:12px;color:var(--muted)}.section-h .line{flex:1;height:1px;background:var(--line)}
.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}

.kpi.a .spark{background:var(--amber-soft);color:var(--amber)}.kpi.r .spark{background:var(--red-soft);color:var(--red)}.kpi.v .spark{background:rgba(167,139,250,.16);color:var(--violet)}
.row2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px}.row2b{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ---- responsive: slide-in drawer on narrow screens & phones ---- */
.hamburger{display:none;border:1px solid var(--line2);background:var(--panel);color:var(--text);width:40px;height:40px;border-radius:10px;font-size:19px;cursor:pointer;font-family:inherit;flex:none}
.navscrim{display:none}
@media(max-width:980px){
  .shell{grid-template-columns:1fr}

  body.nav-open .sidebar{transform:none}
  .navscrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55}
  body.nav-open .navscrim{display:block}
  .hamburger{display:inline-flex;align-items:center;justify-content:center}

}
.card h4{font-size:14px;font-weight:800;margin-bottom:3px;display:flex;align-items:center;gap:8px}.card .csub{font-size:12px;color:var(--muted);margin-bottom:14px}
.chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
.chip.green{background:var(--green-soft);color:var(--green)}.chip.cyan{background:var(--cyan-soft);color:var(--cyan)}.chip.amber{background:var(--amber-soft);color:var(--amber)}.chip.red{background:var(--red-soft);color:var(--red)}.chip.grey{background:var(--panel2);color:var(--muted)}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700;padding:0 10px 10px;border-bottom:1px solid var(--line)}
td{padding:11px 10px;border-bottom:1px solid var(--line)}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--panel2)}
.site-code{font-weight:800;font-size:12.5px}.muted{color:var(--muted)}
.pbar{height:7px;border-radius:6px;background:var(--line2);overflow:hidden;min-width:90px}
.pbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--green))}
.pbar.amber i{background:linear-gradient(90deg,var(--amber),#fbbf24)}.pbar.red i{background:linear-gradient(90deg,var(--red),#fb7185)}
.pcell{display:flex;align-items:center;gap:9px}.pcell b{font-size:12px;width:34px;text-align:right}
.gantt{font-size:12px}.gantt .grow{display:grid;grid-template-columns:148px 1fr;align-items:center;gap:10px;padding:5px 0}
.gantt .gname{display:flex;align-items:center;gap:8px;font-weight:600}

.gantt .gbar{position:absolute;top:3px;height:16px;border-radius:5px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:700;color:#04121f;white-space:nowrap;overflow:hidden}
.gantt .gscale{display:grid;grid-template-columns:148px 1fr;gap:10px;margin-bottom:6px;color:var(--faint);font-size:10.5px;font-weight:700}

.gantt .today{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--cyan);z-index:3}
.list{display:flex;flex-direction:column;gap:10px}
.litem{display:flex;gap:12px;padding:12px;border-radius:12px;background:var(--panel2);border:1px solid var(--line)}
.litem .av{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:800;font-size:12px;background:var(--cyan-soft);color:var(--cyan)}
.litem .bd{flex:1;min-width:0}.litem .bd .t{font-size:13px;font-weight:700}.litem .bd .m{font-size:11.5px;color:var(--muted);margin-top:2px}

.teamgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.teamcard{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:15px}
.teamcard .th{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.teamcard .nm{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px}.teamcard .tdot{width:10px;height:10px;border-radius:50%}

.banner{display:flex;gap:13px;align-items:center;padding:14px 16px;border-radius:13px;background:linear-gradient(100deg,var(--cyan-soft),var(--green-soft));border:1px solid var(--line2);margin-bottom:18px}

<!-- ================= APP MOUNTS HERE ================= -->
<div id="root"></div>

<script>
/* ===================================================================
   ★★★  YOUR SETTINGS  ★★★
   Replace the two values below with the ones from your Supabase project
   (Settings -> API). The deployment guide shows you exactly where.
   These two values are the SAFE, public ones — fine to put here.
   =================================================================== */
const SUPABASE_URL      = "https://rpqbhbcnwgmzwponjejx.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_2u4tmepmHGIjRZntgZKC0A_8HWCkkYo";
/* =================================================================== */


/* ============ tiny helpers ============ */
const $=s=>document.querySelector(s);
const el=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const flagEmoji={UK:'🇬🇧',GB:'🇬🇧',IT:'🇮🇹',ES:'🇪🇸',FR:'🇫🇷',DE:'🇩🇪',IE:'🇮🇪',BE:'🇧🇪'};
const flagOf=s=>({'Complete':'green','Live':'cyan','At Risk':'amber','Delayed':'red','Mobilising':'cyan','Not Started':'grey','Pending':'grey'}[s]||'grey');
const pbarClass=s=>s==='Delayed'?'red':(s==='At Risk'?'amber':'');
const isConfigured=()=>!SUPABASE_URL.includes('_HERE')&&!SUPABASE_ANON_KEY.includes('_HERE');

let sb=null, SESSION=null, PROFILE=null, CLIENTS=[], CLIENT=null;
let VIEW='internal', CURRENT='overview', DATA={}, charts={};

/* ============ BOOT ============ */
window.addEventListener('DOMContentLoaded', async ()=>{
  if(!isConfigured()){ renderSetup(); return; }
  if(typeof supabase==='undefined'){ renderLoadError(); return; }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const {data:{session}} = await sb.auth.getSession();
  if(session){ SESSION=session; await startApp(); } else { renderLogin(); }
});

/* ============ SETUP SCREEN (config not filled in yet) ============ */
function renderSetup(){
  el('root').innerHTML=`<div class="center"><div class="authcard">
    <div class="authlogo">M</div><h1>Almost there</h1>

      Open this file in a text editor and find the section near the top marked
      <b>★ YOUR SETTINGS ★</b>. Replace <code>https://rpqbhbcnwgmzwponjejx.supabase.co</code> and
      <code>sb_publishable_2u4tmepmHGIjRZntgZKC0A_8HWCkkYo</code> with the two values from Supabase
      (<b>Settings → API</b>), then save and re-open. The deployment guide

    </div></div></div>`;
}

  el('root').innerHTML=`<div class="center"><div class="authcard">
    <div class="authlogo">M</div><h1>Connection hiccup</h1>
    <p class="sub">A required component didn't load.</p>
    <div class="setupbox">This usually means a brief internet glitch. Please check your connection and <b>refresh the page</b>. If it keeps happening, let me know.</div>
    <div style="margin-top:18px"><button class="btn" onclick="location.reload()">Refresh</button></div>
  </div></div>`;
}

/* ============ LOGIN SCREEN ============ */
function renderLogin(){
  el('root').innerHTML=`<div class="center"><div class="authcard">
    <div class="authlogo">M</div><h1>Mercury Operations</h1>
    <p class="sub">Sign in to your dashboard</p>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="email" required autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="pw" required autocomplete="current-password"></div>
      <button class="btn" id="loginBtn" type="submit">Sign in</button>
      <div class="authmsg" id="authMsg"></div>
    </form></div></div>`;
  el('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=el('loginBtn'), msg=el('authMsg');
    btn.disabled=true; btn.textContent='Signing in…'; msg.textContent=''; msg.className='authmsg';
    const {error} = await sb.auth.signInWithPassword({email:el('email').value.trim(), password:el('pw').value});
    if(error){ msg.textContent=error.message; msg.className='authmsg err'; btn.disabled=false; btn.textContent='Sign in'; return; }
    const {data:{session}} = await sb.auth.getSession();
    SESSION=session; await startApp();
  });
}

/* ============ LOAD PROFILE + CLIENTS, THEN RENDER SHELL ============ */
async function startApp(){
  el('root').innerHTML=`<div class="center"><div class="muted">Loading your dashboard…</div></div>`;
  // profile
  const {data:prof} = await sb.from('profiles').select('*').eq('id',SESSION.user.id).maybeSingle();
  PROFILE = prof || {role:'client', full_name:SESSION.user.email, email:SESSION.user.email};
  // clients (RLS lets everyone read the list; we restrict non-admins to their own)
  let {data:clients} = await sb.from('clients').select('*').order('name');
  clients = clients || [];
  if(PROFILE.role!=='admin' && PROFILE.client_id) clients = clients.filter(c=>c.id===PROFILE.client_id);
  CLIENTS = clients;
  CLIENT = CLIENTS[0] || null;
  // clients see the portal view; admins/engineers default to internal
  VIEW = (PROFILE.role==='client') ? 'client' : 'internal';
  document.body.classList.toggle('client', VIEW==='client');
  renderShell();
  // Admins land on the Clients hub; everyone else goes straight into their dashboard.
  if(PROFILE.role==='admin'){
    if(CLIENT) await loadClientData();
    go('clients');
  } else if(CLIENT){
    await loadClientData(); go('overview');
  } else {
    go('overview'); // graceful: shows a "no client" message instead of a blank screen
  }
}

/* Enter a specific client's dashboard (from the Clients hub or dropdown) */
async function enterClient(id){
  CLIENT = CLIENTS.find(c=>c.id===id) || CLIENT;
  if(!CLIENT) return;
  await loadClientData();
  const crumb=document.querySelector('.crumb'); if(crumb) crumb.textContent=CLIENT.name;
  const sel=el('cliSelect'); if(sel) sel.value=CLIENT.id;
  go('overview');
}

/* ============ FETCH ALL DATA FOR THE SELECTED CLIENT ============ */
async function loadClientData(){
  if(!CLIENT) return;
  const cid=CLIENT.id;
  const q=(t,extra)=>sb.from(t).select(extra||'*').eq('client_id',cid);
  const [sites,teams,risks,daily,callouts,qa,progress,shifts] = await Promise.all([
    q('sites'), q('teams'), q('risks'),
    q('daily_reports').order('submitted_at',{ascending:false}).limit(100),
    q('callout_reports').order('submitted_at',{ascending:false}).limit(200),
    q('qa_signoffs').order('submitted_at',{ascending:false}).limit(100),
    q('progress_reports').order('submitted_at',{ascending:false}).limit(100),
    q('shift_reports').order('submitted_at',{ascending:false}).limit(200)
  ]);
  const engs = await sb.from('engineers').select('full_name').order('full_name');
  DATA={
    sites:(sites.data||[]), teams:(teams.data||[]), risks:(risks.data||[]),
    daily:(daily.data||[]), callouts:(callouts.data||[]), qa:(qa.data||[]),
    progress:(progress.data||[]), shifts:(shifts.data||[]),
    engineers:((engs.data||[]).map(e=>e.full_name).filter(Boolean))
  };
  // attach team name to each site
  const tmap={}; DATA.teams.forEach(t=>tmap[t.id]=t);
  DATA.sites.forEach(s=>{ s._team=tmap[s.team_id]?tmap[s.team_id].name.replace('Team ',''):'—'; });
}

/* ============ DERIVED VALUES ============ */
function rollups(){
  const sites=DATA.sites.filter(s=>String(s.status||'')!=='Pending');
  const active=sites.filter(s=>!['Pending','Not Started'].includes(s.status));
  const complete=sites.filter(s=>s.status==='Complete');
  const live=sites.filter(s=>['Live','At Risk','Delayed','Mobilising'].includes(s.status));
  const avg=active.length?Math.round(active.reduce((a,s)=>a+Number(s.progress_pct||0),0)/active.length):0;
  const onSched=active.filter(s=>!['Delayed','At Risk'].includes(s.status)).length;
  const onSchedPct=active.length?Math.round(onSched/active.length*100):0;
  const openRisks=DATA.risks.filter(r=>!['Closed','Complete'].includes(String(r.status||'')));
  const crit=openRisks.filter(r=>String(r.risk_level||'')==='Critical');
  return {sites,active,complete,live,avg,onSchedPct,openRisks,crit,total:DATA.sites.length};
}
function kpi(cls,icon,label,val,unit){return `<div class="card kpi ${cls}"><div class="spark">${icon}</div><div class="lbl">${label}</div><div class="val">${val}${unit?`<small>${unit}</small>`:''}</div></div>`;}
function sectionH(t,s){return `<div class="section-h"><h3>${t}</h3>${s?`<span class="sub">${s}</span>`:''}<span class="line"></span></div>`;}
function emptyState(icon,title,msg){return `<div class="card"><div class="empty"><div class="big">${icon}</div><b>${title}</b><div style="margin-top:6px;font-size:13px">${msg}</div></div></div>`;}

/* gantt across the client's date range */
function gantt(){
  const dated=DATA.sites.filter(s=>s.planned_start&&s.planned_end);
  if(!dated.length) return emptyState('📅','No dates scheduled yet','Add planned start/end dates to your sites and the timeline appears here.');
  const ds=dated.map(s=>+new Date(s.planned_start)), de=dated.map(s=>+new Date(s.planned_end));
  const min=Math.min(...ds), max=Math.max(...de), span=Math.max(1,max-min);
  const pct=d=>((+new Date(d)-min)/span)*100;
  const rows=dated.sort((a,b)=>new Date(a.planned_start)-new Date(b.planned_start)).map(s=>{
    const l=pct(s.planned_start), r=pct(s.planned_end), w=Math.max(2.5,r-l);
    const col=s.status==='Complete'?'linear-gradient(90deg,#22c55e,#4ade80)':s.status==='Delayed'?'linear-gradient(90deg,#ef4444,#fb7185)':s.status==='At Risk'?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#38bdf8,#22c55e)';
    return `<div class="grow"><div class="gname"><span class="chip ${flagOf(s.status)}" style="padding:2px 7px">${esc(s._team)}</span> ${flagEmoji[s.country]||''} ${esc(s.code||s.city)}</div>
      <div class="gtrack"><div class="gbar" style="left:${l}%;width:${w}%;background:${col}">${Number(s.progress_pct)>0?Math.round(s.progress_pct)+'%':''}</div></div></div>`;
  }).join('');
  return `<div class="gantt">${rows}<div class="legend"><span><i style="background:#38bdf8"></i> In progress</span><span><i style="background:#22c55e"></i> Complete</span><span><i style="background:#f59e0b"></i> At risk</span><span><i style="background:#ef4444"></i> Delayed</span></div></div>`;
}
function ring(p,label){const r=58,c=2*Math.PI*r,o=c-(p/100)*c;return `<div class="ring"><svg width="150" height="150" viewBox="0 0 150 150"><circle cx="75" cy="75" r="${r}" fill="none" stroke="var(--line2)" stroke-width="12"/><circle cx="75" cy="75" r="${r}" fill="none" stroke="url(#g)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${o}"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#22c55e"/></linearGradient></defs></svg><div class="mid"><div><b>${p}%</b><span>${label}</span></div></div></div>`;}

function buildFeed(){
  const items=[];
  DATA.daily.forEach(d=>{const s=DATA.sites.find(x=>x.id===d.site_id)||{};items.push({who:(d.supervisor||'·').split(' ').map(w=>w[0]).join('').slice(0,2)||'··',title:`${s.code||s.city||'Site'} · Daily Report`,msg:d.work_completed||d.status||'Daily update submitted',when:rel(d.submitted_at),country:s.country,flag:1,ts:+new Date(d.submitted_at)});});
  DATA.callouts.forEach(c=>{const s=DATA.sites.find(x=>x.id===c.site_id)||{};items.push({who:(c.engineer||'··').split(' ').map(w=>w[0]).join('').slice(0,2)||'··',title:`${s.code||s.city||'Site'} · Call-Out`,msg:c.fault_description||c.status||'Call-out logged',when:rel(c.submitted_at),country:s.country,flag:1,ts:+new Date(c.submitted_at)});});
  DATA.qa.forEach(q=>{const s=DATA.sites.find(x=>x.id===q.site_id)||{};items.push({who:'QA',title:`${s.code||s.city||'Site'} · QA Sign-off`,msg:'Handover signed off',when:rel(q.submitted_at),country:s.country,flag:1,ts:+new Date(q.submitted_at)});});
  return items.sort((a,b)=>b.ts-a.ts).slice(0,6);
}
function rel(d){if(!d)return '';const diff=(Date.now()-+new Date(d))/60000;if(diff<60)return Math.max(1,Math.round(diff))+'m ago';if(diff<1440)return Math.round(diff/60)+'h ago';return Math.round(diff/1440)+'d ago';}
function risksMini(R){
  if(!R.openRisks.length) return `<h4>⚠ Risks</h4><div class="empty"><div class="big">✓</div><b>No open risks</b></div>`;
  return `<h4>⚠ Risks Needing Attention</h4><div class="csub">Open items by severity</div><div class="list">${R.openRisks.slice(0,5).map(r=>{const s=DATA.sites.find(x=>x.id===r.site_id)||{};const lc=r.risk_level==='Critical'?'red':r.risk_level==='High'?'amber':'cyan';return `<div class="litem"><div class="av" style="background:var(--${lc}-soft);color:var(--${lc})">${esc((s.code||'··').slice(-2))}</div><div class="bd"><div class="t">${esc(r.title||'Risk')}</div><div class="m">${esc(s.city||'')} · ${esc(r.owner||'')}</div></div><div class="when"><span class="chip ${lc}">${esc(r.risk_level||'')}</span></div></div>`;}).join('')}</div>`;

function qualityMini(R){return `<h4>★ Quality &amp; Handover</h4><div class="csub">QA-checked before handover</div><div class="ringwrap" style="margin:10px 0 4px"><div>${ring(R.complete.length?100:0,'pass rate')}</div><div style="flex:1;min-width:160px"><div class="metrics" style="grid-template-columns:1fr 1fr"><div><b>${R.complete.length}</b><span>Handovers signed</span></div><div><b>${DATA.qa.length}</b><span>QA records</span></div><div><b>${R.active.length}</b><span>Sites reporting</span></div><div><b>${R.openRisks.length}</b><span>Open risks</span></div></div></div></div>`;}

}

/* ===================================================================

   signature and PDF are best-effort and never block the save.
   =================================================================== */
let CAPTURE = { photos:[], sig:null, gps:null };

function engineerDatalist(){

}

        <div class="fld"><label>Status</label><select id="f_status"><option>Logged</option><option>On Site</option><option selected>In Progress</option><option>Temporary Repair Completed</option><option>Completed</option></select></div>

function val(id){const e=el(id);return e?String(e.value||'').trim():'';}
function num(id){const v=val(id);return v===''?null:Number(v);}

function openForm(type){
  if(!CLIENT){ alert('Pick a client first.'); return; }
  const f=FORMS[type]; if(!f) return;
  CAPTURE={photos:[], sig:null, gps:null};
  const wrap=document.createElement('div');
  wrap.className='modal-bg'; wrap.id='modalBg';
  wrap.innerHTML=`<div class="modal">
    <div class="modal-h"><h3>${f.title}</h3><button class="modal-x" onclick="closeForm()">✕</button></div>
    <div class="modal-b">
      ${engineerDatalist()}
      ${f.fields}
      <div class="fld"><label>Photos</label><div class="photos" id="photoWrap">
        <label class="photo-add">＋<input type="file" accept="image/*" capture="environment" multiple style="display:none" id="photoInput"></label>
      </div></div>
      <div class="fld"><label>Customer signature</label><canvas class="sigpad" id="sigpad"></canvas>
        <div><input id="f_signname" placeholder="Name of person signing" style="margin-top:8px"><button type="button" class="sig-clear" onclick="clearSig()">Clear signature</button></div></div>
      <div class="gps-note" id="gpsNote">📍 Capturing location…</div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeForm()">Cancel</button>
      <button class="btn" id="saveBtn" onclick="submitForm('${type}')">Submit report</button>
    </div>
    <div class="savemsg" id="saveMsg" style="padding-bottom:14px"></div>
  </div>`;
  document.body.appendChild(wrap);
  setupPhoto(); setupSig(); captureGps();
}
function closeForm(){ const m=el('modalBg'); if(m) m.remove(); }

/* photos */
function setupPhoto(){
  el('photoInput').addEventListener('change', e=>{
    [...e.target.files].forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>{ CAPTURE.photos.push(ev.target.result); renderThumbs(); };
      r.readAsDataURL(file);
    });
    e.target.value='';
  });
}
function renderThumbs(){
  const w=el('photoWrap'); if(!w) return;
  w.querySelectorAll('.thumb').forEach(t=>t.remove());
  CAPTURE.photos.forEach(src=>{ const img=document.createElement('img'); img.className='thumb'; img.src=src; w.insertBefore(img, w.firstChild); });
}
/* signature */
function setupSig(){
  const c=el('sigpad'); if(!c) return;
  c.width=c.offsetWidth*2; c.height=c.offsetHeight*2; const ctx=c.getContext('2d'); ctx.scale(2,2); ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#0f2033';
  let drawing=false, has=false;
  const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return [t.clientX-r.left, t.clientY-r.top];};
  const start=e=>{e.preventDefault();drawing=true;has=true;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(x,y);};
  const move=e=>{if(!drawing)return;e.preventDefault();const[x,y]=pos(e);ctx.lineTo(x,y);ctx.stroke();};
  const end=()=>{drawing=false; if(has) CAPTURE.sig=c.toDataURL('image/png');};
  c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  c.addEventListener('touchstart',start);c.addEventListener('touchmove',move);c.addEventListener('touchend',end);
}
function clearSig(){ const c=el('sigpad'); if(c){ c.getContext('2d').clearRect(0,0,c.width,c.height); CAPTURE.sig=null; } }
/* gps */
function captureGps(){
  const n=el('gpsNote'); if(!navigator.geolocation){ if(n)n.textContent='📍 Location not available on this device'; return; }
  navigator.geolocation.getCurrentPosition(
    p=>{ CAPTURE.gps={lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy)}; if(n)n.textContent=`📍 Location captured (±${CAPTURE.gps.acc}m)`; },
    ()=>{ if(n)n.textContent='📍 Location permission declined (report will still save)'; },
    {enableHighAccuracy:true,timeout:8000}
  );
}

/* upload a dataURL to Supabase Storage, return public URL (or null on failure) */
async function uploadDataUrl(dataUrl, path){
  try{
    const blob=await (await fetch(dataUrl)).blob();
    const {error}=await sb.storage.from('evidence').upload(path, blob, {contentType:blob.type||'image/png', upsert:true});
    if(error){ console.warn('upload failed',error); return null; }
    const {data}=sb.storage.from('evidence').getPublicUrl(path);
    return data.publicUrl;
  }catch(e){ console.warn('upload error',e); return null; }
}

/* SUBMIT — DB row first (never lost), then best-effort media + PDF */
async function submitForm(type){
  const f=FORMS[type];
  for(const id of f.required){ if(!val(id)){ msg('Please fill in the required fields.','err'); el(id).focus(); return; } }
  const btn=el('saveBtn'); btn.disabled=true; btn.textContent='Saving…'; msg('','');
  const ref=f.prefix+'-'+Date.now();
  const row=Object.assign(f.collect(), {
    client_id: CLIENT.id,
    submitted_at: new Date().toISOString(),
    latitude: CAPTURE.gps?CAPTURE.gps.lat:null,
    longitude: CAPTURE.gps?CAPTURE.gps.lng:null
  });
  if(type==='callout'){ row.job_number=ref; row.customer_sign_name=val('f_signname')||null; }
  // 1) Save the row — this is the source of truth
  const {data:ins,error}=await sb.from(f.table).insert(row).select().maybeSingle();
  if(error){ btn.disabled=false; btn.textContent='Submit report'; msg('Could not save: '+error.message,'err'); return; }
  const id=ins?ins.id:null;
  // 2) Best-effort: upload photos + signature, generate PDF
  btn.textContent='Uploading photos…';
  const photoUrls=[];
  for(let i=0;i<CAPTURE.photos.length;i++){ const u=await uploadDataUrl(CAPTURE.photos[i], `${CLIENT.slug}/${ref}/photo${i+1}.jpg`); if(u)photoUrls.push(u); }
  let sigUrl=null; if(CAPTURE.sig) sigUrl=await uploadDataUrl(CAPTURE.sig, `${CLIENT.slug}/${ref}/signature.png`);
  // media table rows
  for(const u of photoUrls){ try{ await sb.from('media').insert({client_id:CLIENT.id, report_type:type, report_id:id, file_url:u}); }catch(e){} }
  // PDF
  btn.textContent='Building PDF…';
  let pdfUrl=null;
  try{ const pdfData=buildPdf(type, row, ref); if(pdfData) pdfUrl=await uploadDataUrl(pdfData, `${CLIENT.slug}/${ref}/report.pdf`); }catch(e){ console.warn('pdf failed',e); }
  // 3) write back the links
  try{ const patch={}; if(type==='callout'){patch.internal_notes=(row.internal_notes||'')+(sigUrl?'':'');} patch.pdf_url=pdfUrl; if(type==='shift'){patch.media_links=photoUrls;} if(type==='callout'){patch.map_link=CAPTURE.gps?`https://maps.google.com/?q=${CAPTURE.gps.lat},${CAPTURE.gps.lng}`:null;} await sb.from(f.table).update(patch).eq('id',id); }catch(e){}
  msg('✓ Report saved'+(pdfUrl?' — PDF generated':'')+'.','ok');
  await loadClientData();
  setTimeout(()=>{ closeForm(); go(type==='callout'?'callouts':'shifts'); }, 900);
}
function msg(t,c){ const m=el('saveMsg'); if(m){ m.textContent=t; m.className='savemsg '+(c||''); } }

/* branded PDF via jsPDF */
function buildPdf(type, row, ref){
  if(!window.jspdf) return null;
  const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:'pt',format:'a4'});
  const W=595; let y=48;
  doc.setFillColor(10,14,22); doc.rect(0,0,W,70,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.text('MERCURY', 40, 38);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(180,200,220); doc.text('Automated Solutions — Operations', 40, 54);
  doc.setTextColor(15,32,51); doc.setFont('helvetica','bold'); doc.setFontSize(15);
  y=100; doc.text((type==='callout'?'Call-Out Report':'Shift Report'), 40, y);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(90,107,128);
  doc.text(`${CLIENT.name}   ·   Ref ${ref}   ·   ${new Date().toLocaleString('en-GB')}`, 40, y+16);
  doc.setDrawColor(225,235,243); doc.line(40,y+26,W-40,y+26); y+=44;
  const line=(k,v)=>{ if(v==null||v==='')return; doc.setFont('helvetica','bold');doc.setTextColor(90,107,128);doc.setFontSize(9);doc.text(k.toUpperCase(),40,y);
    doc.setFont('helvetica','normal');doc.setTextColor(15,32,51);doc.setFontSize(11);
    const lines=doc.splitTextToSize(String(v),W-80); doc.text(lines,40,y+14); y+=14+lines.length*13+8; };
  const site=(DATA.sites.find(s=>s.id===row.site_id)||{});
  line('Site', site.code?`${site.code} — ${site.city||''}`:'General');
  line('Engineer', row.engineer);
  if(type==='callout'){ line('Priority',row.priority); line('Status',row.status); line('Asset',row.asset_reference); line('Fault',row.fault_description); line('Work carried out',row.work_carried_out); line('Parts used',row.parts_used); if(row.downtime_minutes!=null)line('Downtime (mins)',row.downtime_minutes); line('Follow-up required',row.follow_up_required?'Yes':'No'); }
  else { line('Shift',row.shift); line('Hours worked',row.hours_worked); line('Status',row.status); line('Work completed',row.work_completed); line('Issues / handover',row.issues); line('Near-miss',row.near_miss); }
  if(CAPTURE.gps) line('Location', `${CAPTURE.gps.lat.toFixed(5)}, ${CAPTURE.gps.lng.toFixed(5)} (±${CAPTURE.gps.acc}m)`);
  // photos
  CAPTURE.photos.slice(0,4).forEach((p,i)=>{ if(y>720){doc.addPage();y=48;} try{ doc.addImage(p,'JPEG',40+(i%2)*media_w(),y,media_w()-10,110); if(i%2===1)y+=120; }catch(e){} });
  if(CAPTURE.photos.length%2===1)y+=120;
  // signature
  if(CAPTURE.sig){ if(y>660){doc.addPage();y=48;} doc.setFont('helvetica','bold');doc.setTextColor(90,107,128);doc.setFontSize(9);doc.text('CUSTOMER SIGNATURE',40,y); try{doc.addImage(CAPTURE.sig,'PNG',40,y+8,200,80);}catch(e){} if(type==='callout'&&row.customer_sign_name){doc.setFont('helvetica','normal');doc.setTextColor(15,32,51);doc.setFontSize(10);doc.text(row.customer_sign_name,40,y+104);} }
  doc.setTextColor(150,160,175);doc.setFontSize(8);doc.text('Generated by Mercury Operations Platform',40,820);
  return doc.output('datauristring');
}
function media_w(){ return 257; }

/* ============ ROUTER ============ */
const TITLES={clients:'Clients',overview:'Programme Overview',sites:'Sites & Progress',schedule:'Schedule',teams:'Teams & Routes',risks:'Risk Register',callouts:'Call-Out Reports',shifts:'Shift Reports',reports:'Activity Feed',quality:'Quality & Handover'};
function go(page){
  CURRENT=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  const pt=el('pageTitle'); if(pt) pt.textContent=TITLES[page]||'';
  let html='';
  try{
    if(page==='clients')html=pageClients();
    else if(!CLIENT){ html=emptyState('👈','Choose a client','Pick a client from the dropdown above'+(PROFILE.role==='admin'?' or the Clients page':'')+' to open their dashboard.'); }
    else if(page==='overview')html=pageOverview();
    else if(page==='sites')html=pageSites();
    else if(page==='schedule')html=pageSchedule();
    else if(page==='teams')html=pageTeams();
    else if(page==='risks')html=pageRisks();
    else if(page==='callouts')html=pageCallouts();
    else if(page==='shifts')html=pageShifts();
    else if(page==='reports')html=pageReports();
    else if(page==='quality')html=pageQuality();
  }catch(e){ html=emptyState('⚠','Something went wrong drawing this page',esc(e.message)); }
  el('content').innerHTML=html;
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  buildCharts(page);
}
function buildCharts(page){
  if(typeof Chart==='undefined')return;
  try{
    Chart.defaults.color=getComputedStyle(document.body).getPropertyValue('--muted');
    if(page==='overview' && el('countryChart')){
      const by={},cnt={};
      DATA.sites.filter(s=>s.country).forEach(s=>{by[s.country]=(by[s.country]||0)+Number(s.progress_pct||0);cnt[s.country]=(cnt[s.country]||0)+1;});
      const labels=Object.keys(by); if(!labels.length)return;
      charts.country=new Chart(el('countryChart'),{type:'doughnut',data:{labels:labels.map(l=>(flagEmoji[l]||'')+' '+l),datasets:[{data:labels.map(l=>Math.round(by[l]/cnt[l])),backgroundColor:['#38bdf8','#22c55e','#a78bfa','#f59e0b','#fb7185','#34d399'],borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{position:'right',labels:{boxWidth:12,padding:10,font:{size:11}}}}}});
    }
  }catch(e){console.warn('chart skipped',e);}
}
